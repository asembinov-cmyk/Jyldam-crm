<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<script>
// принудительный переход на защищённый https (если открыли по http)
(function(){try{
  if(location.protocol==='http:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
    location.replace('https://'+location.host+location.pathname+location.search+location.hash);
  }
}catch(e){}})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Jyldam Logistics — CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#16213a;--paper:#eef2f9;--card:#ffffff;--line:#dde3ee;
    --rust:#2546c9;--rust-dk:#1c37a0;--moss:#4a5d3a;--gold:#c08a2d;--muted:#6b7488;
    --shadow:0 1px 0 rgba(20,30,60,.04),0 8px 24px -16px rgba(20,30,60,.30);
  }
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans:wght@400;500;600;700&display=swap');
  body{font-family:'Spline Sans',system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(circle at 12% 0%,rgba(37,70,201,.06),transparent 40%),var(--paper);
    min-height:100vh;-webkit-font-smoothing:antialiased}

  /* ВХОД */
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:20px;position:relative;overflow:hidden;
    background:linear-gradient(160deg,#eef3fb 0%,#f7f9fc 55%,#e9eef7 100%)}
  .login-bg{position:absolute;inset:0;z-index:0;pointer-events:none}
  .login-map{width:100%;height:100%;display:block}
  .login-map .route{fill:none;stroke:#9fb3d4;stroke-width:2;stroke-dasharray:7 9;opacity:.55;
    animation:routeflow 2.2s linear infinite}
  .login-map .route-road{stroke:#b9c4d6;stroke-dasharray:3 7;opacity:.5}
  @keyframes routeflow{to{stroke-dashoffset:-32}}
  .login-map .city circle{fill:#fff;stroke:#8aa0c4;stroke-width:2.5}
  .login-map .city-hub circle{fill:#4a8ed6;stroke:#2f6db0}
  .login-map .city text{paint-order:stroke;stroke:#f7f9fc;stroke-width:3px}
  .login-map .city{animation:citypulse 3.2s ease-in-out infinite}
  .login-map .city:nth-child(2){animation-delay:.4s}
  .login-map .city:nth-child(3){animation-delay:.8s}
  .login-map .city:nth-child(4){animation-delay:1.2s}
  .login-map .city:nth-child(5){animation-delay:1.6s}
  .login-map .city:nth-child(6){animation-delay:2s}
  @keyframes citypulse{0%,100%{opacity:.78}50%{opacity:1}}
  .login-map .plane{filter:drop-shadow(0 2px 3px rgba(40,60,90,.25))}
  .login-map .car{filter:drop-shadow(0 2px 2px rgba(20,30,50,.22))}
  .login-card{position:relative;z-index:1}
  @media (max-width:600px){.login-map .city text{font-size:14px}}
  .login-card{width:100%;max-width:400px;background:rgba(255,253,247,.92);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.7);
    border-radius:22px;box-shadow:0 30px 70px -28px rgba(40,60,100,.45),0 2px 0 rgba(255,255,255,.6) inset;padding:34px 30px}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .brand .mark{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--rust),var(--gold));
    display:grid;place-items:center;color:#fff;font-size:20px}
  .brand .name{font-family:'Fraunces',serif;font-weight:900;font-size:22px;letter-spacing:-.02em;line-height:1}
  .brand .sub{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
  .login-card h1{font-family:'Fraunces',serif;font-weight:600;font-size:20px;margin:22px 0 4px}
  .login-card p.hint{color:var(--muted);font-size:13px;margin-bottom:20px}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field.full{grid-column:1/-1}
  .field label{font-size:12px;font-weight:600;color:var(--muted)}
  .field input,.field select,.field textarea{font:inherit;font-size:14px;padding:10px 12px;
    border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid rgba(37,70,201,.3);
    border-color:var(--rust);background:var(--card)}
  .field .hint{font-size:11px;color:var(--muted)}
  .login-card .field input{font-size:15px;padding:11px 13px}

  .btn{font:inherit;font-weight:600;font-size:14px;cursor:pointer;border-radius:10px;padding:10px 16px;
    border:1px solid var(--line);background:var(--card);color:var(--ink);transition:.15s;display:inline-flex;
    align-items:center;gap:8px}
  .btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
  .btn.primary{background:var(--rust);border-color:var(--rust-dk);color:#fff}
  .btn.primary:hover{background:var(--rust-dk)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
  .btn.danger{color:#c0392b;border-color:#e3b0a8}
  .btn.danger:hover{background:#c0392b;color:#fff;border-color:#c0392b}
  .btn.block{width:100%;justify-content:center;font-size:15px;padding:12px}
  .btn:disabled{opacity:.6;cursor:default;transform:none}
  .err{color:var(--rust-dk);font-size:13px;margin-top:6px;min-height:18px}

  /* APP */
  .app-shell{display:none}
  header.topbar{border-bottom:1px solid var(--line);background:#eef2f9;
    position:sticky;top:0;z-index:60}
  .topbar-inner{padding:12px 22px;display:flex;align-items:center;gap:16px}
  .menu-toggle{display:none;font-size:22px;background:none;border:none;cursor:pointer;color:var(--ink);padding:2px 6px}
  .calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
  @media (max-width:760px){.calc-grid{grid-template-columns:1fr}}
  .calc-panel{padding:18px 20px}
  .calc-h{font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin-bottom:12px}
  .calc-note{font-size:12.5px;color:var(--muted);margin-bottom:12px;line-height:1.4}
  .calc-norm-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line)}
  .calc-norm-row:last-child{border-bottom:0}
  .cn-label{font-size:14px;font-weight:600;display:flex;flex-direction:column;gap:2px}
  .cn-hint{font-size:11.5px;color:var(--muted);font-weight:400}
  .cn-input{flex:none;display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px}
  .cn-input input{width:110px;text-align:right;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font:inherit;font-size:14px}
  .calc-period-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:rgba(37,70,201,.06);border-radius:12px;font-size:14px;font-weight:600}
  .calc-period-bar select{font:inherit;font-size:14px;font-weight:600;padding:7px 11px;border:1px solid var(--line);border-radius:9px;background:var(--card);cursor:pointer}
  .calc-save-bar{display:flex;align-items:center;gap:14px}
  .calc-saved{color:var(--moss);font-weight:600;font-size:14px}
  .calc-city-head{display:grid;grid-template-columns:1fr 130px 130px;gap:10px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;padding:6px 0;border-bottom:1px solid var(--line)}
  .calc-city-row{display:grid;grid-template-columns:1fr 130px 130px;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line)}
  .calc-city-row:last-child{border-bottom:0}
  .ccr-name{font-size:14px;font-weight:600}
  .calc-city-row input{text-align:right;padding:7px 10px;border:1px solid var(--line);border-radius:8px;font:inherit;font-size:14px}
  .calc-sum-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .calc-sum-bar select{font:inherit;font-size:14px;font-weight:600;padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);cursor:pointer}
  .calc-sum-cnt{color:var(--muted);font-size:14px}
  .calc-totals{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
  @media (max-width:760px){.calc-totals{grid-template-columns:1fr 1fr}}
  .ct-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
  .ct-k{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600}
  .ct-v{font-family:'Fraunces',serif;font-weight:900;font-size:24px;margin-top:6px;line-height:1}
  .calc-courier-tbl{width:100%;border-collapse:collapse;font-size:14px}
  .calc-courier-tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--line)}
  .calc-courier-tbl td{padding:10px;border-bottom:1px solid var(--line)}
  .calc-courier-tbl th:not(:first-child),.calc-courier-tbl td:not(:first-child){text-align:right}
  .filters-toggle{display:none}
  .filters-body{display:contents}
  .bottom-nav{display:none}
  .sidebar-backdrop{display:none}
  .show-more{display:none}
  .list-count{display:none}
  .logo{font-family:'Fraunces',serif;font-weight:900;font-size:20px;display:flex;align-items:center;gap:10px}
  .logo-img{height:30px;width:auto;display:block}
  .login-logo-img{height:34px;width:auto;display:block;margin-bottom:4px}
  @media (max-width:760px){.logo-img{height:26px}}
  .logo .mark{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--rust),var(--gold));
    display:grid;place-items:center;color:#fff;font-size:16px}
  .logo small{display:block;font-family:'Spline Sans',sans-serif;font-weight:500;font-size:11px;
    color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:-2px}
  .user-box{margin-left:auto;display:flex;align-items:center;gap:12px;padding-left:14px;border-left:1px solid var(--line)}
  .user-box .who{text-align:right;font-size:13px;line-height:1.2}
  .user-box .who b{display:block}
  .user-box .role{font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.05em}

  /* боковая панель + контент */
  .app-body{display:flex;align-items:flex-start;min-height:calc(100vh - 57px)}
  .sidebar{width:220px;flex:0 0 220px;border-right:1px solid var(--line);background:var(--card);
    position:sticky;top:57px;align-self:stretch;height:calc(100vh - 57px);padding:16px 12px;
    display:flex;flex-direction:column;overflow:hidden}
  .side-nav{display:flex;flex-direction:column;gap:4px;overflow-y:auto;flex:1;min-height:0}
  .sidebar-logout{margin-top:12px;flex:none;width:100%;justify-content:center;color:#c0392b;border-color:#e3b0a8}
  .sidebar-logout:hover{background:#c0392b;color:#fff;border-color:#c0392b}
  .side-nav button{font:inherit;font-size:14px;font-weight:600;cursor:pointer;text-align:left;
    border:1px solid transparent;background:transparent;color:var(--muted);padding:11px 14px;border-radius:10px;transition:.15s;display:flex;align-items:center;gap:10px}
  .side-nav button:hover{color:var(--ink);background:rgba(20,30,60,.04)}
  .side-nav button.active{color:var(--rust-dk);background:var(--paper);border-color:var(--line)}
  .side-nav button svg{width:19px;height:19px;flex:none}
  .side-nav button.disabled{opacity:.45;cursor:default}
  .side-nav button.disabled:hover{background:transparent;color:var(--muted)}
  .side-nav .nav-group{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    padding:14px 14px 4px;opacity:.7}
  .side-nav .nav-badge{margin-left:auto;font-size:11px;font-weight:700;background:var(--rust);color:#fff;
    min-width:18px;height:18px;border-radius:9px;display:inline-grid;place-items:center;padding:0 5px}

  /* ── Дашборд ── */
  .dash-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:16px}
  .dash-card{display:flex;align-items:center;gap:14px;padding:18px 20px;border-radius:16px;border:1px solid var(--line);
    box-shadow:var(--shadow);background:var(--card)}
  .dash-card .dc-ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex:none;color:#fff}
  .dash-card .dc-v{font-family:'Fraunces',serif;font-weight:900;font-size:30px;line-height:1}
  .dash-card .dc-k{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-top:3px}
  .dash-card .dc-extra{font-size:11.5px;color:var(--ink);margin-top:6px;font-weight:600}
  .dash-card .dc-period{font-size:10.5px;color:var(--muted);margin-top:6px;letter-spacing:.02em}
  .dash-card.c-new{background:linear-gradient(135deg,#eef3fb,var(--card))}.dash-card.c-new .dc-ic{background:#3b6fb0}
  .dash-card.c-pickup{background:linear-gradient(135deg,#f7eed8,var(--card))}.dash-card.c-pickup .dc-ic{background:var(--gold)}
  /* карточка городов */
  .dash-card.c-cities{background:linear-gradient(135deg,#eef1e8,var(--card));padding:14px 16px}
  .dc-cities{display:flex;flex-direction:column;gap:10px;width:100%}
  .dc-cities-h{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:2px}
  .dcity{display:flex;align-items:center;gap:8px;font-size:13px}
  .dcity-n{font-weight:700;color:var(--ink);min-width:54px}
  .dcity-dots{flex:1;color:var(--moss);letter-spacing:1px;font-size:10px;overflow:hidden;white-space:nowrap}
  .dcity-v{font-family:'Fraunces',serif;font-weight:900;font-size:18px;color:var(--ink)}
  /* карточка-донат */
  .dash-card.c-donut{background:linear-gradient(135deg,#f7e7e0,var(--card));padding:14px 16px}
  .dc-donut-wrap{display:flex;align-items:center;gap:12px;width:100%}
  .dc-donut-leg{display:flex;flex-direction:column;gap:7px;font-size:12.5px;color:var(--ink)}
  .dc-donut-leg b{font-family:'Fraunces',serif}
  .lg-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
  /* карточка финансов */
  .dash-card.c-fin{background:linear-gradient(135deg,#eaf3ee,var(--card))}.dash-card.c-fin .dc-ic{background:var(--moss);font-family:'Fraunces',serif;font-weight:900}
  .dc-fin-row{display:flex;justify-content:space-between;gap:12px;align-items:baseline;font-size:13px;color:var(--muted);margin-top:4px}
  .dc-fin-row:first-child{margin-top:0}
  .dc-fin-row b{font-family:'Fraunces',serif;font-weight:900;font-size:18px;color:var(--ink)}
  .dash-mini{display:flex;gap:26px;flex-wrap:wrap;padding:14px 20px;margin-bottom:22px;background:var(--card);
    border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);font-size:14px;color:var(--muted)}
  .dash-mini b{font-family:'Fraunces',serif;font-weight:900;font-size:18px;color:var(--ink);margin-right:5px}
  /* Таблица статистики по дням */
  .dash-stat{font-size:13px}
  .dash-stat th{text-align:center;white-space:nowrap;padding:8px 10px}
  .dash-stat th.grp{font-size:11px;letter-spacing:.04em;border-bottom:1px solid var(--line)}
  .dash-stat th.grp-ord{background:#eef3fb;color:#2b5c8a}
  .dash-stat th.grp-pk{background:#f6eed8;color:#8a5a12}
  .dash-stat th.grp-cour{background:#eef1e8;color:#2f6d36}
  .dash-stat th.grp-del{background:#f7e7e0;color:#1c37a0}
  .dash-stat td.num{text-align:center;white-space:nowrap;font-variant-numeric:tabular-nums}
  .dash-stat td.d-date{white-space:nowrap}
  .dash-stat th.c-alm,.dash-stat td.c-alm{background:rgba(61,100,120,.06);color:#3d6478}
  .dash-stat th.c-ast,.dash-stat td.c-ast{background:rgba(109,90,61,.06);color:#6d5a3d}
  .dash-stat th.cour-col,.dash-stat td.cour-col{font-size:12px;min-width:60px}
  .dash-stat th.cour-col .cour-city{display:block;font-size:10px;font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0;margin-top:2px}
  .dash-stat tfoot .dash-total td{background:var(--paper);border-top:2px solid var(--line);font-weight:700;
    position:sticky;bottom:0}
  .dash-stat tfoot .dash-total td:first-child{font-family:'Fraunces',serif;font-size:14px}
  @media (max-width:1100px){.dash-cards{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:760px){.dash-cards{grid-template-columns:1fr}.dash-mini{gap:14px}}
  .content{flex:1;min-width:0;padding:24px 26px}

  .page-head{padding:8px 0 18px;display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap}
  .page-head h1{font-family:'Fraunces',serif;font-weight:900;font-size:30px;letter-spacing:-.03em;line-height:1}
  .page-head p{color:var(--muted);font-size:14px;margin-top:7px}
  .dash-head{justify-content:space-between}
  .dash-period-filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .dash-period-filter select{font:inherit;font-size:14px;font-weight:600;padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);cursor:pointer}
  .head-actions{margin-left:auto;display:flex;gap:10px}
  .ic-orders-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin:10px 0 8px;flex-wrap:wrap}
  .ic-orders-list{max-height:240px;overflow-y:auto;border:1px solid var(--line);border-radius:10px;padding:4px}
  .ic-order-row{display:grid;grid-template-columns:24px 90px 1fr 120px;gap:10px;align-items:center;padding:7px 10px;border-bottom:1px solid var(--line);cursor:pointer;font-size:14px}
  .ic-order-row:last-child{border-bottom:0}
  .ic-order-row input{width:17px;height:17px}
  .ic-o-code{font-weight:700}
  .ic-o-track{color:var(--muted);font-size:12px}
  .ic-calc-live{margin-top:10px;padding:10px 12px;background:rgba(37,70,201,.07);border-radius:10px;font-size:14px}
  .ic-view-head{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;font-size:14px}
  .ic-view-tbl{width:100%;border-collapse:collapse;font-size:14px}
  .ic-view-tbl th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);padding:7px 9px;border-bottom:1px solid var(--line)}
  .ic-view-tbl td{padding:8px 9px;border-bottom:1px solid var(--line)}
  .chk-line{display:flex;align-items:center;gap:8px;font-weight:500;font-size:14px;padding:5px 0;cursor:pointer}
  .chk-line input{width:17px;height:17px;cursor:pointer}
  .cc-give{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .cc-give-tag{font-size:11px;font-weight:600;background:rgba(37,70,201,.10);color:var(--rust-dk);border-radius:6px;padding:2px 8px}
  .btn.btn-excel{background:#1d7a44;border-color:#166336;color:#fff}
  .btn.btn-excel:hover{background:#166336}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
    overflow:hidden;margin-bottom:24px}
  .panel-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .panel-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:18px}
  .panel-head .count{font-size:12px;color:var(--muted);background:var(--paper);border:1px solid var(--line);
    padding:2px 9px;border-radius:20px;font-weight:600}

  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{text-align:left;font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--muted);padding:11px 16px;border-bottom:1px solid var(--line);white-space:nowrap;
    background:linear-gradient(var(--paper),var(--card))}
  tbody td{padding:12px 16px;border-bottom:1px solid #e4e9f2;vertical-align:middle}
  .filter-row th{padding:6px 10px;background:var(--paper);border-bottom:1px solid var(--line)}
  .dir-filter{width:100%;font:inherit;font-size:12px;font-weight:400;text-transform:none;letter-spacing:0;
    padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--ink)}
  .dir-filter:focus{outline:2px solid rgba(37,70,201,.25);border-color:var(--rust)}
  /* Десктоп: читабельные колонки заявок/заказов */
  @media (min-width:761px){
    .resp-table td[data-label="Номер"]{white-space:nowrap}
    .resp-table td[data-label="Телефон"]{white-space:nowrap}
    .resp-table td[data-label="Адрес"]{min-width:200px;max-width:320px}
    .resp-table td[data-label="Наименование"]{min-width:140px}
    .resp-table td[data-label="Трек-код"]{white-space:nowrap}
    .resp-table td[data-label="Дата"],.resp-table td[data-label="Дата забора"]{white-space:nowrap}
  .cell-time{display:block;font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap}
    .resp-table td[data-label="Курьер"],.resp-table td[data-label="Менеджер продаж"],.resp-table td[data-label="Обработчик"]{white-space:nowrap}
  }
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:rgba(192,138,45,.05)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 9px;
    border-radius:20px;background:var(--paper);border:1px solid var(--line)}
  .pill.moss{color:var(--moss);background:#eef1e8;border-color:#cfd9bf}
  .pill.gold{color:var(--gold);background:#f6eed8;border-color:#e6d4a0}
  .pill.city-almaty{color:#3d6478;background:#e6eef2;border-color:#bcd2dc}
  .pill.city-astana{color:#6d5a3d;background:#f1ebe0;border-color:#dccfb6}
  .qty{font-family:'Fraunces',serif;font-weight:900;font-size:16px;color:var(--rust-dk)}
  .qty-edit{width:64px;font:inherit;font-family:'Fraunces',serif;font-weight:900;font-size:15px;color:var(--rust-dk);
    text-align:center;padding:5px 6px;border:1.5px solid var(--line);border-radius:8px;background:var(--card)}
  .qty-edit:focus{outline:2px solid rgba(37,70,201,.3);border-color:var(--rust)}
  .row-actions{display:flex;gap:6px;justify-content:flex-end;white-space:nowrap}
  .status-pick{font:inherit;font-size:12.5px;font-weight:600;padding:5px 8px;border:1.5px solid var(--line);
    border-radius:8px;background:var(--card);color:var(--ink);cursor:pointer}
  /* в таблице заказов статус — двухстрочная плашка, под ней невидимый select для выбора */
  .resp-table td[data-label="Статус"] .status-cell{position:relative;width:155px}
  .status-badge{display:block;font-size:11.5px;font-weight:600;line-height:1.25;padding:5px 8px;border:1.5px solid var(--line);
    border-radius:8px;background:var(--card);white-space:normal;word-break:break-word;cursor:pointer;min-height:20px}
  .ketChk,#ketChkAll{width:17px;height:17px;cursor:pointer;accent-color:var(--rust)}
  .status-overlay{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
  .status-time{font-size:10.5px;color:var(--muted);margin-top:3px;white-space:nowrap}
  .empty{padding:50px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-family:'Fraunces',serif;font-size:20px;color:var(--ink);margin-bottom:6px}
  .link-btn{background:none;border:none;color:var(--rust-dk);font:inherit;font-size:11px;font-weight:600;
    cursor:pointer;padding:2px 0;text-decoration:underline}

  .filters{display:flex;gap:10px;padding:14px 20px;flex-wrap:wrap;border-bottom:1px solid var(--line);background:var(--paper)}
  .filters-dates{align-items:center}
  .ket-badge{display:inline-block;margin-left:6px;padding:1px 7px;border-radius:20px;font-size:10.5px;font-weight:700;
    color:#fff;background:var(--moss);letter-spacing:.03em;vertical-align:middle;white-space:nowrap}
  .fdate-lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .filters input,.filters select{font:inherit;font-size:13px;padding:8px 11px;border:1px solid var(--line);
    border-radius:9px;background:var(--card);color:var(--ink);min-width:140px}
  .filters .search{flex:1;min-width:200px}
  .filters .date-field{display:flex;flex-direction:column;gap:3px;min-width:0}
  .filters .date-field span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding-left:2px}
  .filters .date-field input{min-width:150px}

  .subtabs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
  .subtabs button{font:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:9px 15px;border-radius:30px;
    border:1px solid var(--line);background:var(--card);color:var(--muted);transition:.15s}
  .subtabs button.active{background:var(--moss);color:#fff;border-color:var(--moss)}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .stats.stats-5{grid-template-columns:repeat(5,1fr)}
  .stats.stats-1{grid-template-columns:1fr;max-width:280px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);display:flex;align-items:flex-start;gap:14px}
  .stat-ic{flex:none;width:46px;height:46px;border-radius:12px;background:rgba(37,70,201,.10);display:grid;place-items:center;color:var(--rust)}
  .stat-ic svg{width:24px;height:24px}
  .stat-body{flex:1;min-width:0}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600}
  .stat .v{font-family:'Fraunces',serif;font-weight:900;font-size:30px;letter-spacing:-.02em;margin-top:4px;line-height:1;padding-bottom:8px;border-bottom:2px solid var(--rust);display:inline-block}
  .stat .v small{font-size:13px;font-family:'Spline Sans',sans-serif;color:var(--muted);font-weight:500}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(20,30,60,.55);display:grid;
    place-items:center;z-index:100;padding:20px}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:18px;width:100%;max-width:560px;
    box-shadow:0 30px 80px -30px rgba(20,30,60,.6);max-height:90vh;overflow:auto;will-change:transform}
  .modal-wide{max-width:1240px}
  .modal-mid{max-width:720px}
  /* двухколоночный макет карточки заказа: фото слева (половина), форма справа */
  .order-split{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
  .order-split .ophoto-col{position:sticky;top:0}
  .order-split .ophoto-col .field{margin:0}
  .order-split .oform-col{min-width:0}
  /* крупное превью фото в карточке заказа */
  .obig-wrap{width:100%;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:var(--paper)}
  .obig-rotate{display:flex;gap:8px;margin-top:8px}
  .obig-rotate .btn{flex:1}
  .obig-photo{width:100%;max-height:520px;object-fit:contain;cursor:zoom-in;display:block;transition:transform .15s;transform-origin:center}
  .obig-empty{width:100%;aspect-ratio:3/4;border:1px dashed var(--line);border-radius:12px;
    display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;background:var(--paper)}
  .obig-thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .obig-thumbs img{width:54px;height:54px;object-fit:cover;border-radius:8px;border:1px solid var(--line);cursor:pointer}
  .obig-thumbs img.active{border-color:var(--rust);border-width:2px}
  .obig-by{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.4;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:7px 11px}
  .obig-by b{color:var(--ink);font-weight:600}
  /* увеличение фото поверх всего */
  .photo-zoom-ov{position:fixed;inset:0;background:rgba(20,30,60,.92);z-index:99999;display:grid;place-items:center;padding:24px;cursor:zoom-out}
  .photo-zoom-ov img{max-width:96vw;max-height:92vh;object-fit:contain;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .photo-zoom-ov .pz-x{position:absolute;top:18px;right:24px;font-size:36px;color:#fff;background:none;border:none;cursor:pointer;line-height:1}
  @media (max-width:760px){
    .modal-wide{max-width:560px}
    .modal-mid{max-width:560px}
    .order-split{grid-template-columns:1fr;gap:16px}
    .obig-empty{aspect-ratio:4/3}
    .obig-photo{max-height:60vh}
  }
  .modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center}
  .modal-head h3{font-family:'Fraunces',serif;font-weight:600;font-size:20px}
  .modal-head .x{margin-left:auto;cursor:pointer;border:none;background:transparent;font-size:22px;
    color:var(--muted);line-height:1;padding:4px}
  .modal-body{padding:22px 24px}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--paper)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  .phone-wrap{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:10px;background:var(--paper);overflow:hidden}
  .phone-wrap:focus-within{outline:2px solid rgba(37,70,201,.3);border-color:var(--rust);background:var(--card)}
  .phone-pre{display:flex;align-items:center;padding:0 10px;font-size:14px;font-weight:600;color:var(--muted);
    background:rgba(20,30,60,.04);border-right:1px solid var(--line);user-select:none}
  .phone-wrap input{border:none!important;outline:none!important;background:transparent!important;border-radius:0!important;flex:1}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);
    padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 20px 50px -20px rgba(0,0,0,.6);z-index:200}
  .loading{padding:60px;text-align:center;color:var(--muted);font-size:15px}
  .hist{list-style:none}
  .hist li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #e4e9f2;font-size:13px}
  .hist li:last-child{border-bottom:none}
  .hist .dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex:none}
  .hist .when{color:var(--muted);font-size:12px}

  /* ── Компактные карточки заказов для курьера ── */
  .cour-cards{display:flex;flex-direction:column;gap:12px}
  .cour-card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .cc-head{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
  .cc-main{flex:1;min-width:0}
  .cc-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .cc-id{font-family:'Fraunces',serif;font-weight:900;font-size:17px;color:var(--rust-dk);letter-spacing:.5px}
  .cc-client{font-weight:600;font-size:15px;line-height:1.25;margin-bottom:2px;word-break:break-word}
  .cc-addr{font-size:13.5px;color:var(--ink);line-height:1.35;word-break:break-word}
  .cc-addr-row{margin-top:5px;line-height:1.4}
  .cc-addr-row .addr-link{display:inline-flex;align-items:flex-start;gap:4px;font-size:14px;color:var(--rust-dk);
    text-decoration:none;font-weight:600;word-break:break-word;padding:4px 0;border-bottom:1px dashed var(--rust);max-width:100%;cursor:pointer}
  .cc-addr-row .addr-link:active{opacity:.6}
  .cc-phone-row{margin-top:8px}
  .cc-phone-row a{display:inline-flex;align-items:center;gap:5px;font-size:14.5px;font-weight:600;color:var(--moss);
    text-decoration:none;padding:5px 10px;background:#eef1e8;border:1px solid #cfd9bf;border-radius:8px}
  .cc-phone-row a::before{content:"📞";font-size:13px}
  .cc-phone-row a:active{opacity:.6}
  .cc-phone{display:inline-block;margin-top:4px;font-size:13.5px}
  .cc-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex:none;text-align:right}
  .cc-sum{font-family:'Fraunces',serif;font-weight:900;font-size:18px;color:var(--moss);line-height:1;white-space:nowrap}
  .cc-sum small{display:block;font-family:'Spline Sans',sans-serif;font-weight:600;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .cc-chev{font-size:13px;color:var(--muted);transition:transform .2s}
  .cour-card.open .cc-chev{transform:rotate(180deg)}
  .cc-statusrow{display:flex;align-items:center;gap:8px;padding:0 16px 12px}
  .cc-statusrow .status-pick{flex:1;min-width:0}
  .cc-body{display:none;border-top:1px solid #e4e9f2;padding:6px 16px 14px;background:var(--paper)}
  .cour-card.open .cc-body{display:block}
  .cc-row{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid #e4e9f2;font-size:13.5px}
  .cc-row:last-of-type{border-bottom:none}
  .cc-row .lbl{color:var(--muted);font-weight:600;flex:none}
  .cc-row .vl{text-align:right;word-break:break-word}
  .cc-actions{display:flex;gap:8px;padding-top:12px}
  .cc-actions .btn{flex:1;justify-content:center}

  /* ── Фото заявок ── */
  .photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .photo-thumb{position:relative;width:84px;height:84px;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:var(--paper);flex:none}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer;display:block}
  .photo-thumb .del{position:absolute;top:3px;right:3px;width:20px;height:20px;border:none;border-radius:50%;
    background:rgba(20,30,60,.62);color:#fff;font-size:13px;line-height:1;cursor:pointer;display:grid;place-items:center}
  .photo-thumb .del:hover{background:#c0392b}
  .photo-add{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font:inherit;font-weight:600;font-size:13px;
    color:var(--rust-dk);border:1.5px dashed var(--line);border-radius:10px;padding:9px 14px;background:var(--paper);transition:.15s}
  .photo-add:hover{border-color:var(--rust);background:var(--card)}
  .photo-empty{color:var(--muted);font-size:13px;padding:6px 0}
  .photo-view-ov{position:fixed;inset:0;background:rgba(20,30,60,.88);z-index:9999;display:grid;place-items:center;padding:20px;cursor:zoom-out}
  .photo-view-ov img{max-width:94vw;max-height:90vh;border-radius:10px;box-shadow:0 20px 60px -20px #000}
  .photo-view-ov .x{position:absolute;top:18px;right:22px;font-size:34px;color:#fff;cursor:pointer;line-height:1;background:none;border:none}

  /* ── Кабинет партнёра (моб.) ── */
  .pcab{max-width:520px;margin:0 auto;min-height:100vh;min-height:100dvh;padding:18px 16px 140px;display:flex;flex-direction:column;gap:16px}
  .pcab-view{display:flex;flex-direction:column;gap:16px}
  /* нижнее меню */
  .pcab-nav{position:fixed;left:0;right:0;bottom:0;z-index:8500;display:flex;background:var(--card);
    border-top:1px solid var(--line);box-shadow:0 -4px 20px -8px rgba(20,30,60,.2);
    padding:6px 4px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px))}
  .pcab-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;
    cursor:pointer;padding:8px 4px;font:inherit;font-size:11px;font-weight:600;color:var(--muted);border-radius:12px;transition:.15s}
  .pcab-nav-btn .pn-ic{font-size:21px;line-height:1;filter:grayscale(.4);opacity:.7}
  .pcab-nav-btn.active{color:var(--rust)}
  .pcab-nav-btn.active .pn-ic{filter:none;opacity:1}
  .pcab-nav-btn:active{background:var(--paper)}
  /* приветствие */
  .pcab-hello{background:linear-gradient(135deg,#fff,var(--paper));border:1px solid var(--line);border-radius:16px;padding:16px 18px}
  .ph-greet{font-family:'Fraunces',serif;font-weight:600;font-size:21px;line-height:1.15}
  .ph-sub{margin-top:6px;font-size:14px;color:var(--muted);font-weight:600}
  .pcab-err,.pcab-empty{padding:40px 20px;text-align:center;color:var(--muted)}
  .pcab-err{min-height:100vh;display:flex;flex-direction:column;justify-content:center;font-size:18px;font-family:'Fraunces',serif}
  .pcab-top{padding-top:8px}
  .pcab-brand{display:flex;align-items:center;gap:12px}
  .pcab-logo{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--rust),var(--gold));
    display:grid;place-items:center;color:#fff;font-family:'Fraunces',serif;font-weight:900;font-size:20px}
  .pcab-logo-img{height:34px;width:auto;display:block}
  @media (max-width:380px){.pcab-logo-img{height:30px}}
  .pcab-store{font-family:'Fraunces',serif;font-weight:600;font-size:20px;line-height:1.1}
  .pcab-sub{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .pcab-call{width:100%;padding:18px 20px;border:none;border-radius:16px;background:linear-gradient(135deg,#2f8fe0,#1f6fc4);
    color:#fff;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px -6px rgba(31,111,196,.5);font-family:inherit;
    display:flex;flex-direction:column;align-items:center;gap:4px;transition:background .12s,box-shadow .12s,transform .08s}
  .pcab-call small{font-size:12px;font-weight:500;opacity:.85}
  .pcab-call.sm{padding:14px 18px;font-size:16px;margin-bottom:14px}
  .pcab-call:active{transform:scale(.98);background:linear-gradient(135deg,#34c759,#28a048);box-shadow:0 8px 24px -6px rgba(40,160,72,.55)}
  .pcab-call:disabled{opacity:.6}
  /* QR-карточка */
  .pcab-qr-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
  .pcab-qr-h{font-family:'Fraunces',serif;font-weight:600;font-size:18px}
  .pcab-qr-sub{font-size:13px;color:var(--muted);max-width:280px}
  .pcab-qr-box{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;margin:6px 0}
  .pcab-qr-box img{display:block;border-radius:6px}
  .pcab-info{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
  .pcab-row{display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:14px}
  .pcab-row span{color:var(--muted)}
  .pcab-row b{text-align:right}
  .pcab-hist-h{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:10px}
  .pcab-list{display:flex;flex-direction:column;gap:10px}
  .pcab-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .pcab-item-h{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
  .pcab-item-h span{color:var(--rust-dk);font-weight:600}
  .pcab-item-s{font-size:13px;color:var(--muted)}
  /* заполнение заказов партнёром */
  .pfill-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:4px}
  .pfill-h{font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin-bottom:8px}
  .pfill-l{font-size:12px;font-weight:600;color:var(--muted);margin-top:8px}
  .pfill-card input{font:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);width:100%}
  .pfill-card input:focus{outline:2px solid rgba(37,70,201,.25);border-color:var(--rust)}
  .pfill-track{display:flex;gap:8px}
  .pfill-track input{flex:1}
  .pfill-select{font:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);width:100%}
  .pfill-select:focus{outline:2px solid rgba(37,70,201,.25);border-color:var(--rust)}
  .pfill-card input:disabled,.pfill-select:disabled{opacity:.6;background:var(--paper)}
  /* фильтры в кабинете */
  .pcab-filters{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
  .pcab-search{font:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);width:100%}
  .pcab-search:focus{outline:2px solid rgba(37,70,201,.25);border-color:var(--rust)}
  .pcab-dates{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
  .pcab-dates label{display:flex;flex-direction:column;gap:3px;font-size:11px;font-weight:600;color:var(--muted);flex:1;min-width:120px}
  .pcab-dates input{font:inherit;font-size:14px;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink)}
  .pcab-clear{padding:9px 14px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);font-weight:600;cursor:pointer;font-size:14px}
  /* карточка заказа в кабинете */
  .pcab-ord{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;transition:border-color .15s,transform .05s}
  .pcab-ord:active{transform:scale(.99)}
  .pcab-ord:hover{border-color:var(--rust)}
  .pcab-ord.locked{opacity:.75;cursor:default}
  .pcab-ord.locked:hover{border-color:var(--line)}
  .pcab-ord-h{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .pcab-ord-h b{font-family:'Fraunces',serif;font-size:16px}
  .pcab-ord-date{font-size:12px;color:var(--muted)}
  .pcab-ord-sub{font-size:14px;color:var(--ink);margin-top:4px}
  .pcab-ord-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .pcab-tag{font-size:11.5px;font-weight:600;color:var(--muted);background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:3px 9px}
  .pcab-tag.lock{color:#1c37a0;border-color:#e0b3a3;background:#f4e0d8}
  .pcab-lockmsg{background:#f4e0d8;border:1px solid #e0b3a3;color:#1c37a0;border-radius:12px;padding:12px 14px;font-size:14px;font-weight:600}
  .pcab-ghost{background:var(--card)!important;color:var(--ink)!important;box-shadow:none!important;border:1px solid var(--line)!important}
  .pfill-scan{padding:0 14px;border:none;border-radius:10px;background:var(--moss);color:#fff;font-weight:600;cursor:pointer;white-space:nowrap;font-size:14px}
  .pfill-area{font:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);width:100%;resize:vertical;min-height:48px}
  .pfill-check{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;color:var(--ink);margin:14px 0 4px;cursor:pointer;user-select:none}
  .pfill-delivery{display:flex;flex-direction:column;gap:2px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:6px 14px;margin:4px 0 6px}
  .pfill-delivery .pfill-check{margin:8px 0}
  .pfill-check input{width:20px;height:20px;accent-color:var(--rust);cursor:pointer}
  .pfill-hint{font-size:12.5px;color:var(--muted);line-height:1.45;margin-top:6px;background:var(--paper);border:1px dashed var(--line);border-radius:10px;padding:9px 11px}
  /* блок курьерских городов */
  .pfill-cour{margin:8px 0 4px;background:#eef5ec;border:1px solid #c7e0c2;border-radius:12px;padding:11px 13px}
  .pfill-cour-h{font-size:13px;font-weight:700;color:#2f6d36;margin-bottom:6px}
  .pfill-cour-list{font-size:13px;color:var(--ink);line-height:1.6}
  .pfill-cour-note{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.4}
  /* плавающая кнопка WhatsApp «Служба поддержки» */
  .wa-fab{position:fixed;right:16px;bottom:calc(96px + env(safe-area-inset-bottom,0px));z-index:9000;display:flex;align-items:center;gap:9px;background:#25D366;color:#fff;text-decoration:none;padding:11px 16px 11px 13px;border-radius:30px;box-shadow:0 6px 20px rgba(0,0,0,.22);font-weight:700;font-size:14px}
  .wa-fab span{white-space:nowrap}
  .wa-fab:active{transform:scale(.97)}
  @media (max-width:380px){.wa-fab{padding:10px 13px;font-size:13px}}
  .pfill-area:focus{outline:2px solid rgba(37,70,201,.25);border-color:var(--rust)}
  .pfill-area:disabled{opacity:.6}
  .pfill-dyn{display:flex;flex-direction:column;gap:4px}
  .scan-ov{position:fixed;inset:0;background:rgba(20,30,60,.95);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px}
  .scan-box{width:100%;max-width:420px}
  #scanReader{width:100%;border-radius:14px;overflow:hidden;background:#000}

  /* ── Окно «Заказы заявки» ── */
  .pom-list{display:flex;flex-direction:column;gap:14px}
  .pom-order{border:1px solid var(--line);border-radius:12px;padding:14px;background:var(--paper)}
  .pom-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:4px}
  .pom-head b{font-family:'Fraunces',serif;font-size:16px}
  .pom-sub{font-size:13px;color:var(--muted);margin-bottom:10px}
  .pom-paid{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer}
  .pom-paid input{width:18px;height:18px;accent-color:var(--rust);cursor:pointer}
  .pom-paidorder{color:var(--moss)}
  .o-paidorder{display:flex;align-items:center;gap:8px;margin-top:9px;font-size:14px;font-weight:600;color:var(--moss);cursor:pointer;user-select:none}
  .o-finance{background:rgba(37,70,201,.05);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .ofin-grid{display:flex;flex-direction:column;gap:6px;margin:8px 0}
  .ofin-row{display:flex;justify-content:space-between;align-items:center;font-size:14px}
  .ofin-row span{color:var(--muted)}
  .ofin-total{border-top:1px solid var(--line);padding-top:8px;margin-top:4px;font-size:15px}
  .ofin-subtotal{border-top:1px dashed var(--line);padding-top:6px;margin-top:4px;color:var(--muted)}
  .ofin-total span{color:var(--ink);font-weight:600}
  .o-paidorder input{width:18px;height:18px;accent-color:var(--moss);cursor:pointer}
  .pom-paidhint{font-weight:400;color:var(--muted);font-size:12px}
  .pom-sumrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px}
  .pom-sumrow span{font-size:13px;color:var(--muted);font-weight:600}
  .pom-sum{width:130px;font:inherit;font-family:'Fraunces',serif;font-weight:900;font-size:15px;color:var(--rust-dk);
    padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--card);text-align:right}
  .pom-sum:focus{outline:2px solid rgba(37,70,201,.3);border-color:var(--rust)}

  /* ── Строчное редактирование заказа ── */
  .row-editing{background:var(--paper)}
  .row-editing td{padding:6px 8px}
  .row-editing input,.row-editing select{width:100%;min-width:90px;font:inherit;font-size:13px;
    padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:var(--card)}
  .row-editing input[type="date"]{min-width:130px}

  /* ── Компактные строки заказов с раскрытием ── */
  .ord-list{display:flex;flex-direction:column;gap:8px}
  .ord-row{border:1px solid var(--line);border-radius:12px;background:var(--card);box-shadow:var(--shadow);overflow:hidden}
  .ord-main{display:flex;align-items:center;gap:14px;padding:12px 14px;cursor:pointer;flex-wrap:nowrap}
  .ord-main:hover{background:rgba(20,30,60,.02)}
  .ord-id{font-family:'Fraunces',serif;font-weight:900;font-size:15px;flex:none;width:74px}
  .ord-cell{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px}
  .ord-cell .lbl{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px}
  .ord-c-client{flex:1.3}.ord-c-phone{flex:1}.ord-c-addr{flex:1.6}.ord-c-cost{flex:.7;text-align:right}
  .ord-main .status-pick{flex:none;width:140px}
  .ord-chev{flex:none;color:var(--muted);transition:transform .2s;font-size:13px}
  .ord-row.open .ord-chev{transform:rotate(180deg)}
  .ord-actions{flex:none;display:flex;gap:6px}
  .ord-details{display:none;padding:0 14px 14px;border-top:1px solid var(--line)}
  .ord-row.open .ord-details{display:block}
  .ord-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px 18px;padding:14px 0}
  .ord-f .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
  .ord-f .v{font-size:14px}
  @media (max-width:760px){
    .ord-main{flex-wrap:wrap;gap:8px}
    .ord-c-addr,.ord-c-phone{flex:1 1 100%}
    .ord-main .status-pick{width:100%}
    .ord-actions{flex:1 1 100%;justify-content:flex-end}
  }

  @media (max-width:760px){
    .grid2{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}
    .stats.stats-5,.stats.stats-1{grid-template-columns:1fr 1fr;max-width:none}
    .stats .stat{padding:13px 14px}
    .stats .stat .v{font-size:24px}
    .page-head h1{font-size:24px}
    .user-box{padding-left:10px}
    .content{padding:18px 16px}
    /* боковая панель -> выдвижное меню (off-canvas) */
    .app-body{display:block}
    .menu-toggle{display:block}
    .sidebar{position:fixed;top:0;left:0;height:100vh;width:270px;max-width:82vw;z-index:200;
      transform:translateX(-100%);transition:transform .26s ease;border-right:1px solid var(--line);
      border-bottom:none;background:var(--card);padding:18px 14px;
      overflow-y:auto;-webkit-overflow-scrolling:touch;
      display:flex;flex-direction:column;align-items:stretch;box-shadow:0 0 40px -8px rgba(20,30,60,.4)}
    .sidebar.open{transform:translateX(0)}
    .side-nav{flex-direction:column;flex-wrap:nowrap;gap:4px;overflow:visible;flex:0 0 auto}
    .side-nav button{font-size:14px;padding:11px 14px;border-radius:10px;background:transparent;border-color:transparent;justify-content:flex-start}
    .side-nav button.active{background:var(--paper);color:var(--rust-dk);border-color:var(--line)}
    .sidebar-logout{margin-top:14px;width:100%;flex:0 0 auto;border-radius:10px}
    .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(20,30,60,.45);z-index:190}
    .sidebar-backdrop.show{display:block}
    /* нижняя панель быстрых вкладок убрана на мобиле */
    .bottom-nav{display:none!important}
    /* Адаптивная таблица заявок: строки -> карточки */
    .resp-table{border:0}
    .resp-table thead{display:none}
    .resp-table,.resp-table tbody,.resp-table tr,.resp-table td{display:block;width:100%}
    .table-scroll{overflow-x:visible}
    /* грид статистики дашборда — оставляем горизонтальную прокрутку */
    .dash-stat-scroll{overflow-x:auto!important;-webkit-overflow-scrolling:touch}
    .dash-stat-scroll .dash-stat{min-width:560px}
    .resp-table tr{
      background:var(--card);border:1px solid var(--line);border-radius:14px;
      box-shadow:var(--shadow);margin-bottom:14px;padding:6px 4px;overflow:hidden;
    }
    .resp-table td{
      display:flex;justify-content:space-between;align-items:center;gap:12px;
      padding:9px 14px;border-bottom:1px solid #e4e9f2;text-align:right;
    }
    .resp-table tr td:last-child{border-bottom:0}
    .resp-table td::before{
      content:attr(data-label);font-size:11px;font-weight:700;text-transform:uppercase;
      letter-spacing:.04em;color:var(--muted);text-align:left;flex:0 0 42%;
    }
    .resp-table td[data-label=""]::before{display:none}
    .resp-table td.cell-actions{justify-content:flex-end}
    .resp-table td.cell-actions .row-actions{width:100%;justify-content:stretch;gap:8px}
    .resp-table td.cell-actions .btn{flex:1;justify-content:center}
    .resp-table .status-pick{max-width:60%}
    .resp-table .qty-edit{width:80px}
    .resp-table .status-time{text-align:right;width:100%}
    .filters .date-field input{min-width:0;width:100%}
    /* фильтры на мобиле — каждый элемент на всю ширину, ничего не налезает */
    .filters{flex-direction:column;align-items:stretch;gap:10px}
    .filters-dates{flex-direction:column;align-items:stretch}
    .filters .date-field{width:100%}
    .filters input,.filters select{width:100%}
    .filters #pfdateclear,.filters #ofdateclear{align-self:stretch!important;width:100%}
    /* сворачиваемые фильтры под кнопкой «Фильтры» */
    .filters-toggle{display:block;width:100%;justify-content:center}
    .filters-body{display:none}
    .filters-body.open{display:flex;flex-direction:column;gap:10px;width:100%}
    /* ── СВОРАЧИВАЕМЫЕ КАРТОЧКИ: свёрнуто видно только заголовок + кнопки ── */
    .resp-table tr{position:relative}
    .resp-table tr td[data-label="Наименование"],.resp-table tr td[data-label="ID"]{padding-top:13px}
    .resp-table tr td[data-label="Наименование"]::after,.resp-table tr td[data-label="ID"]::after{
      content:"▾";position:absolute;right:14px;color:var(--rust);font-size:14px;transition:transform .2s}
    .resp-table tr.open td[data-label="Наименование"]::after,.resp-table tr.open td[data-label="ID"]::after{transform:rotate(180deg)}
    /* свёрнутая строка: прячем все ячейки кроме заголовка и блока действий */
    .resp-table tr:not(.open) td{display:none}
    .resp-table tr:not(.open) td[data-label="Наименование"],
    .resp-table tr:not(.open) td[data-label="ID"],
    .resp-table tr:not(.open) td[data-label="Отправитель"],
    .resp-table tr:not(.open) td[data-label="ФИО клиента"],
    .resp-table tr:not(.open) td[data-label="Город"],
    .resp-table tr:not(.open) td[data-label="Статус"]{display:flex;border-bottom:1px solid #e4e9f2}
    .resp-table tr:not(.open) td[data-label="ID"]{border-bottom:1px solid #e4e9f2}
    .resp-table tr:not(.open) td.cell-actions{display:flex;border-top:1px solid #e4e9f2}
    .show-more{display:block;width:100%;margin:4px 0 6px;justify-content:center}
    .list-count{display:block;text-align:center;font-size:12px;color:var(--muted);padding:4px 0 2px}
  }

  /* ── Загрузочный экран (сплэш) ── */
  #splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#eef2f8 0%,#f7f9fc 55%,#eaeef6 100%);
    font-family:'Spline Sans',system-ui,sans-serif;padding:24px;text-align:center;transition:opacity .45s ease;}
  #splash.hide{opacity:0;pointer-events:none;}
  .sp-logo{display:flex;align-items:center;gap:14px;margin-bottom:30px}
  .sp-logo-img{height:54px;width:auto;display:block}
  @media (max-width:560px){.sp-logo-img{height:42px}}
  .sp-logo .mk{width:74px;height:74px;border-radius:18px;display:grid;place-items:center;
    background:linear-gradient(135deg,#16407a,#1f5fb0 55%,#d9a531);box-shadow:0 14px 34px -14px rgba(22,64,122,.6)}
  .sp-logo .mk svg{width:42px;height:42px}
  .sp-name{font-family:'Fraunces',serif;font-weight:900;font-size:34px;letter-spacing:-.02em;line-height:1}
  .sp-name .b{color:#16407a}.sp-name .g{color:#d9a531}
  .sp-name small{display:block;font-family:'Spline Sans',sans-serif;font-weight:600;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:#7d899c;margin-top:5px}
  .sp-title{font-family:'Fraunces',serif;font-weight:600;font-size:22px;color:#1a2540;margin-bottom:6px}
  .sp-sub{font-size:14px;color:#7d899c;margin-bottom:22px;max-width:420px}
  .sp-bar{width:min(320px,80vw);height:10px;border-radius:20px;background:#dde4ee;overflow:hidden;position:relative}
  .sp-bar i{position:absolute;top:0;left:0;height:100%;width:40%;border-radius:20px;
    background:linear-gradient(90deg,#d9a531,#e7be57);animation:spbar 1.25s ease-in-out infinite}
  @keyframes spbar{0%{left:-42%}100%{left:102%}}
  .sp-wait{font-size:13px;color:#9aa4b4;margin-top:14px}
  .sp-feats{display:flex;gap:26px;flex-wrap:wrap;justify-content:center;margin-top:40px}
  .sp-feat{display:flex;align-items:center;gap:9px;font-size:13.5px;color:#41506b;font-weight:600}
  .sp-feat svg{width:22px;height:22px;color:#16407a;flex:none}
  @media (max-width:560px){.sp-name{font-size:27px}.sp-feats{gap:16px}.sp-feat{font-size:12.5px}}

  /* ── История изменений ── */
  .log-act{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
  .log-act.create{color:#2f6d36;background:#e7f1e6;border:1px solid #bcd9bb}
  .log-act.update{color:#8a5a12;background:#f6eed6;border:1px solid #e3cf9c}
  .log-act.delete{color:#1c37a0;background:#f4e0d8;border:1px solid #e0b3a3}
  .log-act.status{color:#2b5c8a;background:#e2edf6;border:1px solid #aecbe6}
  .log-act.ket{color:#fff;background:var(--moss);border:1px solid var(--moss)}
  .log-act.login,.log-act.logout{color:#5a4a8a;background:#ece8f6;border:1px solid #cabfe6}
  .log-when{white-space:nowrap;font-size:12.5px;color:var(--muted)}
  .log-when b{display:block;color:var(--ink);font-weight:600;font-size:13px}
  .log-changes{display:flex;flex-direction:column;gap:3px;margin-top:2px}
  .log-chg{font-size:12px;line-height:1.35}
  .log-chg .f{color:var(--muted);font-weight:600}
  .log-chg .old{color:#1c37a0;text-decoration:line-through;opacity:.8}
  .log-chg .arr{color:var(--muted);margin:0 4px}
  .log-chg .new{color:#2f6d36;font-weight:600}
  .log-user{font-weight:600;white-space:nowrap}
  /* ── Плавающая панель пагинации заказов ── */
  .orders-pager{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:8000;
    display:flex;align-items:center;gap:18px;background:var(--card);border:1px solid var(--line);
    border-radius:30px;box-shadow:0 8px 28px -8px rgba(20,30,60,.4);padding:9px 18px}
  .orders-pager .op-info{font-size:13px;color:var(--muted);white-space:nowrap}
  .orders-pager .op-info b{color:var(--ink);font-weight:700}
  .orders-pager .op-nav{display:flex;align-items:center;gap:6px}
  .orders-pager .op-btn{font:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);
    background:var(--paper);color:var(--ink);border-radius:8px;padding:6px 11px;transition:.15s}
  .orders-pager .op-btn:hover:not(:disabled){background:var(--rust);color:#fff;border-color:var(--rust)}
  .orders-pager .op-btn:disabled{opacity:.4;cursor:default}
  .orders-pager .op-page{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;padding:0 4px}
  .orders-pager .op-perpage{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);white-space:nowrap}
  .op-pp-wrap{position:relative}
  .op-pp-btn{font-weight:700!important}
  .op-pp-menu{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--card);border:1px solid var(--line);
    border-radius:12px;box-shadow:0 10px 30px -8px rgba(20,30,60,.45);padding:6px;display:flex;flex-direction:column;gap:2px;min-width:90px;max-height:260px;overflow:auto;z-index:8100}
  .op-pp-item{font:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--ink);
    border-radius:8px;padding:8px 14px;text-align:left;transition:.12s}
  .op-pp-item:hover{background:var(--paper)}
  .op-pp-item.active{background:var(--rust);color:#fff}
  @media (max-width:760px){
    .orders-pager{flex-direction:column;gap:7px;bottom:8px;padding:8px 12px;width:calc(100% - 20px);max-width:440px}
    .orders-pager .op-info{font-size:12px}
    .orders-pager .op-btn{padding:6px 9px;font-size:12px}
    .orders-pager .op-perpage{font-size:12px}
    /* контент с пагинацией: освобождаем место снизу, чтобы карточки не прятались под панелью */
    .content.has-pager{padding-bottom:150px}
  }
  /* десктоп: тоже небольшой запас снизу при пагинации */
  .content.has-pager{padding-bottom:96px}
</style>
</head>
<body>

<!-- ЗАГРУЗОЧНЫЙ ЭКРАН -->

/* ---------- ЗАПОМИНАНИЕ ВКЛАДКИ (чтобы при обновлении остаться на месте) ---------- */
const NAV_KEY='jyldam_nav';
function saveNav(){
  try{localStorage.setItem(NAV_KEY,JSON.stringify({tab:S.tab,dir:S.dir,users:(typeof usersSub!=='undefined'?usersSub:'staff')}));}catch(e){}
}
function loadNav(){
  try{const raw=localStorage.getItem(NAV_KEY);if(!raw)return;const n=JSON.parse(raw);
    if(n.tab)S.tab=n.tab;if(n.dir)S.dir=(n.dir==='partners'?'cities':n.dir);if(n.users&&typeof usersSub!=='undefined')usersSub=n.users;
  }catch(e){}
}

/* ---------- DATA LAYER ---------- */
async function dbList(table,opts={}){
  // Supabase отдаёт максимум 1000 строк за запрос. Если строк больше — грузим постранично.
  const PAGE=1000;
  const fetchPage=(from,to)=>{
    let q=sb.from(table).select('*');
    if(opts.order) q=q.order(opts.order,{ascending:opts.asc!==false});
    q=q.range(from,to);
    return Promise.race([q,new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),15000))]);
  };
  try{
    let all=[],from=0;
    while(true){
      const res=await fetchPage(from,from+PAGE-1);
      const {data,error}=res;
      if(error){console.error(table,error);return all;}
      const chunk=data||[];
      all=all.concat(chunk);
      if(chunk.length<PAGE)break; // последняя страница
      from+=PAGE;
      if(from>50000)break; // предохранитель от бесконечного цикла
    }
    return all;
  }catch(e){console.error('dbList',table,e&&e.message);return [];}
}

// карта таблица→ключ кэша в S (для поиска "до" и подписи)
const TABLE_ARRKEY={partners:'partners',cities:'cities',districts:'districts',couriers:'couriers',order_couriers:'order_couriers',sales_managers:'sales',processors:'processors',statuses:'statuses',order_statuses:'orderStatuses',delivery_types:'delivery',courier_cities:'courier_cities',post_ips:'post_ips',profiles:'profiles',roles:'roles',warehouses:'warehouses'};
function recLabel(rec){return rec?(rec.name||rec.fio||rec.full_name||rec.code||rec.email||('#'+rec.id)):'';}
function findCached(table,id){const k=TABLE_ARRKEY[table];const arr=k&&S[k];return Array.isArray(arr)?arr.find(x=>x&&x.id===id):null;}
async function dbInsert(table,row){
  const {data,error}=await sb.from(table).insert(row).select().single();
  if(error){console.error('insert',table,error);toast('Ошибка: '+error.message);return null;}
  if(AUTO_LOG_TABLES.has(table))logAction('create',table,{entity_id:data.id,entity_label:recLabel(data)});

}
async function dbUpdate(table,id,row){
  const before=AUTO_LOG_TABLES.has(table)?findCached(table,id):null;
  const beforeCopy=before?Object.assign({},before):null;
  const {data,error}=await sb.from(table).update(row).eq('id',id).select().single();
  if(error){console.error('update',table,error);toast('Ошибка: '+error.message);return null;}
  if(AUTO_LOG_TABLES.has(table)){const ch=buildChanges(beforeCopy,data);if(ch.length)logAction('update',table,{entity_id:id,entity_label:recLabel(data),changes:ch});}
  return data;
}
async function dbDelete(table,id){

  const {error}=await sb.from(table).delete().eq('id',id);

  if(AUTO_LOG_TABLES.has(table))logAction('delete',table,{entity_id:id,entity_label:lbl});

}

const PHOTO_BUCKET='pickup-photos';
// сжимает изображение в браузере перед загрузкой: уменьшает до maxSide px и пережимает в JPEG.
// Возвращает Blob (или исходный файл, если сжать не удалось).
async function compressImage(file,maxSide=1280,quality=0.72){
  try{
    if(!file||!/^image\//.test(file.type||''))return file; // не картинка — как есть
    const dataUrl=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(file);});
    const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=dataUrl;});
    let {width:w,height:h}=img;
    if(w<=maxSide&&h<=maxSide&&file.size<600*1024)return file; // уже маленькое — не трогаем
    if(w>h){if(w>maxSide){h=Math.round(h*maxSide/w);w=maxSide;}}
    else{if(h>maxSide){w=Math.round(w*maxSide/h);h=maxSide;}}
    const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
    const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);
    const blob=await new Promise(res=>canvas.toBlob(res,'image/jpeg',quality));
    if(!blob||blob.size>=file.size)return file; // если не стало меньше — оставляем оригинал
    return blob;
  }catch(e){console.error('compress',e);return file;}
}
// загружает файл в подпапку prefix (например 'order/ID'), возвращает {path,url} или null
async function uploadPhoto(prefix,file){
  try{
    // сжимаем фото перед загрузкой — ускоряет и загрузку, и показ
    const blob=await compressImage(file);
    const path=`${prefix}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
    const {error}=await sb.storage.from(PHOTO_BUCKET).upload(path,blob,{contentType:'image/jpeg',upsert:false});
    if(error){console.error('upload',error);toast('Ошибка загрузки: '+error.message);return null;}
    const {data}=sb.storage.from(PHOTO_BUCKET).getPublicUrl(path);

    return {path,url:data.publicUrl,by:(S.me&&(S.me.full_name||S.me.email))||'',at:new Date().toISOString()};

// собрать данные заказа в формат KET
function orderToKet(o){
  const courier=isCourierDelivery(o.delivery_id);
  // город НАЗНАЧЕНИЯ: для курьерской — курьерский справочник, для почтовой — обычный
  const cityNm=courier?courierCityName(o.courier_city_id):(o.city_id?cityName(o.city_id):'');
  // «отправная точка» для KET — КОД по ГОРОДУ ЗАБОРА (откуда забрали): Астана→ASTANA-KURER, Алматы→ALMATA
  const pickupCityNm=o.pickup_city_id?cityName(o.pickup_city_id):'';
  const originCode=ketOriginCode(pickupCityNm);
  // сумма: сначала order_sum, иначе cost (дубль). Идёт и в price, и в total_price
  const sumVal=(o.order_sum!=null&&o.order_sum!=='')?o.order_sum:(o.cost!=null?o.cost:0);
  const sumStr=String(sumVal||0);
  const data={
    phone:'7'+(o.phone||''),                 // телефон в формате 7XXXXXXXXXX (* обязательное)
    country:'kz',                            // код страны (* обязательное)
    offer:'tovar',                           // тех. название товара (* обязательное)
    order_id:o.code||o.id,                   // наш ID для синхронизации
    name:o.client||'',                       // ФИО клиента
    addr:o.address||'',                      // адрес
    price:sumStr,                            // стоимость
    total_price:sumStr,                      // итоговая стоимость (KET требует оба)
    saller_butique:o.sender||'',             // продавец/бутик
  };
  if(o.index)data.index=o.index;             // индекс (для почты)
  if(o.deliver_date)data.date_delivery=o.deliver_date; // дата доставки (YYYY-MM-DD), имя поля по требованию KET
  // дата принятия/подтверждения заказа = дата создания заказа в нашей системе (YYYY-MM-DD)
  // для курьерки это «принятие», для обзвона — «подтверждение»; в KET это одно поле fill_date
  const fillDate=(o.created_at||'').slice(0,10);
  if(fillDate)data.fill_date=fillDate;
  if(courier){
    // КУРЬЕРСКАЯ доставка: KET ждёт kz_delivery = числовой код города назначения
    const code=ketDeliveryCode(cityNm);
    if(code!=null)data.kz_delivery=String(code);
    // дублируем название города (не мешает, помогает KET сопоставить)
    if(cityNm&&cityNm!=='—')data.city=cityNm;
  }else{
    // ПОЧТОВАЯ доставка
    if(cityNm&&cityNm!=='—')data.city=cityNm;
    else data.kz_delivery='32';              // почта, если город не задан
  }
  // «отправная точка» — КОД города отправления (KET-параметр city_from)
  if(originCode)data.city_from=originCode;
  return data;
}
// сопоставление города заказа с кодом отправной точки KET
function ketOriginCode(cityName){
  const nm=(cityName||'').toLowerCase();
  if(/алмат/.test(nm))return 'ALMATA';
  if(/астан|нур-?султан|нур\s*султан/.test(nm))return 'ASTANA-KURER';
  return '';
}
// КОД типа доставки KET по городу НАЗНАЧЕНИЯ (поле kz_delivery) для курьерской доставки.
// Сопоставление по ключевым словам в названии города (рус/каз/лат варианты).
const KET_DELIVERY_CODES=[
  [/актау|aktau/i,2],[/актобе|aktobe/i,3],[/алмат|almat/i,4],
  [/астан|нур-?султан|astana/i,5],[/атырау|atyrau/i,6],
  [/караганд|karagand/i,10],[/кокшетау|kokshetau/i,11],[/костанай|kostanai/i,12],
  [/кызылорд|kyzylord/i,14],[/павлодар|pavlodar/i,15],[/петропавл|petropavl/i,16],
  [/сарыагаш|saryagash/i,19],[/семей|semei/i,21],[/шымкент|шимкент|shimkent|chimkent/i,22],
  [/талдыкорган|taldykorgan/i,23],[/тараз|taraz/i,24],[/туркестан|turkestan/i,26],
  [/уральск|uralsk/i,27],[/усть-?каменогорск|ust-?kamenogorsk/i,28],
  [/жетысай|zhetysai/i,30],[/жезказган|zhezkazgan/i,31],[/кентау|kentau/i,93],
];
function ketDeliveryCode(cityName){
  const nm=(cityName||'').trim();
  if(!nm)return null;
  for(const [re,code] of KET_DELIVERY_CODES){if(re.test(nm))return code;}
  return null; // город не в списке курьерских — код не найден
}
// выбор аккаунта KET по ГОРОДУ ЗАБОРА заказа: Алматы → отдельный аккаунт, иначе (Астана и пр.) → основной
function ketAccountForOrder(o){
  const nm=(o&&o.pickup_city_id?cityName(o.pickup_city_id):'').toLowerCase();
  if(/алмат/.test(nm))return 'almaty';
  return 'astana'; // основной (старый) аккаунт по умолчанию
}
// отправить один заказ в KET
async function sendOrderToKet(o){
  if(!o.phone||o.phone.length<10){toast('У заказа нет телефона клиента');return false;}
  toast('Отправка в KET…');
  const r=await callKet({action:'send',account:ketAccountForOrder(o),order:orderToKet(o)});
  if(r.error){toast('Ошибка KET: '+r.error);return false;}
  const result=(r.ket&&r.ket.result)||{};
  if((result.success||'').toUpperCase()==='TRUE'){
    const ketId=result.id||null;
    const u=await dbUpdate('orders',o.id,{ket_id:ketId,ket_synced_at:new Date().toISOString()});
    if(u)Object.assign(o,u);
    logAction('ket','orders',{entity_id:o.id,entity_label:orderLabel(o),meta:{ket_id:ketId}});
    toast('Заказ отправлен в KET (ID '+(ketId||'?')+')');
    renderOrders();return true;
  }else{
    toast('KET отклонил: '+(result.message||'неизвестно'));return false;
  }
}
// дефолтные права на случай отсутствия роли — выводим из base_type
function defaultPerms(base){
  const full={view:true,create:true,edit:true,delete:true};
  const ro={view:true,create:false,edit:false,delete:false};
  const no={view:false,create:false,edit:false,delete:false};
  if(base==='admin') return {pickups:full,orders:full,directories:full,users:full};
  if(base==='courier') return {pickups:{view:true,create:false,edit:true,delete:false},orders:{view:true,create:false,edit:true,delete:false},directories:no,users:no};
  return {pickups:full,orders:full,directories:ro,users:no}; // staff/manager
}
function computeMyPerms(){
  // 1) пробуем по role_id из справочника
  let roleRow=null;
  if(S.me.role_id) roleRow=S.roles.find(r=>r.id===S.me.role_id);
  if(roleRow){
    S.myBaseType=roleRow.base_type||'staff';
    const base=defaultPerms(S.myBaseType);
    S.myPerms=Object.assign({},base,roleRow.perms||{});
    // гарантируем все модули
    ['pickups','orders','directories','users'].forEach(m=>{if(!S.myPerms[m])S.myPerms[m]=base[m];});
    return;
  }
  // 2) fallback на старое текстовое поле role
  const base=(S.me.role==='admin')?'admin':(S.me.role==='courier')?'courier':'staff';
  S.myBaseType=base;
  S.myPerms=defaultPerms(base);
}

async function doLogin(){

  errEl.textContent='';
  if(!login||!password){errEl.textContent='Введите логин и пароль.';return;}
  // если введён телефон (не email) — превращаем в технический email
  let email=login;
  if(!login.includes('@')){
    const digits=login.replace(/\D/g,'').replace(/^[78](?=\d{10}$)/,'').slice(-10);
    if(digits.length===10) email=digits+'@jyldam.local';
  }
  const btn=$('loginBtn');btn.disabled=true;btn.textContent='Входим…';
  const {data,error}=await sb.auth.signInWithPassword({email,password});
  btn.disabled=false;btn.textContent='Войти';

// ── ФОНОВОЕ АВТООБНОВЛЕНИЕ ДАННЫХ (каждые 30 сек, безопасно) ──
let _autoRefreshTimer=null;
function startAutoRefresh(){
  if(_autoRefreshTimer)clearInterval(_autoRefreshTimer);
  _autoRefreshTimer=setInterval(autoRefreshTick,30000); // 30 секунд
}
// можно ли сейчас обновлять — НЕ обновляем, если пользователь работает
let _lastScrollAt=0;
window.addEventListener('scroll',()=>{_lastScrollAt=Date.now();},{passive:true});
function canAutoRefresh(){
  // открыта любая модалка/карточка — не трогаем (чтобы не сбросить ввод)
  if(document.querySelector('.overlay'))return false;
  // пользователь печатает/выбирает в каком-то поле — не трогаем
  const a=document.activeElement;
  if(a&&/^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName))return false;
  // пользователь активно листает (скроллил менее 3 сек назад) — не дёргаем
  if(Date.now()-_lastScrollAt<3000)return false;
  // вкладка браузера не активна — нет смысла (обновим, когда вернётся)
  if(document.hidden)return false;
  // на экране входа — не обновляем
  if($('loginScreen')&&$('loginScreen').style.display!=='none')return false;
  return true;
}
async function autoRefreshTick(){
  if(!canAutoRefresh())return; // занят — пропускаем этот цикл, попробуем через 30 сек
  try{
    // запоминаем позицию прокрутки, чтобы не «дёргать» экран при перерисовке
    const sx=window.scrollX, sy=window.scrollY;
    await refreshForTab(S.tab);   // тихо тянем свежие данные для текущего раздела
    if(canAutoRefresh()){
      render(); // перерисовываем, только если за время загрузки никто не начал работать
      requestAnimationFrame(()=>{try{window.scrollTo(sx,sy);}catch(e){}});
    }
  }catch(e){console.error('autoRefresh',e);}
}

/* ---------- PHONE ---------- */
function phoneStored(v){let d=(v||'').replace(/\D/g,'');if(d.length===11&&(d[0]==='7'||d[0]==='8'))d=d.slice(1);return d.slice(0,10);}
function fmt10(d){d=(d||'').slice(0,10);let o='';if(d.length>0)o+='('+d.slice(0,3);if(d.length>=3)o+=')';
  if(d.length>3)o+=' '+d.slice(3,6);if(d.length>6)o+='-'+d.slice(6,8);if(d.length>8)o+='-'+d.slice(8,10);return o;}
function phoneDisplay(v){const d=phoneStored(v);return d?'+7 '+fmt10(d):'';}
// кликабельный телефон для звонка с мобильного
function phoneLink(v){const d=phoneStored(v);if(!d)return '—';return `<a href="tel:+7${d}" style="color:inherit;text-decoration:none;border-bottom:1px dotted var(--muted)">${esc('+7 '+fmt10(d))}</a>`;}
// ссылка на адрес в 2ГИС (открывает поиск адреса в приложении/сайте)
function address2gis(addr,cityNm,orgName){
  const a=(addr||'').trim();
  if(!a)return '<span style="color:var(--muted)">адрес не указан</span>';
  // запрос для 2ГИС: «Название организации, Город, адрес» — чтобы 2ГИС нашёл сам магазин, а не только точку на карте
  const org=(orgName||'').trim();
  const q=(org?org+', ':'')+(cityNm&&cityNm!=='—'?cityNm+', ':'')+a;
  // без href/target — открытие делает только open2gis() по клику, чтобы сайт не открывался параллельно
  return `<a class="addr-link" role="button" tabindex="0" data-gis="${esc(q)}">📍 ${esc(a)}</a>`;
}
// открыть адрес в приложении 2ГИС (deep link). Сайт НЕ открываем
function open2gis(query){
  const q=encodeURIComponent(query);
  const isMobile=/android|iphone|ipad|ipod/i.test(navigator.userAgent||'');
  if(!isMobile){
    // на компьютере приложения нет — открываем сайт в новой вкладке
    window.open('https://2gis.kz/search/'+q,'_blank','noopener');
    return;
  }
  // на телефоне — только схема приложения; сайт не вызываем, кабинет остаётся открытым
  window.location.href='dgis://2gis.ru/search/'+q;
}
function attachPhone(id,initial){
  const el=$(id);if(!el)return;
  if(!el.parentElement.classList.contains('phone-wrap')){
    const w=document.createElement('div');w.className='phone-wrap';el.parentElement.insertBefore(w,el);
    const pre=document.createElement('span');pre.className='phone-pre';pre.textContent='+7';w.appendChild(pre);w.appendChild(el);
  }
  el.dataset.phone=phoneStored(initial);el.value=el.dataset.phone?fmt10(el.dataset.phone):'';el.setAttribute('placeholder','(___) ___-__-__');
  el.addEventListener('input',()=>{
    // сколько цифр было слева от курсора ДО переформатирования
    const selStart=el.selectionStart||0;
    const digitsBeforeCaret=(el.value.slice(0,selStart).match(/\d/g)||[]).length;
    const d=el.value.replace(/\D/g,'').slice(0,10);
    el.dataset.phone=d;el.value=fmt10(d);
    // ставим курсор после того же количества цифр (учитывая скобки/дефисы формата)
    let pos=0,seen=0;
    while(pos<el.value.length&&seen<digitsBeforeCaret){if(/\d/.test(el.value[pos]))seen++;pos++;}
    requestAnimationFrame(()=>{try{el.setSelectionRange(pos,pos);}catch(e){}});
  });
}
function phoneVal(id){const el=$(id);return el?(el.dataset.phone||''):'';}
function val(id){const el=$(id);return el?el.value:'';}

function buildNav(){
  const courier=isCourierBase();
  // структура: группы и пункты. active:false — нарисован, но неактивен
  const groups=[];
  if(!courier){
    // Дашборд (только staff/admin)
    const main=[];
    main.push({k:'dashboard',label:'Дашборд',icon:'dashboard'});
    if(can('pickups','view'))main.push({k:'pickups',label:'Заявки на забор',icon:'pickups'});
    if(can('orders','view'))main.push({k:'orders',label:'Заказы',icon:'orders'});
    groups.push({title:'Основное',items:main});

    const delivery=[];
    if(can('orders','view'))delivery.push({k:'courier',label:'Курьерская доставка',icon:'courier'});
    if(can('orders','view'))delivery.push({k:'mail',label:'Почтовая доставка',icon:'mail'});
    if(isAdmin())delivery.push({k:'intercity',label:'Отправки межгород',icon:'intercity'});
    if(delivery.length)groups.push({title:'Доставка',items:delivery});

    // раздел «Деньги» — только админ
    if(isAdmin()){
      const money=[];
      money.push({k:'cash',label:'Касса',icon:'cash'});
      money.push({k:'calc',label:'Калькуляция',icon:'calc'});
      groups.push({title:'Деньги',items:money});
    }

    // неактивные разделы-заготовки (из референса)
    const partnerItems=[];
    if(can('directories','view'))partnerItems.push({k:'partners',label:'Партнёры',icon:'partners'});
    if(partnerItems.length)groups.push({title:'Партнёры',items:partnerItems});
    const histItems=[];
    if(isStaff())histItems.push({k:'history',label:'История изменений',icon:'history'}); // менеджеры и админ
    histItems.push({k:'notify',label:'Уведомления',icon:'bell',disabled:true});
    groups.push({title:'История',items:histItems});

    const team=[];
    if(can('users','view'))team.push({k:'users',label:'Сотрудники',icon:'users'});
    if(can('directories','view'))team.push({k:'settings',label:'Справочники',icon:'settings'});
    team.push({k:'tariffs',label:'Тарифы',icon:'tariffs',disabled:true});
    groups.push({title:'Команда и настройки',items:team});
  }else{
    // курьер: только свои разделы, без групп
    const items=[];
    if(can('pickups','view'))items.push({k:'pickups',label:'Мои заборы',icon:'pickups'});
    if(can('orders','view'))items.push({k:'orders',label:'Мои заказы',icon:'orders'});
    groups.push({title:'',items});
  }
  // собрать список активных ключей для проверки текущей вкладки
  const activeKeys=[];groups.forEach(g=>g.items.forEach(it=>{if(!it.disabled)activeKeys.push(it.k);}));
  if(!activeKeys.length)activeKeys.push('none');
  if(!activeKeys.includes(S.tab))S.tab=activeKeys[0];

  let html='';
  groups.forEach(g=>{
    if(g.title)html+=`<div class="nav-group">${esc(g.title)}</div>`;
    g.items.forEach(it=>{
      const cls=[it.disabled?'disabled':'',S.tab===it.k?'active':''].filter(Boolean).join(' ');
      html+=`<button data-tab="${it.k}" class="${cls}" ${it.disabled?'data-disabled="1"':''}>${ICONS[it.icon]||''}<span>${esc(it.label)}</span></button>`;
    });
  });
  $('navTabs').innerHTML=html;
  $('navTabs').querySelectorAll('[data-tab]').forEach(b=>b.onclick=async()=>{
    if(b.dataset.disabled){toast('Раздел в разработке');return;}
    S.tab=b.dataset.tab;saveNav();buildNav();closeSidebar();
    $('main').innerHTML='<div class="loading">Обновляем данные…</div>';
    await refreshForTab(S.tab);
    render();
  });
  buildBottomNav();
}

// нижняя панель быстрых вкладок (мобильная). Показывает 4 частых раздела + «Ещё» (открывает полное меню)
function buildBottomNav(){
  const el=$('bottomNav');if(!el)return;
  let items=[];
  if(isCourierBase()){
    if(can('pickups','view'))items.push({k:'pickups',label:'Заборы',icon:'pickups'});
    if(can('orders','view'))items.push({k:'orders',label:'Заказы',icon:'orders'});
  }else{
    items.push({k:'dashboard',label:'Дашборд',icon:'dashboard'});
    if(can('pickups','view'))items.push({k:'pickups',label:'Заборы',icon:'pickups'});
    if(can('orders','view'))items.push({k:'orders',label:'Заказы',icon:'orders'});
    if(can('directories','view'))items.push({k:'partners',label:'Партнёры',icon:'partners'});
  }
  items=items.slice(0,4); // максимум 4 быстрых
  let html=items.map(it=>`<button data-bn="${it.k}" class="${S.tab===it.k?'active':''}">${ICONS[it.icon]||''}<span>${esc(it.label)}</span></button>`).join('');
  // кнопка «Ещё» — открывает полное боковое меню
  html+=`<button data-bnmore="1"><span class="bn-more">☰</span><span>Ещё</span></button>`;
  el.innerHTML=html;
  el.querySelectorAll('[data-bn]').forEach(b=>b.onclick=async()=>{
    S.tab=b.dataset.bn;saveNav();buildNav();closeSidebar();
    $('main').innerHTML='<div class="loading">Обновляем данные…</div>';
    await refreshForTab(S.tab);render();
  });
  const more=el.querySelector('[data-bnmore]');
  if(more)more.onclick=()=>openSidebar();
}
let hf={q:'',action:'',entity:'',user:'',from:'',to:''};
const ACTION_LABEL={create:'Создание',update:'Изменение',delete:'Удаление',status:'Смена статуса',ket:'Отправка в KET',login:'Вход',logout:'Выход'};

async function loadActivityLog(){
  try{
    const {data,error}=await sb.from('activity_log').select('*').order('created_at',{ascending:false}).limit(1000);
    if(error){console.error('activity_log',error);S.activityLog=[];return;}
    S.activityLog=data||[];

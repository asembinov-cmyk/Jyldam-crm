function visibleOrders(){
  if(isCourier()){const ids=myOrderCourierIds();return S.orders.filter(o=>ids.includes(o.order_courier_id));}
  return S.orders;
}
function genOrderCode(){
  const ex=new Set(S.orders.map(o=>o.code));let c;
  do{c=String(Math.floor(1000000+Math.random()*9000000));}while(ex.has(c));
  return c;
}
// сколько заказов уже создано по этой заявке
function ordersCountForPickup(pickupId){return S.orders.filter(o=>o.pickup_id===pickupId).length;}
// Создаёт недостающие заказы-заготовки по заявке, подтягивая данные магазина-партнёра
const _creatingOrders={}; // защита от параллельного создания заказов по одной заявке
async function createOrdersFromPickup(pickupId,opts){
  opts=opts||{};
  const p=S.pickups.find(x=>x.id===pickupId);if(!p)return;
  // если по этой заявке уже идёт создание — не запускаем второй раз (защита от двойного клика/гонки)
  if(_creatingOrders[pickupId]){if(!opts.silent)toast('Заказы уже создаются…');return;}
  const want=Math.max(0,parseInt(p.orders||'0',10)||0);
  if(!want){if(!opts.silent)toast('Укажите количество заказов');return;}
  const have=ordersCountForPickup(pickupId);
  const need=want-have;
  if(need<=0){if(!opts.silent)toast(have?`Уже создано ${have} заказ(ов) по заявке`:'Нечего создавать');return;}
  _creatingOrders[pickupId]=true;
  try{
    // ищем партнёра по имени из заявки, чтобы подтянуть его данные
    const partner=S.partners.find(x=>x.name===p.name)||null;
    // тип доставки по умолчанию — курьерский, если есть такой тип
    const courierDelivery=S.delivery.find(x=>/курьер/i.test(x.name));
    const baseStatus=defaultOrderStatusId();
    let created=0;
    for(let i=0;i<need;i++){
      // перепроверяем фактическое количество перед КАЖДОЙ вставкой — не создаём лишнего
      if(ordersCountForPickup(pickupId)>=want)break;
      const row={
        code:genOrderCode(),
        pickup_id:pickupId,
        partner_id:partner?partner.id:null,
        sender:partner?partner.name:(p.name||''),
        pickup_date:p.pickup_date||null,
        phone:'', // телефон клиента-получателя заполняется вручную, не телефон магазина
        address:'', // адрес доставки клиента заполняется вручную, не адрес магазина
        client:'',weight:null,qty:1,
        delivery_id:courierDelivery?courierDelivery.id:null,
        courier_city_id:null,
        pickup_city_id:partner?partner.city_id||null:(p.city_id||null), // город забора из партнёра/заявки
        status_id:baseStatus,
        sales_id:partner?partner.sales_id:(p.sales_id||null),
        processor_id:partner?partner.processor_id:(p.processor_id||null),
        cost:partner?(courierDelivery?partner.tariff_courier:partner.tariff_post)||0:0,
        index:'',track:'',pay_date:null,post_ip_id:null,order_courier_id:null
      };
      const u=await dbInsert('orders',row);
      if(u){S.orders.unshift(u);created++;}
    }
    if(created&&!opts.silent)toast(`Создано заказов: ${created}`);
    return created;
  }finally{
    delete _creatingOrders[pickupId]; // снимаем блокировку в любом случае
  }
}
// Окно: список заказов, созданных по заявке, с возможностью прикрепить фото к каждому
async function pickupOrdersModal(pickupId){
  const p=S.pickups.find(x=>x.id===pickupId);if(!p)return;
  const canEditPhoto=can('orders','edit')||isCourier();
  // АВТОСОЗДАНИЕ: при открытии формируем недостающие заказы по количеству из заявки
  const want=parseInt(p.orders||'0',10)||0;
  const have=ordersCountForPickup(pickupId);
  if(want>have){await createOrdersFromPickup(pickupId,{silent:true});}
  const renderBody=()=>{
    const list=S.orders.filter(o=>o.pickup_id===pickupId);
    const wantNow=parseInt(p.orders||'0',10)||0;
    const head=`<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
      <div style="color:var(--muted);font-size:14px">Создано <b>${list.length}</b>${wantNow?` из ${wantNow}`:''} заказ(ов) по магазину «${esc(p.name)}»</div>
      <button class="btn sm primary" id="pom_create">＋ Создать ещё заказ</button>
    </div>`;
    if(!list.length)return head+`<div class="empty"><div class="big">Заказов пока нет</div>Нажмите «Создать ещё заказ».</div>`;
    const cards=list.map((o,i)=>`<div class="pom-order">
      <div class="pom-head"><b>Заказ #${esc(o.code)}</b><span class="pom-st">${statusBadge(o.status_id)}</span></div>
      <div class="pom-sub">${esc(o.client||'без клиента')} · ${o.phone?esc(phoneDisplay(o.phone)):'—'} · ${esc(deliveryName(o.delivery_id))||'—'}</div>
      <div class="pom-photos" data-pomphotos="${o.id}">${photoBlockHtml(o,canEditPhoto)}</div>
      ${isStaff()?`
      <div class="pom-sumrow"><span>Сумма заказа (₸)</span><input type="number" min="0" class="pom-sum" data-pomsum="${o.id}" value="${o.order_sum!=null?esc(o.order_sum):''}" placeholder="—" ${o.paid_by_sender?'disabled':''}></div>
      `:''}
      ${(isStaff()||isCourier())?`
      <label class="pom-paid pom-paidorder"><input type="checkbox" data-pompaid="${o.id}" ${o.paid_by_sender?'checked':''}> Оплачено отправителем <span class="pom-paidhint">(сумма станет 0)</span></label>
      `:''}
    </div>`).join('');
    return head+`<div class="pom-list">${cards}</div>`;
  };
  showInfo(`Заказы заявки · ${p.name||''}`,renderBody(),{closeLabel:'Сохранить',beforeClose:()=>{
    // фото обязательно: проверяем, что у каждого заказа есть хотя бы одно фото
    const list=S.orders.filter(o=>o.pickup_id===pickupId);
    const noPhoto=list.filter(o=>!pickupPhotos(o).length);
    if(noPhoto.length){toast(`Добавьте фото к заказам (${noPhoto.length} без фото)`);return false;}
    return true;
  }});
  drawPickups(); // обновляем счётчик в карточке заявки сразу после автосоздания
  // навешиваем обработчики (после вставки в DOM)
  setTimeout(()=>{
    const wrap=document.querySelector('.overlay:last-child');if(!wrap)return;
    const bind=()=>{
      wrap.querySelectorAll('[data-pomphotos]').forEach(box=>{
        const o=S.orders.find(x=>x.id===box.dataset.pomphotos);if(!o)return;
        const redraw=()=>{box.innerHTML=photoBlockHtml(o,canEditPhoto);bindPhotoBlock(box,o,redraw,'orders');};
        bindPhotoBlock(box,o,redraw,'orders');
      });
      // галочка «Оплачено отправителем»
      // галочка «Оплачено отправителем» — обнуляет сумму (исходная запоминается), снятие — возврат
      wrap.querySelectorAll('[data-pompaid]').forEach(chk=>{
        chk.onchange=async()=>{
          const o=S.orders.find(x=>x.id===chk.dataset.pompaid);if(!o)return;
          const v=chk.checked;const beforeSum=o.order_sum;
          try{
            let patch;
            if(v){
              // запоминаем исходную сумму и обнуляем
              patch={paid_by_sender:true,order_sum_orig:(o.order_sum!=null?o.order_sum:0),order_sum:0,cost:0};
            }else{
              // возвращаем исходную сумму
              const back=(o.order_sum_orig!=null?o.order_sum_orig:0);
              patch={paid_by_sender:false,order_sum:back,cost:back,order_sum_orig:null};
            }
            await dbUpdate('orders',o.id,patch);
            Object.assign(o,patch);
            await logAction('update','orders',{entity_id:o.id,entity_label:orderLabel(o),changes:[
              {field:'paid_by_sender',label:FIELD_LABEL.paid_by_sender,old:v?'нет':'да',new:v?'да':'нет'},
              {field:'order_sum',label:FIELD_LABEL.order_sum,old:beforeSum!=null?String(beforeSum):'—',new:String(o.order_sum)},
            ]});
            toast(v?'Оплачено отправителем · сумма 0':'Снято · сумма возвращена');
            // обновляем поле суммы и его доступность
            const sumInp=wrap.querySelector(`[data-pomsum="${o.id}"]`);
            if(sumInp){sumInp.value=o.order_sum!=null?o.order_sum:'';sumInp.disabled=!!o.paid_by_sender;}
            renderDashboardIfActive();
          }catch(e){chk.checked=!v;toast('Не удалось сохранить');}
        };
      });
      // поле суммы заказа (ручное изменение — главнее авто)
      wrap.querySelectorAll('[data-pomsum]').forEach(inp=>{
        const commit=async()=>{
          const o=S.orders.find(x=>x.id===inp.dataset.pomsum);if(!o)return;
          if(o.paid_by_sender)return; // если оплачено отправителем — сумма зафиксирована в 0
          const raw=inp.value.trim();
          const v=raw===''?null:Math.max(0,parseFloat(raw)||0);
          if(o.order_sum===v)return;
          const before=o.order_sum;
          try{
            await dbUpdate('orders',o.id,{order_sum:v,cost:v});o.order_sum=v;o.cost=v;
            await logAction('update','orders',{entity_id:o.id,entity_label:orderLabel(o),
              changes:[{field:'order_sum',label:FIELD_LABEL.order_sum,old:before!=null?String(before):'—',new:v!=null?String(v):'—'}]});
            toast('Сумма сохранена');
            renderDashboardIfActive();
          }catch(e){toast('Не удалось сохранить сумму');}
        };
        inp.onblur=commit;inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();};
      });
      // «Создать ещё заказ» — добавляет ОДИН новый заказ, увеличивает счётчик заявки
      const cb=wrap.querySelector('#pom_create');
      if(cb)cb.onclick=async()=>{
        cb.disabled=true;cb.textContent='Создаём…';
        // увеличиваем плановое количество в заявке на 1, затем досоздаём недостающее
        const newWant=(parseInt(p.orders||'0',10)||0)+1;
        const u=await dbUpdate('pickups',pickupId,{orders:newWant});
        if(u)Object.assign(p,u);
        await createOrdersFromPickup(pickupId,{silent:true});
        const body=wrap.querySelector('.modal-body');if(body){body.innerHTML=renderBody();bind();}
        drawPickups(); // счётчик в карточке заявки обновляется автоматом
      };
    };
    bind();
  },30);
}

  // по умолчанию показываем заказы, созданные СЕГОДНЯ (до первой ручной правки дат)

  const list=ordersDateScopedList();
  const totalCost=list.reduce((s,o)=>s+(+o.cost||0),0);

  $('main').innerHTML=`
    <div class="page-head"><div><h1>${head}</h1><p>${isCourier()?'Отправления: курьерская и почтовая доставка':((subs[ordersMode]||'')+(dayNote?(' · '+dayNote):''))}</p></div>
      ${can('orders','create')?`<div class="head-actions">${isStaff()?'<button class="btn btn-excel" id="exportXlsx">⬇ Выгрузить Excel</button><button class="btn ghost" id="ketSendSel">↑ Отправить в KET</button>':''}<button class="btn primary" id="newOrder">＋ Создать заказ</button></div>`:''}</div>

  if($('newOrder'))$('newOrder').onclick=()=>orderModal();

  // массовая отправка отмеченных заказов в KET
  if($('ketSendSel'))$('ketSendSel').onclick=async()=>{
    let list, source;
    if(ketSelected.size){
      // 1) приоритет — отмеченные галочками заказы
      list=[...ketSelected].map(id=>S.orders.find(o=>o.id===id)).filter(Boolean);
      source='отмеченные';
    }else if(of.pickupCity){
      // 2) ничего не отмечено, но включён фильтр «Город забора» — шлём все заказы по фильтру
      list=filteredOrders();
      source='по фильтру «Город забора: '+cityName(of.pickupCity)+'»';
    }else{
      toast('Отметьте галочками заказы или выберите фильтр «Город забора»');return;
    }
    if(!list.length){toast('Нет заказов для отправки');return;}
    const already=list.filter(o=>o.ket_id).length;
    let msg=`Отправить в KET заказов: ${list.length} (${source})?`;
    if(already)msg+=`\n(из них ${already} уже были отправлены — будут отправлены повторно)`;
    if(!confirm(msg))return;
    const b=$('ketSendSel');b.disabled=true;
    let ok=0,fail=0;const errs=[];
    for(const o of list){
      if(!o.phone||o.phone.length<10){fail++;errs.push(`${o.code}: нет телефона`);continue;}
      const r=await callKet({action:'send',account:ketAccountForOrder(o),order:orderToKet(o)});
      const result=(r&&r.ket&&r.ket.result)||{};
      if(!r.error&&(result.success||'').toUpperCase()==='TRUE'){
        const u=await dbUpdate('orders',o.id,{ket_id:result.id||null,ket_synced_at:new Date().toISOString()});
        if(u)Object.assign(o,u);
        logAction('ket','orders',{entity_id:o.id,entity_label:orderLabel(o),meta:{ket_id:result.id||null}});
        ok++;
      }else{
        fail++;
        // собираем причину: ошибка прокси, либо message от KET, либо сырой ответ
        const reason=r.error||result.message||(r&&r.raw)||(r&&JSON.stringify(r.ket))||'неизвестно';
        errs.push(`${o.code}: ${reason}`);
      }
    }
    b.disabled=false;
    toast(`Отправлено в KET: ${ok}${fail?(', с ошибкой: '+fail):''}`);
    if(errs.length)alert('Не отправлены:\n\n'+errs.join('\n'));
    ketSelected.clear();ketSelectAll=false;

  if($('ofpartner'))$('ofpartner').oninput=e=>{

  if($('ofpickupcity'))$('ofpickupcity').onchange=e=>{of.pickupCity=e.target.value;drawOrdersReset();};
  if($('ofdestcity'))$('ofdestcity').onchange=e=>{of.destCity=e.target.value;drawOrdersReset();};
  if($('ofsales'))$('ofsales').onchange=e=>{of.sales=e.target.value;drawOrdersReset();};
  if($('ofcreatefrom'))$('ofcreatefrom').onchange=e=>{of.createFrom=e.target.value;renderOrders(ordersMode);};
  if($('ofcreateto'))$('ofcreateto').onchange=e=>{of.createTo=e.target.value;renderOrders(ordersMode);};
  if($('ofpickfrom'))$('ofpickfrom').onchange=e=>{of.pickFrom=e.target.value;drawOrdersReset();};
  if($('ofpickto'))$('ofpickto').onchange=e=>{of.pickTo=e.target.value;drawOrdersReset();};
  if($('ofdelfrom'))$('ofdelfrom').onchange=e=>{of.delFrom=e.target.value;drawOrdersReset();};
  if($('ofdelto'))$('ofdelto').onchange=e=>{of.delTo=e.target.value;drawOrdersReset();};
  if($('oftoday'))$('oftoday').onclick=()=>{const t=new Date().toISOString().slice(0,10);of.createFrom=t;of.createTo=t;renderOrders(ordersMode);};
  if($('ofdateclear'))$('ofdateclear').onclick=()=>{of.pickFrom='';of.pickTo='';of.delFrom='';of.delTo='';of.createFrom='';of.createTo='';renderOrders(ordersMode);};
  drawOrders();
}
// число заказов с заполненным телефоном клиента
function ordersWithPhone(list){return list.filter(o=>(o.phone||'').toString().replace(/\D/g,'').length>=10).length;}
// список заказов с учётом режима вкладки (курьер/почта/сегодня)
function ordersScopedList(){
  let list=visibleOrders();
  if(ordersMode==='courier')list=list.filter(o=>isCourierDelivery(o.delivery_id));
  else if(ordersMode==='mail')list=list.filter(o=>o.delivery_id&&!isCourierDelivery(o.delivery_id));
  else if(ordersMode==='today'){const t=new Date().toISOString().slice(0,10);list=list.filter(o=>(o.created_at||'').slice(0,10)===t||(o.pickup_date||'').slice(0,10)===t);}
  return list;
}
// список с учётом режима вкладки И фильтра по дате создания (для статистики вверху)
function ordersDateScopedList(){
  return ordersScopedList().filter(o=>{
    const cd=(o.created_at||'').slice(0,10);
    if(of.createFrom&&(!cd||cd<of.createFrom))return false;
    if(of.createTo&&(!cd||cd>of.createTo))return false;
    return true;
  });
}
function filteredOrders(){
  const q=of.q.toLowerCase().trim();
  return ordersDateScopedList().filter(o=>{
    if(of.status&&o.status_id!==of.status)return false;
    if(!ordersMode&&of.delivery&&o.delivery_id!==of.delivery)return false;
    if(of.partner==='__none__')return false; // введён партнёр, которого нет
    if(of.partner&&of.partner!=='__none__'&&o.partner_id!==of.partner)return false;
    // диапазон даты забора
    const pd=(o.pickup_date||'').slice(0,10);
    if(of.pickFrom&&(!pd||pd<of.pickFrom))return false;
    if(of.pickTo&&(!pd||pd>of.pickTo))return false;
    // диапазон даты доставки
    const dd=(o.deliver_date||'').slice(0,10);
    if(of.delFrom&&(!dd||dd<of.delFrom))return false;
    if(of.delTo&&(!dd||dd>of.delTo))return false;
    // фильтр незаполненных полей: показать заказы, где выбранное поле пустое
    if(of.missing){
      // «Нет индекса» относится только к почтовым заказам (у курьерских индекса нет)
      if(of.missing==='index'){
        if(isCourierDelivery(o.delivery_id))return false; // курьерские не показываем
        if((o.index||'').toString().trim()!=='')return false;
      }else{
        const val=(o[of.missing]||'').toString().trim();
        if(val!=='')return false;
      }
    }
    // фильтр по городу забора
    if(of.pickupCity&&o.pickup_city_id!==of.pickupCity)return false;
    if(of.destCity&&o.courier_city_id!==of.destCity)return false;
    if(of.sales&&o.sales_id!==of.sales)return false;
    // фильтр по оплате отправителем
    if(of.paidBySender==='yes'&&!o.paid_by_sender)return false;
    if(of.paidBySender==='no'&&o.paid_by_sender)return false;
    if(q){const hay=[o.code,o.track,o.client,phoneDisplay(o.phone),o.sender,o.address,o.index,partnerName(o.partner_id)].join(' ').toLowerCase();if(!hay.includes(q))return false;}
    return true;
  }).sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
}
let editingOrderId=null; // id заказа в режиме строчного редактирования

// выгрузка отфильтрованных заказов в Excel (колонки как в гриде)
function exportOrdersToExcel(){
  if(!window.XLSX){toast('Библиотека Excel ещё загружается, попробуйте снова');return;}
  const rows=filteredOrders(); // те же данные и фильтры, что в гриде
  if(!rows.length){toast('Нет заказов для выгрузки');return;}
  const staff=isStaff();
  // заголовки колонок — как в таблице
  const data=rows.map(o=>{
    const city=isCourierDelivery(o.delivery_id)?courierCityName(o.courier_city_id):(o.city_id?cityName(o.city_id):'');
    const row={
      'ID':o.code||'',
      'Дата забора':o.pickup_date?fmtDate(o.pickup_date):'',
      'Дата доставки':o.deliver_date?fmtDate(o.deliver_date):'',
      'Отправитель':o.sender||'',
      'ФИО клиента':o.client||'',
      'Телефон':o.phone?phoneDisplay(o.phone):'',
      'Вес (кг)':o.weight||'',
      'Тип доставки':o.delivery_id?deliveryName(o.delivery_id):'',
      'Город':city||'',
      'Адрес':o.address||'',
      'Статус':o.status_id?((orderStatusObj(o.status_id)||{}).name||''):'',
      'Трек-код':o.track||'',
      'Индекс':o.index||'',
      'Партнёр':o.partner_id?partnerName(o.partner_id):'',
      'Оплачено отправителем':o.paid_by_sender?'да':'нет',
    };
    if(staff)row['Стоимость (₸)']=o.cost!=null&&o.cost!==''?(+o.cost):'';
    return row;
  });
  const ws=XLSX.utils.json_to_sheet(data);
  // ширины колонок
  const cols=Object.keys(data[0]||{});
  ws['!cols']=cols.map(c=>({wch:c==='Адрес'?28:(c==='Отправитель'||c==='ФИО клиента'||c==='Партнёр'?20:14)}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Заказы');
  // имя файла с датой и режимом
  const modeName=ordersMode==='courier'?'курьерская':ordersMode==='mail'?'почтовая':ordersMode==='today'?'сегодня':'все';
  const today=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`Заказы_${modeName}_${today}.xlsx`);
  toast(`Выгружено заказов: ${rows.length}`);
}

    if(!isMobileView())return;
    if(e.target.closest('button,select,input,a,img,.row-actions,.status-cell'))return;
    tr.classList.toggle('open');
  });
  el.querySelectorAll('[data-odel]').forEach(b=>b.onclick=()=>delOrder(b.dataset.odel));
  el.querySelectorAll('[data-obc]').forEach(b=>b.onclick=()=>showBarcode(b.dataset.obc));
  // двойной клик по строке открывает заказ: на редактирование, если есть право, иначе просмотр
  el.querySelectorAll('[data-orow]').forEach(tr=>tr.ondblclick=e=>{
    if(e.target.closest('button,select,input,a'))return;
    orderModal(tr.dataset.orow,!can('orders','edit'));
  });
  el.querySelectorAll('[data-ostatus]').forEach(sel=>sel.onchange=async()=>{
    const o=S.orders.find(x=>x.id===sel.dataset.ostatus);if(!o)return;
    const oldS=o.status_id;
    const u=await dbUpdate('orders',o.id,{status_id:sel.value||null});
    if(u){o.status_id=u.status_id;
      logAction('status','orders',{entity_id:o.id,entity_label:orderLabel(o),changes:[{field:'status_id',label:'Статус',old:logFieldValue('status_id',oldS),new:logFieldValue('status_id',o.status_id)}]});
      const so=orderStatusObj(o.status_id)||{};
      const badge=sel.parentElement.querySelector('.status-badge');
      if(badge){badge.textContent=o.status_id?(so.name||'—'):'— нет —';badge.style.color=so.color||'var(--muted)';badge.style.background=so.color?(so.color+'1a'):'transparent';badge.style.borderColor=so.color||'var(--line)';}
      toast('Статус обновлён');}});
  // отдельные чекбоксы строк — обновляют множество выбранных
  el.querySelectorAll('.ketChk').forEach(c=>c.onchange=()=>{
    const id=c.dataset.ketchk;
    if(c.checked)ketSelected.add(id);else{ketSelected.delete(id);ketSelectAll=false;}
    updateKetAllChk(allRows);
  });
  // чекбокс «выбрать все» — отмечает ВСЕ заказы во всех страницах (по текущему фильтру)
  const chkAll=$('ketChkAll');
  if(chkAll)chkAll.onchange=e=>{
    if(e.target.checked){ketSelectAll=true;allRows.forEach(o=>ketSelected.add(o.id));}
    else{ketSelectAll=false;allRows.forEach(o=>ketSelected.delete(o.id));}
    el.querySelectorAll('.ketChk').forEach(c=>c.checked=e.target.checked);
  };
  updateKetAllChk(allRows);
  if(mobile){
    if(rows.length<allRows.length){
      const more=document.createElement('button');
      more.className='btn ghost show-more';
      more.textContent=`Показать ещё (${allRows.length-rows.length})`;
      more.onclick=()=>{ordersMobileLimit+=MOBILE_STEP;drawOrders();};
      el.appendChild(more);
    }
    el.insertAdjacentHTML('beforeend',`<div class="list-count">Показано ${rows.length} из ${allRows.length}</div>`);
  }else{
    renderOrdersPager(allRows.length,totalPages,startIdx,rows.length);
  }
}
// сброс пагинации на первую страницу (при смене фильтров/поиска)
function drawOrdersReset(){ordersPage=1;ordersMobileLimit=MOBILE_STEP;ketSelected.clear();ketSelectAll=false;drawOrders();}
// синхронизирует чекбокс «выбрать все»: отмечен, если выбраны все заказы текущего фильтра
function updateKetAllChk(allRows){
  const chk=$('ketChkAll');if(!chk)return;
  const total=allRows.length;
  const selected=allRows.filter(o=>ketSelected.has(o.id)).length;
  chk.checked=total>0&&selected===total;
  chk.indeterminate=selected>0&&selected<total;
}
// плавающая (закреплённая снизу) панель навигации по страницам заказов
function removeOrdersPager(){const ex=$('ordersPager');if(ex)ex.remove();const m=$('main');if(m&&!$('pickupsPager'))m.classList.remove('has-pager');}
function renderOrdersPager(total,totalPages,startIdx,shownCount){
  removeOrdersPager();
  if(!total)return;
  const from=startIdx+1, to=startIdx+shownCount;
  const bar=document.createElement('div');
  bar.id='ordersPager';bar.className='orders-pager';
  {const m=$('main');if(m)m.classList.add('has-pager');}
  bar.innerHTML=`
    <div class="op-info">Показаны <b>${from}–${to}</b> из <b>${total}</b></div>
    <div class="op-perpage">
      <span>На странице:</span>
      <div class="op-pp-wrap">
        <button class="op-btn op-pp-btn" id="opPerPageBtn">${ordersPerPage} ▾</button>
        <div class="op-pp-menu" id="opPerPageMenu" style="display:none">
          ${ORDERS_PAGE_SIZES.map(s=>`<button class="op-pp-item ${s===ordersPerPage?'active':''}" data-pp="${s}">${s}</button>`).join('')}
        </div>
      </div>
    </div>
    <div class="op-nav">
      <button class="op-btn" data-opage="first" ${ordersPage<=1?'disabled':''} title="В начало">«</button>
      <button class="op-btn" data-opage="prev" ${ordersPage<=1?'disabled':''}>‹ Назад</button>
      <span class="op-page">Стр. ${ordersPage} / ${totalPages}</span>
      <button class="op-btn" data-opage="next" ${ordersPage>=totalPages?'disabled':''}>Вперёд ›</button>
      <button class="op-btn" data-opage="last" ${ordersPage>=totalPages?'disabled':''} title="В конец">»</button>
    </div>`;
  document.body.appendChild(bar);
  // выбор количества на странице
  const ppBtn=bar.querySelector('#opPerPageBtn'), ppMenu=bar.querySelector('#opPerPageMenu');
  if(ppBtn)ppBtn.onclick=e=>{e.stopPropagation();ppMenu.style.display=ppMenu.style.display==='none'?'flex':'none';};
  bar.querySelectorAll('[data-pp]').forEach(b=>b.onclick=()=>{
    ordersPerPage=parseInt(b.dataset.pp,10)||50;ordersPage=1;drawOrders();
    const t=$('orderTable');if(t)t.scrollIntoView({behavior:'smooth',block:'start'});
  });
  // закрытие меню при клике вне
  document.addEventListener('click',function closePP(ev){
    if(ppMenu&&!ppMenu.contains(ev.target)&&ev.target!==ppBtn){ppMenu.style.display='none';}
  },{once:true});
  bar.querySelectorAll('[data-opage]').forEach(b=>b.onclick=()=>{
    const a=b.dataset.opage;
    if(a==='first')ordersPage=1;
    else if(a==='prev')ordersPage=Math.max(1,ordersPage-1);
    else if(a==='next')ordersPage=Math.min(totalPages,ordersPage+1);
    else if(a==='last')ordersPage=totalPages;
    drawOrders();
    // прокрутка к началу таблицы при смене страницы
    const t=$('orderTable');if(t)t.scrollIntoView({behavior:'smooth',block:'start'});
  });
}

        courier_city_id:isCourierDelivery(val('o_delivery'))?(val('o_city')||null):null,address:val('o_address').trim(),
        pickup_city_id:val('o_pickupcity')||null,
        city_id:!isCourierDelivery(val('o_delivery'))?(val('o_postcity')||null):null,
        order_sum:(val('o_sum')!==''?parseFloat(val('o_sum')):null),
        status_id:val('o_status')||null,delivery_id:val('o_delivery')||null,
        index:val('o_index').trim(),track:val('o_track').trim(),sales_id:val('o_sales')||null,processor_id:val('o_proc')||null,
        cost:(val('o_sum')!==''?parseFloat(val('o_sum')):0),pay_date:val('o_pay')||null,deliver_date:val('o_deliver')||null,post_ip_id:val('o_ip')||null,comment:val('o_comment').trim(),
        order_courier_id:val('o_ocourier')||null};
      // галочка «Оплачено отправителем»: сумма→0 (исходная запоминается), снятие — возврат
      if($('o_paidorder')){
        const paidNow=$('o_paidorder').checked;
        if(paidNow){
          if(!o||!o.paid_by_sender){row.order_sum_orig=(row.order_sum!=null?row.order_sum:0);} // запоминаем при первом включении
          else{row.order_sum_orig=(o.order_sum_orig!=null?o.order_sum_orig:0);}
          row.paid_by_sender=true;row.order_sum=0;row.cost=0;
        }else{
          // если сняли галочку, а сумму вручную не меняли — вернём исходную
          if(o&&o.paid_by_sender){const back=(o.order_sum_orig!=null?o.order_sum_orig:0);
            if(val('o_sum')===''||parseFloat(val('o_sum'))===0){row.order_sum=back;row.cost=back;}}
          row.paid_by_sender=false;row.order_sum_orig=null;
        }
      }
      if(id){const before=Object.assign({},o);const u=await dbUpdate('orders',id,row);if(!u)return false;Object.assign(o,u);
        await logAction('update','orders',{entity_id:o.id,entity_label:orderLabel(o),changes:buildChanges(before,o)});}
      else{const u=await dbInsert('orders',row);if(!u)return false;S.orders.unshift(u);
        await logAction('create','orders',{entity_id:u.id,entity_label:orderLabel(u)});}
      toast(id?'Заказ сохранён':'Заказ создан');renderOrders();return true;
    },{readonly:ro,wide:true});
  attachPhone('o_phone',d.phone);
  setTimeout(()=>renderBarcode($('o_barcode'),code),60);
  // кнопка «Отправить в KET»
  if(o&&o.id){const kb=document.querySelector(`[data-ketsend="${o.id}"]`);if(kb)kb.onclick=async()=>{
    kb.disabled=true;
    const ok=await sendOrderToKet(o);
    kb.disabled=false;
    // обновляем пометку прямо в открытой карточке
    if(ok){const box=kb.parentElement;if(box){box.querySelector('div').outerHTML=`<div style="margin-bottom:8px"><span class="ket-badge" style="font-size:12px;padding:3px 10px">✓ Отправлен в KET</span><div style="font-size:12px;color:var(--muted);margin-top:6px">ID <strong>${esc(o.ket_id||'')}</strong>${o.ket_synced_at?(' · '+esc(fmtDate(o.ket_synced_at))):''}</div></div>`;kb.textContent='Отправить повторно';kb.classList.add('ghost');}}
  };}
  if(o&&o.id){
    const bindBig=()=>{
      const pc=$('o_photos');if(!pc)return;
      bindPhotoBlock(pc,o,redrawOPhotos,'orders'); // добавление/удаление через стандартные data-атрибуты
      // клик по миниатюре — меняем крупное фото
      pc.querySelectorAll('[data-obigthumb]').forEach(t=>t.onclick=e=>{
        e.stopPropagation();
        const main=pc.querySelector('#obigMain');
        if(main){main.src=t.dataset.obigthumb;main.dataset.oviewphoto=t.dataset.obigthumb;}
        const byEl=pc.querySelector('#obigBy');
        if(byEl)byEl.innerHTML=t.dataset.obigby||'';
        pc.querySelectorAll('[data-obigthumb]').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
      });
      // зум фото прямо в окне: клик циклически увеличивает (1x → 2x → 3.5x → 1x), можно перетаскивать
      const main=pc.querySelector('#obigMain');
      if(main){
        let zoom=1, panX=0, panY=0, rot=0, dragging=false, moved=false, sx=0, sy=0, spx=0, spy=0;
        const apply=()=>{
          main.style.transform=`scale(${zoom}) translate(${panX}px,${panY}px) rotate(${rot}deg)`;
          main.style.cursor=zoom>1?'grab':'zoom-in';
        };
        const rotBy=d=>{rot=(rot+d)%360;apply();};
        const bL=pc.querySelector('#orotL'), bR=pc.querySelector('#orotR');
        if(bL)bL.onclick=e=>{e.stopPropagation();rotBy(-90);};
        if(bR)bR.onclick=e=>{e.stopPropagation();rotBy(90);};
        main.onclick=e=>{
          e.stopPropagation();
          if(moved){moved=false;return;} // если двигали — не менять зум
          zoom = zoom>=3.5 ? 1 : (zoom>=2 ? 3.5 : 2);
          if(zoom===1){panX=0;panY=0;}
          apply();
        };
        main.onmousedown=e=>{
          if(zoom<=1)return;
          dragging=true;moved=false;sx=e.clientX;sy=e.clientY;spx=panX;spy=panY;
          main.style.cursor='grabbing';e.preventDefault();
        };
        main.onmousemove=e=>{
          if(!dragging)return;
          panX=spx+(e.clientX-sx)/zoom;panY=spy+(e.clientY-sy)/zoom;
          if(Math.abs(e.clientX-sx)>3||Math.abs(e.clientY-sy)>3)moved=true;
          apply();
        };
        main.onmouseup=()=>{if(dragging){dragging=false;main.style.cursor='grab';}};
        main.onmouseleave=()=>{if(dragging){dragging=false;main.style.cursor='grab';}};
      }
    };
    const redrawOPhotos=()=>{const pc=$('o_photos');if(!pc)return;pc.innerHTML=orderBigPhotoInner(o,!ro);bindBig();};
    bindBig();
  }
  if(!ro){
    const fillCouriers=cityId=>{
      const sel=$('o_ocourier');if(!sel)return;
      const cur=sel.value;
      const opts=S.order_couriers.filter(c=>!cityId||c.courier_city_id===cityId);
      sel.innerHTML='<option value="">—</option>'+opts.map(c=>`<option value="${c.id}">${esc(c.fio)}</option>`).join('');
      if(opts.find(c=>c.id===cur))sel.value=cur; // сохранить выбор, если курьер из этого города
    };
    // сумма заказа тянется от тарифа партнёра (пока её не правили вручную)
    let sumTouched=(d.order_sum!=null&&d.order_sum!==''); // если сумма уже была (включая 0) — заполнена вручную
    const findPartner=()=>{
      // 1) по partner_id заказа, если есть
      if(d.partner_id){const p=S.partners.find(x=>x.id===d.partner_id);if(p)return p;}
      // 2) по имени отправителя без учёта регистра и лишних пробелов
      const name=($('o_sender').value||'').trim().toLowerCase().replace(/\s+/g,' ');
      return S.partners.find(x=>(x.name||'').trim().toLowerCase().replace(/\s+/g,' ')===name)||null;
    };
    const applyTariff=()=>{
      if(sumTouched)return; // не перезаписываем введённую вручную сумму
      const pt=findPartner();if(!pt)return;
      const courier=isCourierDelivery($('o_delivery').value);
      const t=courier?pt.tariff_courier:pt.tariff_post;
      const sumEl=$('o_sum');
      if(sumEl&&t!=null&&t!==''){sumEl.value=t;}
    };
    const sumEl=$('o_sum');if(sumEl)sumEl.oninput=()=>{sumTouched=true;};
    // галочка «Оплачен заказ»: обнуляет поле суммы и блокирует его (исходная вернётся при снятии)
    const paidChk=$('o_paidorder');
    if(paidChk){
      paidChk.dataset.prevsum=(d.order_sum!=null&&d.order_sum!=='')?String(d.order_sum):''; // помним сумму до обнуления
      paidChk.onchange=()=>{
        const se=$('o_sum');if(!se)return;
        if(paidChk.checked){paidChk.dataset.prevsum=se.value;se.value='0';se.disabled=true;sumTouched=true;}
        else{se.disabled=false;se.value=paidChk.dataset.prevsum||'';sumTouched=(se.value!=='');}
      };
    }
    // показать/скрыть поля, относящиеся только к почтовой доставке
    const toggleMailFields=()=>{
      const courier=isCourierDelivery($('o_delivery').value);
      document.querySelectorAll('.mail-only').forEach(el=>el.style.display=courier?'none':'');
    };
    const ds=$('o_delivery');ds.onchange=()=>{
      const f=$('cityField');
      if(isCourierDelivery(ds.value))f.style.display='';else{f.style.display='none';if($('o_city')){$('o_city').value='';fillCouriers('');}}
      toggleMailFields();applyTariff();
    };
    const cityEl=$('o_city');if(cityEl)cityEl.onchange=()=>fillCouriers(cityEl.value);
    // при изменении отправителя — подтянуть данные партнёра
    const ss=$('o_sender');if(ss){
      const pullPartner=()=>{
        const name=ss.value.trim().toLowerCase().replace(/\s+/g,' ');
        const pt=S.partners.find(x=>(x.name||'').trim().toLowerCase().replace(/\s+/g,' ')===name);
        if(pt){if(pt.sales_id&&$('o_sales'))$('o_sales').value=pt.sales_id;if(pt.processor_id&&$('o_proc'))$('o_proc').value=pt.processor_id;
          // город забора подставляем из города партнёра (если поле ещё пустое)
          if(pt.city_id&&$('o_pickupcity')&&!$('o_pickupcity').value)$('o_pickupcity').value=pt.city_id;}
        applyTariff();
      };
      ss.onchange=pullPartner;
      ss.oninput=pullPartner; // выбор из выпадающей подсказки
    }
    setTimeout(applyTariff,0); // первичная подстановка суммы из тарифа при открытии
  }
}

/* ---- Универсальный построитель справочника с фильтром по каждой графе ---- */
// состояние фильтров по справочникам: { arrKey: { colKey: value } }
const dirFilters={};
function dirGrid(cfg){
  // cfg: {title, arrKey, table, modalFn, cols:[{key,label,text(row),cell(row)?,filter:'text'|'select',options(rows)?}], emptyText}
  const arr=S[cfg.arrKey]||[];
  if(!dirFilters[cfg.arrKey])dirFilters[cfg.arrKey]={};
  const f=dirFilters[cfg.arrKey];
  // если выбранное значение select-фильтра больше не доступно с учётом других фильтров — сбрасываем
  cfg.cols.forEach(c=>{
    if(c.filter!=='select'||!f[c.key])return;
    const base=arr.filter(row=>cfg.cols.every(oc=>{
      if(oc.key===c.key)return true;
      const ov=f[oc.key];if(!ov)return true;
      const t=(oc.text?oc.text(row):'')+'';
      if(oc.filter==='select')return t===ov;
      return t.toLowerCase().includes(ov.toLowerCase());
    }));
    const vals=new Set(base.map(r=>c.text?c.text(r):'').filter(Boolean));
    if(!vals.has(f[c.key]))f[c.key]='';
  });
  // применяем фильтры
  const filtered=arr.filter(row=>cfg.cols.every(c=>{
    const fv=f[c.key];if(!fv)return true;
    const cellText=(c.text?c.text(row):'')+'';
    if(c.filter==='select')return cellText===fv; // для select сравниваем по тексту значения
    return cellText.toLowerCase().includes(fv.toLowerCase());
  }));
  if(cfg.sort)filtered.sort(cfg.sort);
  // строка фильтров
  const filterRow=`<tr class="filter-row">${cfg.cols.map(c=>{
    if(c.filter==='select'){
      // опции строим из строк, прошедших фильтры ОСТАЛЬНЫХ колонок,
      // чтобы, например, при выбранном городе показывались только его районы
      const base=arr.filter(row=>cfg.cols.every(oc=>{
        if(oc.key===c.key)return true; // свой фильтр не учитываем
        const ov=f[oc.key];if(!ov)return true;
        const t=(oc.text?oc.text(row):'')+'';
        if(oc.filter==='select')return t===ov;
        return t.toLowerCase().includes(ov.toLowerCase());
      }));
      const vals=[...new Set(base.map(r=>c.text?c.text(r):'').filter(Boolean))].sort();
      // если выбранного значения больше нет среди доступных — сбрасываем
      if(f[c.key]&&!vals.includes(f[c.key]))f[c.key]='';
      return `<th><select class="dir-filter" data-fk="${c.key}"><option value="">Все</option>${vals.map(v=>`<option value="${esc(v)}" ${f[c.key]===v?'selected':''}>${esc(v)}</option>`).join('')}</select></th>`;
    }
    if(c.filter==='none')return `<th></th>`;
    return `<th><input class="dir-filter" data-fk="${c.key}" placeholder="фильтр…" value="${esc(f[c.key]||'')}"></th>`;
  }).join('')}<th></th></tr>`;
  const head=`<tr>${cfg.cols.map(c=>`<th>${esc(c.label)}</th>`).join('')}<th></th></tr>`;
  const body=filtered.length?filtered.map(row=>`<tr data-dirrow="${row.id}" style="cursor:pointer">${cfg.cols.map(c=>`<td>${c.cell?c.cell(row):esc(c.text?c.text(row):'')||'—'}</td>`).join('')}<td>${dirActions(row.id)}</td></tr>`).join('')
    :`<tr><td colspan="${cfg.cols.length+1}" style="text-align:center;color:var(--muted);padding:30px">Ничего не найдено</td></tr>`;
  const table=arr.length?`<div class="table-scroll"><table><thead>${head}${filterRow}</thead><tbody>${body}</tbody></table></div>`
    :`<div class="empty"><div class="big">${esc(cfg.emptyText||'Список пуст')}</div></div>`;
  // счётчик: при активном фильтре показываем «найдено / всего», иначе просто всего
  const anyFilter=cfg.cols.some(c=>f[c.key]);
  const countLabel=anyFilter?`${filtered.length} / ${arr.length}`:String(arr.length);
  dirShell(cfg.title,countLabel,()=>cfg.modalFn(),table);
  // привязки
  bindDir(cfg.table,cfg.arrKey,cfg.modalFn);
  // двойной клик по строке открывает карточку (кроме кликов по кнопкам действий)
  $('dirContent').querySelectorAll('[data-dirrow]').forEach(tr=>tr.ondblclick=e=>{
    if(e.target.closest('button,a,select,input'))return;
    if(canEditDir())cfg.modalFn(tr.dataset.dirrow);
  });
  $('dirContent').querySelectorAll('.dir-filter').forEach(el=>{
    const ev=el.tagName==='SELECT'?'onchange':'oninput';
    el[ev]=()=>{f[el.dataset.fk]=el.value;redrawDirGrid(cfg);};
  });
}
function redrawDirGrid(cfg){
  // перерисовываем только тело+фильтры, сохраняя фокус — проще целиком, но вернём фокус
  const active=document.activeElement;const fk=active&&active.dataset?active.dataset.fk:null;const pos=active&&active.selectionStart;
  dirGrid(cfg);
  if(fk){const el=$('dirContent').querySelector(`.dir-filter[data-fk="${fk}"]`);if(el){el.focus();try{el.setSelectionRange(pos,pos);}catch(e){}}}
}

// поле привязки аккаунта (список профилей-курьеров), доступно только админу
function accountEmail(accId){const p=S.profiles.find(x=>x.id===accId);return p?(p.email||p.full_name||'аккаунт'):'аккаунт';}
// является ли профиль курьером (по старому полю role или по базовому типу роли)
function isCourierProfile(p){
  if(p.role==='courier')return true;
  if(p.role_id){const r=S.roles.find(x=>x.id===p.role_id);if(r&&r.base_type==='courier')return true;}
  return false;
}
// courierAccountField(fieldId,current,kind): kind — 'pickup' (заборщик) | 'order' (по заказам)
function courierAccountField(fieldId,current,kind){
  if(!isAdmin())return '';
  let all=S.profiles.filter(isCourierProfile);
  // профили нужного типа курьера; те, у кого тип не задан (старые) — показываем во второй группе
  const match=all.filter(p=>p.courier_kind===kind);
  const unset=all.filter(p=>!p.courier_kind);
  // если привязан профиль другого типа — всё равно включим его, чтобы выбор не потерялся
  const cur=current?all.find(p=>p.id===current):null;
  let list=[...match,...unset];
  if(cur&&!list.find(p=>p.id===cur.id))list.unshift(cur);
  const kindLabel=p=>p.courier_kind==='pickup'?'заборщик':p.courier_kind==='order'?'по заказам':(p.position||'тип не задан');
  const optLabel=p=>esc((p.full_name||p.email||'аккаунт')+' · '+kindLabel(p));
  const noteEmpty=kind==='pickup'?'Нет нужного? Создайте пользователя с ролью «Курьер» и типом «Курьер заборщик» во вкладке «Пользователи».'
                                  :'Нет нужного? Создайте пользователя с ролью «Курьер» и типом «Курьер по заказам» во вкладке «Пользователи».';
  return `<div class="field"><label>Привязанный аккаунт (логин курьера)</label>
    <select id="${fieldId}"><option value="">— не привязан —</option>${list.map(p=>`<option value="${p.id}" ${current===p.id?'selected':''}>${optLabel(p)}</option>`).join('')}</select>
    <span class="hint">${noteEmpty}</span></div>`;
}

  showModal(id?'ИП для Почты':'Новое ИП',`<div class="field"><label>Наименование</label><input id="ip_name" value="${esc(c.name)}"></div>`,
    async()=>{const name=val('ip_name').trim();if(!name){toast('Укажите наименование');return false;}
      if(id){const u=await dbUpdate('post_ips',id,{name});if(!u)return false;Object.assign(S.post_ips.find(x=>x.id===id),u);}
      else{const u=await dbInsert('post_ips',{name});if(!u)return false;S.post_ips.push(u);}
      toast('Сохранено');renderSettings();return true;});}

/* ================= МОДУЛЬ: ПОЛЬЗОВАТЕЛИ И РОЛИ ================= */
const MODULES=[['pickups','Заявки'],['orders','Заказы'],['directories','Справочники'],['users','Пользователи']];
const ACTIONS=[['view','Просмотр'],['create','Создание'],['edit','Редактирование'],['delete','Удаление']];
let usersSub='staff'; // staff | roles

function roleName(id){const r=S.roles.find(x=>x.id===id);return r?r.name:'—';}

function renderUsers(){
  if(!can('users','view')){$('main').innerHTML='<div class="empty"><div class="big">Нет доступа к этому разделу</div></div>';return;}
  $('main').innerHTML=`
    <div class="page-head"><div><h1>Пользователи</h1><p>Сотрудники и роли с правами доступа</p></div></div>
    <div class="subtabs">
      <button data-us="staff" class="${usersSub==='staff'?'active':''}">Сотрудники</button>
      <button data-us="roles" class="${usersSub==='roles'?'active':''}">Роли и права</button>
    </div>
    <div id="usersContent"></div>`;
  $('main').querySelectorAll('[data-us]').forEach(b=>b.onclick=()=>{usersSub=b.dataset.us;saveNav();renderUsers();});
  if(usersSub==='roles') renderRoles(); else renderStaff();
}

/* ---- СОТРУДНИКИ ---- */
let staffFilters={name:'',login:'',city:'',position:'',role:''};
function renderStaff(){
  const f=staffFilters;
  const all=[...S.profiles].sort((a,b)=>(a.full_name||a.email||'').localeCompare(b.full_name||b.email||''));
  // текстовые представления граф для фильтрации
  const rowText=u=>({
    name:u.full_name||'',
    login:u.phone?phoneDisplay(u.phone):((u.email&&!u.email.endsWith('@jyldam.local'))?u.email:''),
    city:u.city_id?cityName(u.city_id):'',
    position:u.position||'',
    role:u.role_id?roleName(u.role_id):(ROLE_LABEL[u.role]||u.role||''),
  });
  const rows=all.filter(u=>{
    const t=rowText(u);
    if(f.name&&!t.name.toLowerCase().includes(f.name.toLowerCase()))return false;
    if(f.login&&!t.login.toLowerCase().includes(f.login.toLowerCase()))return false;
    if(f.city&&t.city!==f.city)return false;
    if(f.position&&!t.position.toLowerCase().includes(f.position.toLowerCase()))return false;
    if(f.role&&t.role!==f.role)return false;
    return true;
  });
  // опции для select-фильтров (город, роль) — из всех строк
  const cityVals=[...new Set(all.map(u=>u.city_id?cityName(u.city_id):'').filter(Boolean))].sort();
  const roleVals=[...new Set(all.map(u=>u.role_id?roleName(u.role_id):(ROLE_LABEL[u.role]||u.role||'')).filter(Boolean))].sort();
  const anyF=f.name||f.login||f.city||f.position||f.role;
  $('usersContent').innerHTML=`<div class="panel">
    <div class="panel-head"><h2>Сотрудники</h2><span class="count">${anyF?rows.length+' / '+all.length:all.length}</span>
      ${can('users','create')?`<button class="btn primary sm" id="addStaff" style="margin-left:auto">＋ Добавить сотрудника</button>`:''}</div>
    <div class="filters" style="background:var(--card);border-bottom:1px solid var(--line)">
      <span style="font-size:13px;color:var(--muted)">«Добавить сотрудника» создаёт аккаунт с логином и паролем — сотрудник сразу сможет войти.</span>
    </div>
    <div class="table-scroll"><table><thead>
      <tr><th>ФИО</th><th>Логин (телефон)</th><th>Город</th><th>Должность</th><th>Роль</th><th></th></tr>
      <tr class="filter-row">
        <th><input class="staff-filter" data-sf="name" placeholder="фильтр…" value="${esc(f.name)}"></th>
        <th><input class="staff-filter" data-sf="login" placeholder="фильтр…" value="${esc(f.login)}"></th>
        <th><select class="staff-filter" data-sf="city"><option value="">Все</option>${cityVals.map(v=>`<option value="${esc(v)}" ${f.city===v?'selected':''}>${esc(v)}</option>`).join('')}</select></th>
        <th><input class="staff-filter" data-sf="position" placeholder="фильтр…" value="${esc(f.position)}"></th>
        <th><select class="staff-filter" data-sf="role"><option value="">Все</option>${roleVals.map(v=>`<option value="${esc(v)}" ${f.role===v?'selected':''}>${esc(v)}</option>`).join('')}</select></th>
        <th></th></tr>
    </thead>
    <tbody>${rows.length?rows.map(u=>`<tr>
      <td><strong>${esc(u.full_name||'—')}</strong></td>
      <td>${u.phone?phoneLink(u.phone):(u.email&&!u.email.endsWith('@jyldam.local')?esc(u.email):'—')}</td>
      <td>${u.city_id?esc(cityName(u.city_id)):'—'}</td>
      <td>${esc(u.position)||'—'}</td>
      <td><span class="pill ${(S.roles.find(r=>r.id===u.role_id)||{}).base_type==='admin'?'gold':'moss'}">${esc(u.role_id?roleName(u.role_id):(ROLE_LABEL[u.role]||u.role||'—'))}</span></td>
      <td><div class="row-actions">
        ${can('users','edit')?`<button class="btn sm ghost" data-uedit="${u.id}">Изменить</button>`:''}
        ${can('users','edit')?`<button class="btn sm ghost" data-upass="${u.id}">Пароль</button>`:''}
        ${can('users','delete')&&u.id!==S.me.id?`<button class="btn sm danger" data-udel="${u.id}">Удалить</button>`:''}
      </div></td></tr>`).join(''):`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">Ничего не найдено</td></tr>`}</tbody></table></div></div>`;
  $('usersContent').querySelectorAll('[data-uedit]').forEach(b=>b.onclick=()=>staffModal(b.dataset.uedit));
  $('usersContent').querySelectorAll('[data-upass]').forEach(b=>b.onclick=()=>changePassModal(b.dataset.upass));
  $('usersContent').querySelectorAll('[data-udel]').forEach(b=>b.onclick=()=>delStaff(b.dataset.udel));
  if($('addStaff'))$('addStaff').onclick=()=>createStaffModal();
  // фильтры
  $('usersContent').querySelectorAll('.staff-filter').forEach(el=>{
    const ev=el.tagName==='SELECT'?'onchange':'oninput';
    el[ev]=()=>{staffFilters[el.dataset.sf]=el.value;
      const act=document.activeElement;const sf=act&&act.dataset?act.dataset.sf:null;const pos=act&&act.selectionStart;
      renderStaff();
      if(sf){const e2=$('usersContent').querySelector(`.staff-filter[data-sf="${sf}"]`);if(e2){e2.focus();try{e2.setSelectionRange(pos,pos);}catch(e){}}}
    };
  });
}
function createStaffModal(){
  showModal('Новый сотрудник',`
    <div class="grid2">
      <div class="field"><label>ФИО</label><input id="n_name" placeholder="Фамилия Имя"></div>
      <div class="field"><label>Должность</label><input id="n_pos" placeholder="Напр. Оператор"></div>
      <div class="field"><label>Телефон (логин)</label><input id="n_phone" inputmode="numeric"></div>
      <div class="field"><label>Пароль</label><input id="n_pass" type="text" autocomplete="off" placeholder="мин. 6 символов"></div>
      <div class="field"><label>Роль</label><select id="n_role"><option value="">— не назначена —</option>${S.roles.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('')}</select></div>
      <div class="field" id="n_kind_field" style="display:none"><label>Тип курьера</label><select id="n_kind">
        <option value="pickup">Курьер заборщик</option>
        <option value="order">Курьер по заказам</option></select>
        <span class="hint">Определяет, в каком справочнике курьеров появится этот аккаунт для привязки.</span></div>
      <div class="field full"><span class="hint">Сотрудник входит по номеру телефона и паролю. Пароль задаёте вы и передаёте ему.</span></div>
    </div>`,
    async()=>{
      const phone=phoneVal('n_phone'),pass=val('n_pass'),name=val('n_name').trim();
      if(phone.length!==10){toast('Телефон: ровно 10 цифр');return false;}
      if(!pass||pass.length<6){toast('Пароль минимум 6 символов');return false;}
      const roleId=val('n_role');
      const baseType=(S.roles.find(r=>r.id===roleId)||{}).base_type||'';
      const legacy=baseType==='admin'?'admin':baseType==='courier'?'courier':'manager';
      const courier_kind=baseType==='courier'?val('n_kind'):null;
      toast('Создаём сотрудника…');
      const out=await callCreateUser({phone,password:pass,full_name:name,
        position:val('n_pos').trim(),role_id:roleId||null,role:legacy,courier_kind});
      if(out.error){toast('Ошибка: '+out.error);return false;}
      await logAction('create','profiles',{entity_label:name||phone,meta:{phone}});
      S.profiles=await dbList('profiles',{order:'created_at',asc:true});
      toast('Сотрудник создан');renderUsers();return true;
    });
  attachPhone('n_phone','');
  // показываем «Тип курьера» только когда выбрана роль с базовым типом «Курьер»
  const nr=$('n_role');const toggleKind=()=>{const bt=(S.roles.find(r=>r.id===nr.value)||{}).base_type;
    $('n_kind_field').style.display=bt==='courier'?'':'none';};
  nr.onchange=toggleKind;toggleKind();
}
// модалка смены пароля сотрудника
function changePassModal(id){
  const u=S.profiles.find(x=>x.id===id);if(!u)return;
  const login=u.phone?phoneDisplay(u.phone):((u.email&&!u.email.endsWith('@jyldam.local'))?u.email:'(нет)');
  showModal(`Пароль · ${esc(u.full_name||login)}`,`
    <div class="grid2">
      <div class="field full"><label>Логин (телефон)</label><input value="${esc(login)}" readonly></div>
      <div class="field full"><label>Новый пароль</label><input id="cp_pass" type="text" autocomplete="off" placeholder="мин. 6 символов"></div>
      <div class="field full"><span class="hint">Пароль нельзя «посмотреть» — он хранится в зашифрованном виде. Здесь можно задать новый и передать его сотруднику. Старый перестанет действовать.</span></div>
    </div>`,
    async()=>{
      const pass=val('cp_pass');
      if(!pass||pass.length<6){toast('Пароль минимум 6 символов');return false;}
      toast('Меняем пароль…');
      const out=await callSetPassword({user_id:u.id,password:pass});
      if(out.error){alert('Не удалось сменить пароль:\n\n'+out.error);return false;}
      await logAction('update','profiles',{entity_id:u.id,entity_label:u.full_name||login,changes:[{field:'password',label:'Пароль',old:'•••',new:'изменён'}]});
      toast('Пароль изменён');return true;
    });
}
async function delStaff(id){
  const u=S.profiles.find(x=>x.id===id);
  if(!confirm(`Удалить карточку сотрудника «${u?.full_name||u?.email||''}»?\n\nВнимание: это удалит профиль, но сам аккаунт входа в Supabase останется. Полное удаление аккаунта делается в Supabase → Authentication.`))return;
  if(await dbDelete('profiles',id)){S.profiles=S.profiles.filter(x=>x.id!==id);toast('Профиль удалён');renderUsers();}
}
function staffModal(id){
  const u=S.profiles.find(x=>x.id===id);if(!u)return;
  showModal('Карточка сотрудника',`
    <div class="grid2">
      <div class="field full"><label>Email (логин)</label><input id="u_email" value="${esc(u.email||'')}"><span class="hint">Для входа по email. Если задан телефон — вход также по телефону.</span></div>
      <div class="field"><label>ФИО</label><input id="u_name" value="${esc(u.full_name||'')}"></div>
      <div class="field"><label>Телефон</label><input id="u_phone" inputmode="numeric"></div>
      <div class="field"><label>Город</label><select id="u_city"><option value="">—</option>${S.cities.map(c=>`<option value="${c.id}" ${u.city_id===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
      <div class="field"><label>Должность</label><input id="u_pos" value="${esc(u.position||'')}"></div>
      <div class="field full"><label>Роль</label><select id="u_role">
        <option value="">— не назначена —</option>
        ${S.roles.map(r=>`<option value="${r.id}" ${u.role_id===r.id?'selected':''}>${esc(r.name)}</option>`).join('')}</select>
        <span class="hint">Для курьеров: назначьте роль с базовым типом «Курьер», затем привяжите этот аккаунт в справочнике курьеров.</span></div>
      <div class="field full" id="u_kind_field" style="display:none"><label>Тип курьера</label><select id="u_kind">
        <option value="pickup" ${u.courier_kind==='pickup'?'selected':''}>Курьер заборщик</option>
        <option value="order" ${u.courier_kind==='order'||!u.courier_kind?'selected':''}>Курьер по заказам</option></select>
        <span class="hint">Определяет, в каком справочнике курьеров появится этот аккаунт для привязки.</span></div>
    </div>`,
    async()=>{
      const roleId=val('u_role');
      const baseType=(S.roles.find(r=>r.id===roleId)||{}).base_type||'';
      // синхронизируем старое текстовое поле role для серверного RLS (current_role_name)
      const legacy=baseType==='admin'?'admin':baseType==='courier'?'courier':'manager';
      const courier_kind=baseType==='courier'?val('u_kind'):null;
      const newPhone=phoneVal('u_phone');
      const newEmail=val('u_email').trim();
      // изменился ли логин (телефон или email)?
      const phoneChanged=newPhone!==(u.phone||'');
      const emailChanged=newEmail!==(u.email||'')&&newEmail!=='';
      if(phoneChanged||emailChanged){
        if(!isAdmin()){toast('Менять логин может только администратор');return false;}
        toast('Обновляем данные входа…');
        const payload={user_id:id};
        if(phoneChanged&&newPhone)payload.phone=newPhone;
        if(emailChanged)payload.email=newEmail;
        const out=await callUpdateUser(payload);
        if(out.error){alert('Не удалось изменить логин:\n\n'+out.error);return false;}
        // подхватываем новый email из ответа
        if(out.email)u.email=out.email;
      }
      const row={full_name:val('u_name').trim(),phone:newPhone,city_id:val('u_city')||null,
        position:val('u_pos').trim(),role_id:roleId||null,role:legacy,courier_kind};
      const u2=await dbUpdate('profiles',id,row);if(!u2)return false;Object.assign(u,u2);
      if(id===S.me.id){await loadMe({user:{id:S.me.id,email:S.me.email}});buildNav();}
      toast('Сохранено');renderUsers();return true;});
  attachPhone('u_phone',u.phone);
  const ur=$('u_role');const toggleUKind=()=>{const bt=(S.roles.find(r=>r.id===ur.value)||{}).base_type;
    $('u_kind_field').style.display=bt==='courier'?'':'none';};
  ur.onchange=toggleUKind;toggleUKind();
}

/* ---- РОЛИ И ПРАВА ---- */
function renderRoles(){
  const rows=[...S.roles].sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const baseLabel={admin:'Админ',staff:'Персонал',courier:'Курьер'};
  $('usersContent').innerHTML=`<div class="panel">
    <div class="panel-head"><h2>Роли</h2><span class="count">${rows.length}</span>
      ${can('users','create')?`<button class="btn primary sm" id="addRole" style="margin-left:auto">＋ Добавить роль</button>`:''}</div>
    <div class="table-scroll"><table><thead><tr><th>Роль</th><th>Базовый тип</th><th>Заявки</th><th>Заказы</th><th>Справочники</th><th>Пользователи</th><th></th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td><strong>${esc(r.name)}</strong></td>
      <td><span class="pill ${r.base_type==='admin'?'gold':r.base_type==='courier'?'':'moss'}">${baseLabel[r.base_type]||r.base_type}</span></td>
      ${MODULES.map(([m])=>`<td>${permSummary(r.perms&&r.perms[m])}</td>`).join('')}
      <td><div class="row-actions">
        ${can('users','edit')?`<button class="btn sm ghost" data-redit="${r.id}">Изменить</button>`:''}
        ${can('users','delete')?`<button class="btn sm danger" data-rdel="${r.id}">Удалить</button>`:''}
      </div></td></tr>`).join('')}</tbody></table></div></div>`;
  if($('addRole'))$('addRole').onclick=()=>roleModal();
  $('usersContent').querySelectorAll('[data-redit]').forEach(b=>b.onclick=()=>roleModal(b.dataset.redit));
  $('usersContent').querySelectorAll('[data-rdel]').forEach(b=>b.onclick=()=>delRole(b.dataset.rdel));
}
function permSummary(p){
  if(!p||!p.view)return '<span style="color:var(--muted)">нет</span>';
  const parts=[];if(p.create)parts.push('С');if(p.edit)parts.push('Р');if(p.delete)parts.push('У');
  return parts.length?`<span class="pill moss">просмотр +${parts.join('')}</span>`:'<span class="pill">просмотр</span>';
}
async function delRole(id){
  const r=S.roles.find(x=>x.id===id);
  const used=S.profiles.filter(p=>p.role_id===id).length;
  if(used){toast(`Роль используется у ${used} польз. Сначала смените им роль.`);return;}
  if(!confirm(`Удалить роль «${r?.name||''}»?`))return;
  if(await dbDelete('roles',id)){S.roles=S.roles.filter(x=>x.id!==id);toast('Роль удалена');renderUsers();}
}
function roleModal(id){
  const r=id?S.roles.find(x=>x.id===id):{name:'',base_type:'staff',perms:{}};
  const p=r.perms||{};
  const matrix=MODULES.map(([m,mlabel])=>{
    const mp=p[m]||{};
    return `<tr><td style="font-weight:600">${mlabel}</td>${ACTIONS.map(([a])=>`<td style="text-align:center"><input type="checkbox" data-perm="${m}.${a}" ${mp[a]?'checked':''}></td>`).join('')}</tr>`;
  }).join('');
  showModal(id?'Роль':'Новая роль',`
    <div class="field"><label>Название роли</label><input id="r_name" value="${esc(r.name)}" placeholder="Напр. Оператор склада"></div>
    <div class="field"><label>Базовый тип (для безопасности)</label>
      <select id="r_base">
        <option value="admin" ${r.base_type==='admin'?'selected':''}>Админ — полный доступ + управление</option>
        <option value="staff" ${r.base_type==='staff'?'selected':''}>Персонал — видит все данные в разрешённых модулях</option>
        <option value="courier" ${r.base_type==='courier'?'selected':''}>Курьер — видит только свои заявки/заказы</option>
      </select>
      <span class="hint">Базовый тип задаёт серверную защиту. «Курьер» автоматически ограничивает видимость только своими записями.</span></div>
    <div class="field"><label>Права по модулям</label>
      <table style="font-size:13px;width:100%;border-collapse:collapse"><thead><tr><th style="text-align:left"></th>${ACTIONS.map(([,al])=>`<th style="text-align:center;font-size:11px;text-transform:uppercase;color:var(--muted);padding:6px 4px">${al}</th>`).join('')}</tr></thead>
      <tbody>${matrix}</tbody></table></div>`,
    async()=>{
      const name=val('r_name').trim();if(!name){toast('Укажите название');return false;}
      const perms={};
      MODULES.forEach(([m])=>{perms[m]={};ACTIONS.forEach(([a])=>{const el=document.querySelector(`[data-perm="${m}.${a}"]`);perms[m][a]=!!(el&&el.checked);});});
      const row={name,base_type:val('r_base'),perms};
      if(id){const u=await dbUpdate('roles',id,row);if(!u)return false;Object.assign(S.roles.find(x=>x.id===id),u);}
      else{const u=await dbInsert('roles',row);if(!u)return false;S.roles.push(u);}
      // если изменили свою роль — пересчитать права
      if(id&&S.me.role_id===id)computeMyPerms();
      toast('Сохранено');renderUsers();return true;},{mid:true});
}
</script>

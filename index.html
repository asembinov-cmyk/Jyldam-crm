}
function logActorName(r){return r.user_name||'—';}
function fmtLogTime(ts){if(!ts)return '';const d=new Date(ts);const p=n=>String(n).padStart(2,'0');
  return {date:`${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()}`,time:`${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`};}

  $('hffrom').onchange=e=>{hf.from=e.target.value;drawHistory();};
  $('hfto').onchange=e=>{hf.to=e.target.value;drawHistory();};
  $('hfclear').onclick=()=>{hf={q:'',action:'',entity:'',user:'',from:'',to:''};renderHistory();};

function filteredHistory(){
  const q=hf.q.toLowerCase().trim();
  return (S.activityLog||[]).filter(r=>{
    if(hf.action&&r.action!==hf.action)return false;
    if(hf.entity&&r.entity!==hf.entity)return false;
    if(hf.user&&r.user_name!==hf.user)return false;
    const d=(r.created_at||'').slice(0,10);
    if(hf.from&&(!d||d<hf.from))return false;
    if(hf.to&&(!d||d>hf.to))return false;
    if(q){
      const chg=(r.changes||[]).map(c=>`${c.label} ${c.old} ${c.new}`).join(' ');
      const hay=[r.user_name,ENTITY_LABEL[r.entity]||r.entity,r.entity_label,ACTION_LABEL[r.action]||r.action,chg].join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
}
function changesHtml(r){
  if(r.action==='ket')return '<span style="color:var(--muted);font-size:12px">Отправлен в KET'+(r.meta&&r.meta.ket_id?(' · ID '+esc(r.meta.ket_id)):'')+'</span>';
  if(!r.changes||!r.changes.length)return '<span style="color:var(--muted)">—</span>';
  return `<div class="log-changes">${r.changes.map(c=>`<div class="log-chg"><span class="f">${esc(c.label)}:</span> <span class="old">${esc(c.old)}</span><span class="arr">→</span><span class="new">${esc(c.new)}</span></div>`).join('')}</div>`;
}
function drawHistory(){
  const el=$('histTable');const rows=filteredHistory();
  const cnt=$('histCount');if(cnt)cnt.textContent=rows.length;
  if(!rows.length){el.innerHTML='<div class="empty"><div class="big">Записей нет</div>Измените фильтры или подождите новых действий.</div>';return;}
  el.innerHTML=`<div class="table-scroll"><table class="resp-table"><thead><tr>
    <th>Дата и время</th><th>Пользователь</th><th>Действие</th><th>Объект</th><th>Что изменилось</th></tr></thead>
    <tbody>${rows.map(r=>{
      const t=fmtLogTime(r.created_at);
      const ent=ENTITY_LABEL[r.entity]||r.entity;
      const lbl=r.entity_label?(' '+r.entity_label):'';
      return `<tr>
        <td data-label="Дата и время"><div class="log-when"><b>${t.date}</b>${t.time}</div></td>
        <td data-label="Пользователь"><span class="log-user">${esc(logActorName(r))}</span></td>
        <td data-label="Действие"><span class="log-act ${esc(r.action)}">${esc(ACTION_LABEL[r.action]||r.action)}</span></td>
        <td data-label="Объект">${esc(ent)}${lbl?`<strong>${esc(lbl)}</strong>`:''}</td>
        <td data-label="Что изменилось">${changesHtml(r)}</td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}

function ordersForIntercity(cityId,date){
  return (S.orders||[]).filter(o=>{
    if(!isCourierDelivery(o.delivery_id))return false;
    if(o.courier_city_id!==cityId)return false;
    if(o.intercity_shipment_id)return false;
    // фильтр по дате забора заказа (если дата выбрана)
    if(date){const d=(o.pickup_date||o.created_at||'').slice(0,10);if(d!==date)return false;}
    return true;
  });
}

/* ================= МОДУЛЬ: КАЛЬКУЛЯЦИЯ ================= */
// определения статей расходов калькуляции.
// kind: 'fixed' — фиксированная стоимость за заказ; 'fund' — месячный фонд, делится на заказы месяца
const CALC_FIELDS=[
  {key:'courier',   label:'Курьер (за заказ)',            kind:'fixed', hint:'Стоимость работы курьера'},
  {key:'pack',      label:'Пакет (за заказ)',             kind:'fixed', hint:'Стоимость пакета'},
  {key:'gofra',     label:'Гофра (за заказ)',             kind:'fixed', hint:'Стоимость гофры'},
  {key:'blank',     label:'Бланк (за заказ)',             kind:'fixed', hint:'Печать транспортной наклейки'},
  {key:'sms',       label:'SMS (за заказ)',               kind:'fixed', hint:'Стоимость SMS-уведомлений'},
  {key:'driver',    label:'Водитель (за заказ)',          kind:'fixed', hint:'Перевозка склад ↔ сортировка'},
  {key:'freight',   label:'Доставка груза (за заказ)',    kind:'fixed', hint:'Междугородняя перевозка (курьер по городу — 0)'},
  {key:'admin_courier', label:'ЗП Администратор курьера (за заказ)', kind:'fixed', hint:'Фиксированная ставка за заказ'},
  {key:'fund_logist',  label:'Фонд ЗП логистов (в месяц)',   kind:'fund', hint:'Делится на кол-во заказов за месяц'},
];
// сотрудники с окладом (делится на заказы месяца) + ставкой за заказ
const CALC_SALARY_FIELDS=[
  {salaryKey:'salary_processor', perKey:'perorder_processor', label:'Менеджер обработчик'},
];
// ПОЧТОВЫЕ фиксированные расходы (за заказ) — применяются к заказам с типом доставки «почта»
const CALC_POST_FIELDS=[
  {key:'post_pack',   label:'Пакет (за заказ)',          hint:'Упаковка для почтового заказа'},
  {key:'post_gofra',  label:'Гофра (за заказ)',          hint:'Гофра для почтового заказа'},
  {key:'post_blank',  label:'Бланк (за заказ)',          hint:'Печать наклейки'},
  {key:'post_sms',    label:'SMS (за заказ)',            hint:'SMS-уведомления'},
  {key:'post_driver', label:'Водитель (за заказ)',       hint:'Перевозка склад ↔ сортировка'},
  {key:'post_freight',label:'Доставка почтой (за заказ)',hint:'Стоимость отправки почтой'},
];
// настройки калькуляции для периода: сначала ищем строку месяца, иначе дефолтную (без периода)
function calcSettingsFor(period){
  const all=S.calcSettingsAll||[];
  if(period){const m=all.find(r=>r.period===period);if(m)return m;}
  // дефолт: строка без периода, иначе первая
  return all.find(r=>!r.period)||all[0]||{};
}
// текущие настройки для выбранного в интерфейсе периода нормативов
function calcCurrentSettings(){return calcSettingsFor(calcPeriodStr());}
// значение норматива из настроек периода (или 0). admin_courier по умолчанию 120.
// period — YYYY-MM месяца заказа; если не передан, берём выбранный в интерфейсе период нормативов.
function calcNorm(key,period){const cs=calcSettingsFor(period||calcPeriodStr());const v=cs[key];
  if(v!=null&&v!=='')return parseFloat(v);
  if(key==='admin_courier')return 120; // дефолт ЗП администратора курьера
  return 0;}
function calcMinProfit(period){const cs=calcSettingsFor(period||calcPeriodStr());return cs.min_profit!=null&&cs.min_profit!==''?parseFloat(cs.min_profit):0;}
// городской норматив (курьер/межгород) по id города и периоду; фолбэк: период→дефолт→общий
function calcCityNorm(cityId,key,period){
  const all=S.calcCityNorms||[];
  let row=period?all.find(r=>r.city_id===cityId&&r.period===period):null;
  if(!row)row=all.find(r=>r.city_id===cityId&&!r.period)||all.find(r=>r.city_id===cityId);
  if(row&&row[key]!=null&&row[key]!=='')return parseFloat(row[key]);
  return calcNorm(key,period); // запасной — общий норматив периода
}
// персональная ставка заборщика по id и периоду
function calcCourierPay(courierId,period){
  if(!courierId)return 0;
  const all=S.calcCourierNorms||[];
  let row=period?all.find(r=>r.courier_id===courierId&&r.period===period):null;
  if(!row)row=all.find(r=>r.courier_id===courierId&&!r.period)||all.find(r=>r.courier_id===courierId);
  return row&&row.pay!=null&&row.pay!==''?parseFloat(row.pay):0;
}
// ставка менеджера продаж (оклад/за заказ) по id и периоду
function calcSalesNorm(salesId,key,period){
  if(!salesId)return 0;
  const all=S.calcSalesNorms||[];
  let row=period?all.find(r=>r.sales_id===salesId&&r.period===period):null;
  if(!row)row=all.find(r=>r.sales_id===salesId&&!r.period)||all.find(r=>r.sales_id===salesId);
  return row&&row[key]!=null&&row[key]!==''?parseFloat(row[key]):0;
}
// сумма окладов всех менеджеров продаж за период (общий котёл)
function calcSalesTotalSalary(period){
  const ids=new Set((S.sales||[]).map(s=>s.id));
  let sum=0;
  ids.forEach(id=>{sum+=calcSalesNorm(id,'salary',period);});
  return sum;
}
// заборщик заказа: через заявку, из которой создан заказ (pickup.courier_id)
function orderPickerCourier(o){
  if(!o.pickup_id)return null;
  const pk=(S.pickups||[]).find(p=>p.id===o.pickup_id);
  return pk?pk.courier_id:null;
}
// финансовая раскладка курьерского заказа: все статьи расходов + остаток
function orderCourierFinance(o){
  const P=orderPeriodStr(o); // период (YYYY-MM) месяца забора заказа
  const revenue=(o.order_sum!=null&&o.order_sum!=='')?parseFloat(o.order_sum)||0:0;
  const cityId=o.courier_city_id||orderCalcCity(o);
  const monthOrders=ordersInOrderMonth(o); // кол-во заказов за месяц (для деления окладов/фондов)
  // межгород — из отправки (intercity_cost), иначе 0
  const intercity=(o.intercity_cost!=null&&o.intercity_cost!=='')?parseFloat(o.intercity_cost)||0:0;
  const courierPay=calcCityNorm(o.courier_city_id||cityId,'courier',P); // оплата курьеру города
  const pickerId=orderPickerCourier(o);
  const pickerPay=calcCourierPay(pickerId,P); // оплата заборщику (персонально)
  const blank=calcNorm('blank',P);
  const pack=calcNorm('pack',P);
  const adminCourier=calcNorm('admin_courier',P); // фикс 120 по умолчанию
  // ОБЩИЙ ОКЛАД = сумма окладов менеджеров продаж (все трое) + оклад обработчика + фонд логиста, ÷ все заказы месяца
  const totalSalary=calcSalesTotalSalary(P)+calcNorm('salary_processor',P)+calcNorm('fund_logist',P);
  const commonSalary=Math.round((totalSalary/monthOrders)*100)/100;
  // менеджер по продажам: персональная ставка за заказ того менеджера, что указан в заказе
  const manager=o.sales_id?calcSalesNorm(o.sales_id,'per_order',P):0;
  // менеджер обработчик: ставка за заказ (80), на все заказы
  const processor=calcNorm('perorder_processor',P);
  const totalCost=intercity+courierPay+pickerPay+blank+pack+adminCourier+commonSalary+manager+processor;
  const remainder=revenue-totalCost;
  return {revenue,intercity,courierPay,pickerId,pickerPay,blank,pack,adminCourier,commonSalary,
    manager,processor,monthOrders,totalCost,remainder,period:P};
}
// город забора заказа (pickup_city_id, иначе город партнёра)
function orderCalcCity(o){
  if(o.pickup_city_id)return o.pickup_city_id;
  if(o.partner_id){const p=(S.partners||[]).find(x=>x.id===o.partner_id);if(p&&p.city_id)return p.city_id;}
  return null;
}
// кол-во заказов за месяц даты забора заказа (для деления фондов)
function ordersInOrderMonth(o){
  const d=(o.pickup_date||o.created_at||'').slice(0,7); // YYYY-MM
  if(!d)return 1;
  const n=(S.orders||[]).filter(x=>((x.pickup_date||x.created_at||'').slice(0,7))===d).length;
  return n||1;
}
// ПОЛНЫЙ РАСЧЁТ калькуляции заказа: выручка, статьи расходов, прибыль, маржа, ROI.
// Если у заказа есть сохранённый снимок calc — используем его статьи (старые заказы не пересчитываются нормативами).
function calcOrder(o){
  const P=orderPeriodStr(o); // период месяца заказа
  const cityId=orderCalcCity(o);
  const snap=(o.calc&&typeof o.calc==='object')?o.calc:null;
  // выручка = сумма заказа (если не задана — 0)
  const revenue=(o.order_sum!=null&&o.order_sum!=='')?parseFloat(o.order_sum)||0:0;
  const monthOrders=ordersInOrderMonth(o);
  // тип доставки: курьерская или почтовая
  const isCourierType=isCourierDelivery(o.delivery_id);
  let items;
  if(isCourierType){
    // КУРЬЕРСКИЙ заказ — статьи из CALC_FIELDS (курьер/межгород по городу)
    items=CALC_FIELDS.map(f=>{
      let amount;
      if(snap&&snap.items&&snap.items[f.key]!=null)amount=parseFloat(snap.items[f.key])||0;
      else if(f.kind==='fund')amount=Math.round((calcNorm(f.key,P)/monthOrders)*100)/100;
      else if(f.key==='freight'){
        amount=(o.intercity_cost!=null&&o.intercity_cost!=='')?parseFloat(o.intercity_cost)||0:calcCityNorm(cityId,'freight',P);
      }
      else if(f.key==='courier')amount=calcCityNorm(cityId,f.key,P);
      else amount=calcNorm(f.key,P);
      return {key:f.key,label:f.label,amount};
    });
  }else{
    // ПОЧТОВЫЙ заказ — почтовые фиксированные статьи + распределяемые фонды (общие)
    const postItems=CALC_POST_FIELDS.map(f=>{
      let amount;
      if(snap&&snap.items&&snap.items[f.key]!=null)amount=parseFloat(snap.items[f.key])||0;
      else amount=calcNorm(f.key,P);
      return {key:f.key,label:f.label,amount};
    });
    const fundItems=CALC_FIELDS.filter(f=>f.kind==='fund').map(f=>{
      let amount;
      if(snap&&snap.items&&snap.items[f.key]!=null)amount=parseFloat(snap.items[f.key])||0;
      else amount=Math.round((calcNorm(f.key,P)/monthOrders)*100)/100;
      return {key:f.key,label:f.label,amount};
    });
    items=postItems.concat(fundItems);
  }
  // статьи «оклад + за заказ»: обработчик (общий) + менеджер продаж (персональный)
  CALC_SALARY_FIELDS.forEach(f=>{
    const salary=Math.round((calcNorm(f.salaryKey,P)/monthOrders)*100)/100;
    const per=calcNorm(f.perKey,P);
    items.push({key:f.salaryKey,label:f.label,amount:salary+per});
  });
  // менеджер продаж: оклады всех в котёл ÷ заказы месяца + персональная ставка за заказ
  const P2=orderPeriodStr(o);
  const salesCommon=Math.round((calcSalesTotalSalary(P2)/monthOrders)*100)/100;
  const salesPer=o.sales_id?calcSalesNorm(o.sales_id,'per_order',P2):0;
  items.push({key:'sales_manager',label:'Менеджер по продажам',amount:salesCommon+salesPer});
  const totalCost=items.reduce((s,it)=>s+(it.amount||0),0);
  const profit=revenue-totalCost;
  const margin=revenue>0?(profit/revenue*100):0;
  const roi=totalCost>0?(profit/totalCost*100):0;
  return {revenue,items,totalCost,profit,margin,roi,cityId,monthOrders,isCourierType,period:P2};
}
// цвет индикации прибыли: red/yellow/green
function calcProfitColor(profit,period){
  if(profit<0)return 'red';
  if(profit<calcMinProfit(period))return 'yellow';
  return 'green';
}

let calcSub='norms'; // подвкладка раздела Калькуляция: norms | summary
// выбранный период нормативов (год-месяц). По умолчанию текущий.
let calcNormPeriod={year:new Date().getFullYear(),month:new Date().getMonth()};
function calcPeriodStr(p){p=p||calcNormPeriod;return `${p.year}-${String(p.month+1).padStart(2,'0')}`;}
// период месяца заказа (по дате забора) в формате YYYY-MM
function orderPeriodStr(o){return (o.pickup_date||o.created_at||'').slice(0,7);}
function renderCalc(){

  $('main').innerHTML=`

      <button data-calcsub="norms" class="${calcSub==='norms'?'active':''}">Нормативы</button>
      <button data-calcsub="summary" class="${calcSub==='summary'?'active':''}">Сводка</button>
    </div>
    <div id="calcContent"></div>`;

function renderCalcNorms(){
  const P=calcPeriodStr();
  const cs=calcCurrentSettings();
  const monthsRU=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const fixedFields=CALC_FIELDS.filter(f=>f.kind==='fixed');
  const fundFields=CALC_FIELDS.filter(f=>f.kind==='fund');
  const fieldRow=f=>`<div class="calc-norm-row">
    <div class="cn-label">${esc(f.label)}<span class="cn-hint">${esc(f.hint)}</span></div>

async function saveCalcSettings(){
  const btn=$('calcSaveBtn');if(btn)btn.disabled=true;
  const P=calcPeriodStr(); // сохраняем в выбранный месяц
  const row={period:P};
  document.querySelectorAll('[data-calcnorm]').forEach(inp=>{
    const k=inp.dataset.calcnorm;const v=inp.value.trim();
    row[k]=v===''?0:parseFloat(v)||0;
  });
  try{
    const allS=S.calcSettingsAll||[];
    const existS=allS.find(r=>r.period===P);
    let saved;
    if(existS){saved=await dbUpdate('calc_settings',existS.id,row);if(saved)Object.assign(existS,saved);}
    else{saved=await dbInsert('calc_settings',row);if(saved){if(!S.calcSettingsAll)S.calcSettingsAll=[];S.calcSettingsAll.push(saved);}}
    // городские нормативы (курьер/межгород) за период
    const cityRows=document.querySelectorAll('[data-citynorm]');
    for(const el of cityRows){
      const cid=el.dataset.citynorm;
      const courierV=el.querySelector(`[data-ccourier="${cid}"]`).value.trim();
      const freightV=el.querySelector(`[data-cfreight="${cid}"]`).value.trim();
      const existing=(S.calcCityNorms||[]).find(r=>r.city_id===cid&&r.period===P);
      if(courierV===''&&freightV===''&&!existing)continue;
      const payload={city_id:cid,period:P,courier:courierV===''?null:parseFloat(courierV)||0,freight:freightV===''?null:parseFloat(freightV)||0};
      if(existing){const u=await dbUpdate('calc_city_norms',existing.id,payload);if(u)Object.assign(existing,u);}
      else{const u=await dbInsert('calc_city_norms',payload);if(u){if(!S.calcCityNorms)S.calcCityNorms=[];S.calcCityNorms.push(u);}}
    }
    // ставки заборщиков за период
    const payRows=document.querySelectorAll('[data-courpay]');
    for(const el of payRows){
      const cid=el.dataset.courpay;
      const v=el.querySelector(`[data-cpay="${cid}"]`).value.trim();
      const existing=(S.calcCourierNorms||[]).find(r=>r.courier_id===cid&&r.period===P);
      if(v===''&&!existing)continue;
      const payload={courier_id:cid,period:P,pay:v===''?0:parseFloat(v)||0};
      if(existing){const u=await dbUpdate('calc_courier_norms',existing.id,payload);if(u)Object.assign(existing,u);}
      else{const u=await dbInsert('calc_courier_norms',payload);if(u){if(!S.calcCourierNorms)S.calcCourierNorms=[];S.calcCourierNorms.push(u);}}
    }
    // ставки менеджеров продаж за период
    const salesRows=document.querySelectorAll('[data-salespay]');
    for(const el of salesRows){
      const sid=el.dataset.salespay;
      const sal=el.querySelector(`[data-ssalary="${sid}"]`).value.trim();
      const per=el.querySelector(`[data-sper="${sid}"]`).value.trim();
      const existing=(S.calcSalesNorms||[]).find(r=>r.sales_id===sid&&r.period===P);
      if(sal===''&&per===''&&!existing)continue;
      const payload={sales_id:sid,period:P,salary:sal===''?0:parseFloat(sal)||0,per_order:per===''?0:parseFloat(per)||0};
      if(existing){const u=await dbUpdate('calc_sales_norms',existing.id,payload);if(u)Object.assign(existing,u);}
      else{const u=await dbInsert('calc_sales_norms',payload);if(u){if(!S.calcSalesNorms)S.calcSalesNorms=[];S.calcSalesNorms.push(u);}}
    }
    const s=$('calcSaved');if(s){s.textContent='Сохранено ✓';setTimeout(()=>{if(s)s.textContent='';},2500);}
    toast('Нормативы сохранены за '+P);
  }catch(e){console.error(e);toast('Ошибка сохранения');}
  if(btn)btn.disabled=false;
}

let calcSummaryMonth={year:new Date().getFullYear(),month:new Date().getMonth()};
function renderCalcSummary(){
  const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const sel=`${calcSummaryMonth.year}-${String(calcSummaryMonth.month+1).padStart(2,'0')}`;
  // заказы выбранного месяца (по дате забора)
  const monthOrders=(S.orders||[]).filter(o=>((o.pickup_date||o.created_at||'').slice(0,7))===sel);
  // считаем калькуляцию каждого
  const calcs=monthOrders.map(o=>({o,c:calcOrder(o)}));
  const totRevenue=calcs.reduce((s,x)=>s+x.c.revenue,0);
  const totCost=calcs.reduce((s,x)=>s+x.c.totalCost,0);
  const totProfit=totRevenue-totCost;
  const avgMargin=totRevenue>0?(totProfit/totRevenue*100):0;
  const avgRoi=totCost>0?(totProfit/totCost*100):0;
  // разбивка курьерские / почтовые
  const cour=calcs.filter(x=>x.c.isCourierType), post=calcs.filter(x=>!x.c.isCourierType);
  const sumBlock=arr=>({cnt:arr.length,rev:arr.reduce((s,x)=>s+x.c.revenue,0),cost:arr.reduce((s,x)=>s+x.c.totalCost,0),profit:arr.reduce((s,x)=>s+(x.c.revenue-x.c.totalCost),0)});
  const courSum=sumBlock(cour), postSum=sumBlock(post);
  // заработок курьеров доставки: courier-норматив города заказа, по order_courier_id
  const byCourier={};
  calcs.forEach(({o,c})=>{
    const cid=o.order_courier_id;if(!cid)return;
    const courierCost=(c.items.find(i=>i.key==='courier')||{}).amount||0;
    if(!byCourier[cid])byCourier[cid]={count:0,earn:0};
    byCourier[cid].count++;byCourier[cid].earn+=courierCost;
  });
  const courierRows=Object.entries(byCourier)
    .map(([cid,v])=>({name:orderCourierName(cid),count:v.count,earn:v.earn}))
    .sort((a,b)=>b.earn-a.earn);
  const fmtMoney=n=>Math.round(n).toLocaleString('ru-RU')+' ₸';
  const profitColor=totProfit<0?'#c0392b':(totProfit<calcMinProfit()*monthOrders.length?'#c08a2d':'#2e7d32');
  $('calcContent').innerHTML=`
    <div class="calc-sum-bar">
      <select id="calcSumMonth">${months.map((m,i)=>`<option value="${i}" ${calcSummaryMonth.month===i?'selected':''}>${m}</option>`).join('')}</select>
      <select id="calcSumYear">${(()=>{const ny=new Date().getFullYear();let o='';for(let y=2025;y<=ny+1;y++)o+=`<option value="${y}" ${calcSummaryMonth.year===y?'selected':''}>${y}</option>`;return o;})()}</select>
      <span class="calc-sum-cnt">Заказов: <b>${monthOrders.length}</b></span>
    </div>
    <div class="calc-totals">
      <div class="ct-card"><div class="ct-k">Выручка</div><div class="ct-v">${fmtMoney(totRevenue)}</div></div>
      <div class="ct-card"><div class="ct-k">Итого расходы</div><div class="ct-v">${fmtMoney(totCost)}</div></div>
      <div class="ct-card"><div class="ct-k">Чистая прибыль</div><div class="ct-v" style="color:${profitColor}">${fmtMoney(totProfit)}</div></div>
      <div class="ct-card"><div class="ct-k">Маржинальность</div><div class="ct-v">${avgMargin.toFixed(1)}%</div></div>
      <div class="ct-card"><div class="ct-k">ROI</div><div class="ct-v">${avgRoi.toFixed(1)}%</div></div>
    </div>
    <div class="panel calc-panel" style="margin-bottom:18px">
      <h3 class="calc-h">Разбивка по типу доставки</h3>
      <table class="calc-courier-tbl"><thead><tr><th>Тип</th><th>Заказов</th><th>Выручка</th><th>Расходы</th><th>Прибыль</th></tr></thead>
        <tbody>
          <tr><td>Курьерская</td><td>${courSum.cnt}</td><td>${fmtMoney(courSum.rev)}</td><td>${fmtMoney(courSum.cost)}</td><td><b style="color:${courSum.profit<0?'#c0392b':'#2e7d32'}">${fmtMoney(courSum.profit)}</b></td></tr>
          <tr><td>Почтовая</td><td>${postSum.cnt}</td><td>${fmtMoney(postSum.rev)}</td><td>${fmtMoney(postSum.cost)}</td><td><b style="color:${postSum.profit<0?'#c0392b':'#2e7d32'}">${fmtMoney(postSum.profit)}</b></td></tr>
          <tr style="border-top:2px solid var(--line)"><td><b>Всего (общий котёл)</b></td><td><b>${courSum.cnt+postSum.cnt}</b></td><td><b>${fmtMoney(totRevenue)}</b></td><td><b>${fmtMoney(totCost)}</b></td><td><b style="color:${profitColor}">${fmtMoney(totProfit)}</b></td></tr>
        </tbody></table>
    </div>
    <div class="panel calc-panel">
      <h3 class="calc-h">Заработок курьеров доставки</h3>
      <p class="calc-note">Считается по нормативу «Курьер» города заказа, для заказов, присвоенных курьеру в этом месяце.</p>
      ${courierRows.length?`<table class="calc-courier-tbl"><thead><tr><th>Курьер</th><th>Заказов</th><th>Заработок</th></tr></thead>
        <tbody>${courierRows.map(r=>`<tr><td>${esc(r.name)}</td><td>${r.count}</td><td><b>${fmtMoney(r.earn)}</b></td></tr>`).join('')}</tbody></table>`
        :'<div class="empty"><div class="big">Нет данных</div>За этот месяц нет заказов с назначенным курьером.</div>'}
    </div>`;
  $('calcSumMonth').onchange=e=>{calcSummaryMonth.month=parseInt(e.target.value,10);renderCalcSummary();};
  $('calcSumYear').onchange=e=>{calcSummaryMonth.year=parseInt(e.target.value,10);renderCalcSummary();};
}

/* ---------- MODAL ENGINE ---------- */
function showModal(title,bodyHtml,onSave,opts={}){
  const ov=document.createElement('div');ov.className='overlay';
  const foot=opts.readonly
    ? `<div class="modal-foot"><button class="btn primary" data-close>${esc(opts.closeLabel||'Закрыть')}</button></div>`
    : `<div class="modal-foot">${opts.clearBtn?'<button class="btn ghost" data-clear>Очистить</button>':''}<button class="btn ghost" data-cancel>Отмена</button><button class="btn primary" data-save>Сохранить</button></div>`;
  ov.innerHTML=`<div class="modal${opts.wide?' modal-wide':''}${opts.mid?' modal-mid':''}"><div class="modal-head"><h3>${esc(title)}</h3><button class="x">×</button></div>
    <div class="modal-body">${bodyHtml}</div>${foot}</div>`;
  document.body.appendChild(ov);
  const close=()=>{
    // beforeClose может запретить закрытие (например, требовать фото)
    if(typeof opts.beforeClose==='function'&&opts.beforeClose()===false)return;
    ov.remove();
  };
  ov.querySelector('.x').onclick=close;
  if(ov.querySelector('[data-cancel]'))ov.querySelector('[data-cancel]').onclick=close;
  if(ov.querySelector('[data-close]'))ov.querySelector('[data-close]').onclick=close;
  ov.onclick=e=>{if(e.target===ov)close();};
  const sv=ov.querySelector('[data-save]');
  if(sv)sv.onclick=async()=>{sv.disabled=true;const ok=await onSave();sv.disabled=false;if(ok!==false)close();};
  const clr=ov.querySelector('[data-clear]');
  if(clr&&typeof opts.clearBtn==='function')clr.onclick=()=>opts.clearBtn(ov);
  document.addEventListener('keydown',function esc2(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',esc2);}});
  const first=ov.querySelector('input,select,textarea');if(first)setTimeout(()=>first.focus(),50);
  return ov;
}
function showInfo(title,bodyHtml,opts){return showModal(title,bodyHtml,null,Object.assign({readonly:true},opts||{}));}

async function openPartnerCabinet(code){
  hideSplash();
  // ищем партнёра по qr_code
  const {data:rows,error}=await sb.from('partners').select('*').eq('qr_code',String(code).trim()).limit(1);
  if(error)throw error;
  const partner=rows&&rows[0];
  if(!partner){
    document.body.innerHTML=`<div class="pcab-err">Кабинет не найден.<br><small>Проверьте ссылку или QR-код.</small></div>`;
    return;
  }
  // подгружаем справочники, нужные кабинету (тип доставки, статусы, города)
  await loadPartnerDirs();
  renderPartnerCabinet(partner);
}

async function loadPartnerDirs(){
  try{
    const [dt,st,ost,cc,ct]=await Promise.all([
      sb.from('delivery_types').select('*'),
      sb.from('statuses').select('*'),
      sb.from('order_statuses').select('*'),
      sb.from('courier_cities').select('*'),
      sb.from('cities').select('*'),
    ]);
    if(dt.error)console.error('delivery_types:',dt.error.message);
    S.delivery=dt.data||[];S.statuses=st.data||[];S.orderStatuses=ost.data||[];
    S.courier_cities=cc.data||[];S.cities=ct.data||[];
  }catch(e){console.error('pcab dirs',e);}
  return (S.delivery||[]).length>0;
}

// отрисовка активной вкладки кабинета партнёра
function renderPartnerTab(partner){
  const v=$('pcabView');if(!v)return;
  const tab=partner.__tab||'home';
  if(tab==='home')return renderPTabHome(partner);
  if(tab==='orders')return renderPTabOrders(partner);
  if(tab==='pickups')return renderPTabPickups(partner);
  if(tab==='profile')return renderPTabProfile(partner);
}

async function loadPartnerHomeStats(partner){
  const el=$('phStats');if(!el)return;
  try{
    const today=new Date().toISOString().slice(0,10);
    const {data}=await sb.from('orders').select('created_at').eq('partner_id',partner.id).gte('created_at',today);
    const n=(data||[]).length;
    el.textContent=`Сегодня отправлений: ${n}`;
  }catch(e){el.textContent='';}
}

// ── Вкладка ЗАКАЗЫ ──
function renderPTabOrders(partner){
  const v=$('pcabView');
  v.innerHTML=`
    <div class="pcab-hist">
      <div class="pcab-hist-h">Мои заказы</div>
      <div class="pcab-filters">
        <input class="pcab-search" id="pcabq" placeholder="Поиск: №, клиент, трек…">
        <div class="pcab-dates">
          <label>С даты<input type="date" id="pcabFrom" value="${esc(partner.__pf.from)}"></label>
          <label>По дату<input type="date" id="pcabTo" value="${esc(partner.__pf.to)}"></label>
          <button class="pcab-clear" id="pcabClear">Сброс</button>
        </div>
      </div>
      <div id="pcabList" class="pcab-list"><div class="pcab-empty">Загрузка…</div></div>
    </div>`;
  const reload=()=>loadPartnerOrders(partner);
  $('pcabq').oninput=reload;
  $('pcabFrom').onchange=e=>{partner.__pf.from=e.target.value;reload();};
  $('pcabTo').onchange=e=>{partner.__pf.to=e.target.value;reload();};
  $('pcabClear').onclick=()=>{partner.__pf={from:'',to:''};renderPTabOrders(partner);};
  loadPartnerOrders(partner);
}

// ── Вкладка ЗАБОРЫ ──
function renderPTabPickups(partner){
  const v=$('pcabView');
  v.innerHTML=`
    <div class="pcab-hist">
      <div class="pcab-hist-h">Мои заборы</div>
      <button class="pcab-call sm" id="pcabCall2">📦 Вызвать курьера</button>
      <div id="pcabPickList" class="pcab-list"><div class="pcab-empty">Загрузка…</div></div>
    </div>`;
  $('pcabCall2').onclick=()=>partnerCallCourier(partner);
  loadPartnerPickups(partner);
}
async function loadPartnerPickups(partner){
  const box=$('pcabPickList');if(!box)return;
  let rows=[];
  try{
    const {data}=await sb.from('pickups').select('*').eq('partner_id',partner.id).order('pickup_date',{ascending:false}).limit(100);
    rows=data||[];
  }catch(e){console.error(e);}
  if(!rows.length){box.innerHTML='<div class="pcab-empty">Заборов пока нет</div>';return;}
  box.innerHTML=rows.map(p=>{
    const st=p.status_id?(statusObj(p.status_id)||{}).name:'';
    const collected=p.status_id&&isCollectedStatus(p.status_id);
    return `<div class="pcab-ord">
      <div class="pcab-ord-h"><b>${esc(fmtDate(p.pickup_date))}</b><span class="pcab-ord-date">${p.orders||0} зак.</span></div>
      <div class="pcab-ord-sub">${esc(p.address||partner.address||'—')}</div>
      <div class="pcab-ord-meta">${st?`<span class="pcab-tag ${collected?'lock':''}">${collected?'✅ ':''}${esc(st)}</span>`:''}</div>
    </div>`;
  }).join('');
}

// загрузка и отрисовка заказов партнёра с фильтром по дате создания и дате забора
async function loadPartnerOrders(partner){
  const box=$('pcabList');if(!box)return;
  let rows=[];
  try{
    const {data}=await sb.from('orders').select('*').eq('partner_id',partner.id).order('created_at',{ascending:false}).limit(300);
    rows=data||[];
  }catch(e){console.error(e);}
  partner.__orders=rows;
  drawPartnerOrders(partner);
}
function drawPartnerOrders(partner){
  const box=$('pcabList');if(!box)return;
  const pf=partner.__pf||{from:'',to:''};
  const q=(($('pcabq')&&$('pcabq').value)||'').toLowerCase().trim();
  let rows=(partner.__orders||[]).filter(o=>{
    const cd=(o.created_at||'').slice(0,10);
    const pd=(o.pickup_date||'').slice(0,10);
    // фильтр по дате: показываем, если ХОТЬ ОДНА из дат (создания или забора) попадает в диапазон
    if(pf.from){ if(!((cd&&cd>=pf.from)||(pd&&pd>=pf.from)))return false; }
    if(pf.to){ if(!((cd&&cd<=pf.to)||(pd&&pd<=pf.to)))return false; }
    if(q){
      const hay=[o.code,o.client,o.track,o.address,o.city_text,phoneDisplay(o.phone)].join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
  if(!rows.length){box.innerHTML='<div class="pcab-empty">Заказов нет</div>';return;}
  box.innerHTML=rows.map(o=>{
    const collected=partnerOrderCollected(o);
    const dtype=o.delivery_id?deliveryName(o.delivery_id):'не выбран';
    const st=o.status_id?(orderStatusObj(o.status_id)||{}).name:'';
    return `<div class="pcab-ord ${collected?'locked':''}" data-ord="${o.id}">
      <div class="pcab-ord-h">
        <b>#${esc(o.code)}</b>
        <span class="pcab-ord-date">${esc(fmtDate(o.created_at))}</span>
      </div>
      <div class="pcab-ord-sub">${esc(o.client||'без клиента')}${o.phone?(' · '+esc(phoneDisplay(o.phone))):''}</div>
      <div class="pcab-ord-meta">
        <span class="pcab-tag">${esc(dtype)}</span>
        ${o.track?`<span class="pcab-tag">трек: ${esc(o.track)}</span>`:''}
        ${st?`<span class="pcab-tag">${esc(st)}</span>`:''}
        ${collected?'<span class="pcab-tag lock">🔒 забран</span>':''}
      </div>
    </div>`;
  }).join('');
  // двойной тап / одиночный тап — открыть заказ
  box.querySelectorAll('[data-ord]').forEach(card=>{
    const open=()=>partnerEditOrder(partner,card.dataset.ord);
    card.ondblclick=open;
    let lastTap=0;
    card.onclick=()=>{const now=Date.now();if(now-lastTap<400){open();}lastTap=now;};
  });
}

// считаем заказ «забранным» (нельзя редактировать), если его статус или статус заявки завершающий
function partnerOrderCollected(o){
  if(o.status_id&&isCollectedOrderStatus(o.status_id))return true;
  return false;
}
function isCollectedOrderStatus(id){const s=orderStatusObj(id);if(!s)return false;return /забра|забро|собра|вруч|доставлен|выдан/i.test(s.name||'');}

// вызвать курьера: спросить количество, создать ОДНУ заявку + N заказов, открыть заполнение
async function partnerCallCourier(partner){
  const n=prompt('Сколько заказов нужно забрать?','1');
  if(n===null)return;
  const cnt=Math.max(1,parseInt(n,10)||1);
  const btn=$('pcabCall');if(btn){btn.disabled=true;btn.textContent='Создаём…';}
  try{
    const today=new Date().toISOString().slice(0,10);
    // 1) ищем СЕГОДНЯШНЮЮ заявку этого партнёра — чтобы не плодить дубли
    let pickup=null;
    const {data:exist}=await sb.from('pickups').select('*')
      .eq('partner_id',partner.id).eq('pickup_date',today)
      .order('created_at',{ascending:true}).limit(1);
    if(exist&&exist.length)pickup=exist[0];

    if(pickup){
      // заявка на сегодня уже есть — увеличиваем счётчик заказов
      const haveOrders=parseInt(pickup.orders||'0',10)||0;
      const {data:upd}=await sb.from('pickups').update({orders:haveOrders+cnt}).eq('id',pickup.id).select().single();
      if(upd)pickup=upd;
    }else{
      // заявки на сегодня нет — создаём одну с данными партнёра
      const pickupRow={
        partner_id:partner.id,name:partner.name,
        city_id:partner.city_id||null,district_id:partner.district_id||null,
        address:partner.address||'',phone:partner.phone||'',
        sales_id:partner.sales_id||null,processor_id:partner.processor_id||null,
        orders:cnt,pickup_date:today,created_at:new Date().toISOString(),
      };
      const {data:created,error:pErr}=await sb.from('pickups').insert(pickupRow).select().single();
      if(pErr)throw pErr;
      pickup=created;
    }

    // 2) создаём N новых заказов, привязанных к этой (одной) заявке
    const orderRows=[];
    for(let i=0;i<cnt;i++){
      orderRows.push({
        code:String(Math.floor(1000000+Math.random()*9000000)),
        pickup_id:pickup.id,partner_id:partner.id,
        sender:partner.name,pickup_date:today,
        delivery_id:defaultCourierDeliveryId(),
        pickup_city_id:partner.city_id||null,
        sales_id:partner.sales_id||null,processor_id:partner.processor_id||null,
        order_sum:partner.tariff_courier||null,cost:partner.tariff_courier||0,
        created_at:new Date().toISOString(),
      });
    }
    const {data:orders,error:oErr}=await sb.from('orders').insert(orderRows).select();
    if(oErr)throw oErr;

    // 3) выравниваем счётчик заявки по фактическому числу заказов под ней
    await syncPickupOrdersCount(pickup.id);

    if(btn){btn.disabled=false;btn.textContent='📦 Вызвать курьера';}
    partnerFillOrders(partner,orders);
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='📦 Вызвать курьера';}
    alert('Не удалось создать: '+(e&&e.message||e));
  }
}
// синхронизирует поле orders заявки с реальным числом заказов под ней
async function syncPickupOrdersCount(pickupId){
  try{
    const {data}=await sb.from('orders').select('id').eq('pickup_id',pickupId);
    const real=(data||[]).length;
    await sb.from('pickups').update({orders:real}).eq('id',pickupId);
  }catch(e){console.error('syncPickupOrdersCount',e);}
}

// общий HTML полей одного заказа (используется и при создании, и при редактировании)

function defaultMailDeliveryId(){const d=(S.delivery||[]).find(x=>!/курьер/i.test(x.name||''));return d?d.id:null;}

function courierCitiesSorted(){return (S.courier_cities||[]).slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'','ru'));}

// две взаимоисключающие галочки: курьерская / почтовая. Источник правды — «Почтовая»
function partnerToggleMail(oid){
  const mail=$('mail_'+oid);const cour=$('cour_chk_'+oid);const box=$('cour_'+oid);
  if(!mail)return;
  if(cour)cour.checked=!mail.checked; // курьерская = противоположность почтовой
  if(box)box.style.display=mail.checked?'none':'';
}
// клик по «Курьерская» — снимает «Почтовая» и наоборот
function partnerToggleCourier(oid){
  const mail=$('mail_'+oid);const cour=$('cour_chk_'+oid);
  if(mail&&cour)mail.checked=!cour.checked;
  partnerToggleMail(oid);
}
// собрать значения полей одного заказа для сохранения
function partnerCollectFields(o){
  const isMail=!!(($('mail_'+o.id)||{}).checked);
  const delivery_id=isMail?defaultMailDeliveryId():defaultCourierDeliveryId();
  return {
    delivery_id:delivery_id,
    track:(($('trk_'+o.id)||{}).value||'').trim(),
    comment:(($('cmt_'+o.id)||{}).value||'').trim(),
  };
}

    wrap.innerHTML=warn+orders.map((o,i)=>partnerOrderFieldsHtml(o,i)).join('');
    wrap.querySelectorAll('[data-mailchk]').forEach(c=>c.onchange=()=>partnerToggleMail(c.dataset.mailchk));
    wrap.querySelectorAll('[data-courchk]').forEach(c=>c.onchange=()=>partnerToggleCourier(c.dataset.courchk));

    const rb=$('reloadDirs');

  };
  renderCards();
  $('scanCancel').onclick=stopScan;

  $('pfillDone').onclick=async()=>{
    const btn=$('pfillDone');btn.disabled=true;btn.textContent='Сохраняем…';

      }
      alert('Заказы сохранены! Курьер заберёт посылки.');
      renderPartnerCabinet(partner);
    }catch(e){
      btn.disabled=false;btn.textContent='Готово';
      alert('Ошибка сохранения: '+(e&&e.message||e));
    }
  };
}

let _scanner=null;
function startScan(onResult){
  const ov=$('scanOverlay');if(!ov)return;
  ov.style.display='flex';
  if(typeof Html5Qrcode==='undefined'){alert('Сканер не загрузился, введите трек вручную');ov.style.display='none';return;}
  _scanner=new Html5Qrcode('scanReader');
  _scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:150}},
    decoded=>{onResult(decoded);stopScan();},
    ()=>{}
  ).catch(e=>{alert('Не удалось открыть камеру: '+e);ov.style.display='none';});
}
function stopScan(){
  const ov=$('scanOverlay');
  if(_scanner){_scanner.stop().then(()=>{_scanner.clear();_scanner=null;}).catch(()=>{_scanner=null;});}
  if(ov)ov.style.display='none';
}

  // классификация по названию статуса
  const isNew=o=>{const s=orderStatusObj(o.status_id);return !s||/получено от отправ|нов|создан/i.test(s.name||'');};
  const inWay=o=>{const s=orderStatusObj(o.status_id);return s&&/прибыл|выехал|пути|курьер|отправл|передан/i.test(s.name||'');};
  const delivered=o=>{const s=orderStatusObj(o.status_id);return s&&/доставлен|выдан|заверш/i.test(s.name||'');};
  const problem=o=>{const s=orderStatusObj(o.status_id);return s&&/проблем|возврат|отмен|ошибк/i.test(s.name||'');};
  const today=new Date().toISOString().slice(0,10);
  const cNew=orders.filter(isNew).length, cWay=orders.filter(inWay).length,
        cDel=orders.filter(delivered).length, cProb=orders.filter(problem).length;
  const todayCount=orders.filter(o=>(o.created_at||'').slice(0,10)===today).length;
  const couriersOn=new Set(orders.filter(o=>o.order_courier_id).map(o=>o.order_courier_id)).size;
  const d=new Date();const days=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const dateStr=`${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}, ${days[d.getDay()]}`;

  // ── СВОДНАЯ СТАТИСТИКА ПО ДНЯМ ──
  // помощники: город Алматы/Астана
  const isAlmaty=cid=>/алмат/i.test(cityName(cid)||'');
  const isAstana=cid=>/астан|нур-?султан/i.test(cityName(cid)||'');
  // город забора заказа: pickup_city_id, а если пусто — город партнёра-отправителя
  const orderPickupCity=o=>{
    if(o.pickup_city_id)return o.pickup_city_id;
    if(o.partner_id){const p=S.partners.find(x=>x.id===o.partner_id);if(p&&p.city_id)return p.city_id;}
    return null;
  };
  // список курьеров-заборщиков (для колонок)
  const courierList=[...(S.couriers||[])].sort((a,b)=>(a.fio||'').localeCompare(b.fio||''));
  // собираем все даты (по дате создания заказов и заявок)
  const dateSet=new Set();
  orders.forEach(o=>{const dt=(o.created_at||'').slice(0,10);if(dt)dateSet.add(dt);});
  pickups.forEach(p=>{const dt=(p.pickup_date||'').slice(0,10);if(dt)dateSet.add(dt);});
  const allDatesAll=[...dateSet].sort((a,b)=>b.localeCompare(a)); // новые сверху
  // фильтруем даты по выбранному месяцу/году (как и верхние карточки)
  const selMonthStr=`${dashPeriod.year}-${String(dashPeriod.month+1).padStart(2,'0')}`;
  const allDates=allDatesAll.filter(dt=>dt.slice(0,7)===selMonthStr);
  // строим строки статистики
  const statRows=allDates.map(dt=>{
    const dayOrders=orders.filter(o=>(o.created_at||'').slice(0,10)===dt);
    // заявки этого дня — по ДАТЕ ЗАБОРА (pickup_date)
    const dayPickups=pickups.filter(p=>(p.pickup_date||'').slice(0,10)===dt);
    // собранные заявки (статус «забрал посылки / собрано»)
    const collectedPickups=dayPickups.filter(p=>isCollectedStatus(p.status_id));
    // заказы: всего + по городу забора (pickup_city_id)
    const ordTotal=dayOrders.length;
    const ordAlmaty=dayOrders.filter(o=>isAlmaty(orderPickupCity(o))).length;
    const ordAstana=dayOrders.filter(o=>isAstana(orderPickupCity(o))).length;
    // заборы: СОБРАНО из ВСЕГО + собранные по городу заявки
    const pkTotal=dayPickups.length;            // всего заявок с забором в этот день
    const pkCollected=collectedPickups.length;  // из них собрано (забрал посылки)
    const pkAlmaty=collectedPickups.filter(p=>isAlmaty(p.city_id)).length;
    const pkAstana=collectedPickups.filter(p=>isAstana(p.city_id)).length;
    // по курьерам-заборщикам: {собрал, всего назначено} в этот день
    const byCourier=courierList.map(c=>{
      const assigned=dayPickups.filter(p=>p.courier_id===c.id).length;       // всего назначено курьеру
      const got=collectedPickups.filter(p=>p.courier_id===c.id).length;       // из них собрано
      return {got,assigned};
    });
    // курьерская / почтовая доставка (по типу доставки заказа)
    const courierDel=dayOrders.filter(o=>isCourierDelivery(o.delivery_id)).length;
    const mailDel=dayOrders.filter(o=>o.delivery_id&&!isCourierDelivery(o.delivery_id)).length;
    return {dt,ordTotal,ordAlmaty,ordAstana,pkTotal,pkCollected,pkAlmaty,pkAstana,byCourier,courierDel,mailDel};
  });

  // ── ДАННЫЕ ДЛЯ ВЕРХНИХ КАРТОЧЕК (за выбранный месяц) ──
  // границы выбранного месяца (dashPeriod)
  const mStart=new Date(dashPeriod.year,dashPeriod.month,1);
  const mEnd=new Date(dashPeriod.year,dashPeriod.month+1,0);
  const monthStr=`${mStart.getFullYear()}-${String(mStart.getMonth()+1).padStart(2,'0')}-01`;
  const monthEndStr=`${mEnd.getFullYear()}-${String(mEnd.getMonth()+1).padStart(2,'0')}-${String(mEnd.getDate()).padStart(2,'0')}`;
  const inMonth=d=>{const x=(d||'').slice(0,10);return x&&x>=monthStr&&x<=monthEndStr;};
  // подпись периода: 01.06.2026 – 30.06.2026
  const periodLabel=`${fmtDate(monthStr)} – ${fmtDate(monthEndStr)}`;

  // 1) ОБЩЕЕ КОЛ-ВО ЗАКАЗОВ за месяц по ДАТЕ ЗАБОРА (pickup_date)
  const ordersMonth=orders.filter(o=>inMonth(o.pickup_date)).length;
  // 2) Заявки на забор: собрано за месяц (по дате забора) + сегодня ожидается
  const pkMonth=pickups.filter(p=>inMonth(p.pickup_date));
  const pkCollectedMonth=pkMonth.filter(p=>isCollectedStatus(p.status_id)).length;
  const isWaiting=p=>{const s=statusObj(p.status_id);return !s||/нов|ожид|создан|принят/i.test(s.name||'');};
  const pkTodayWaiting=pickups.filter(p=>(p.pickup_date||'').slice(0,10)===today&&isWaiting(p)).length;
  // 3) По городам: СОБРАНО за месяц (по дате забора)
  const pkCollMonth=pkMonth.filter(p=>isCollectedStatus(p.status_id));
  const cityAstana=pkCollMonth.filter(p=>isAstana(p.city_id)).length;
  const cityAlmaty=pkCollMonth.filter(p=>isAlmaty(p.city_id)).length;
  // 4) Курьерская vs Почтовая за месяц (по дате забора заказа)
  const ordMonth=orders.filter(o=>inMonth(o.pickup_date));
  const delCourier=ordMonth.filter(o=>isCourierDelivery(o.delivery_id)).length;
  const delMail=ordMonth.filter(o=>o.delivery_id&&!isCourierDelivery(o.delivery_id)).length;
  const delTotal=delCourier+delMail;
  const pctCourier=delTotal?Math.round(delCourier/delTotal*100):0;
  const pctMail=delTotal?100-pctCourier:0;
  // 5) Финансы (выручка по order_sum) — сегодня и за месяц (по дате забора)
  const sumOf=arr=>arr.reduce((s,o)=>s+(parseFloat(o.order_sum)||0),0);
  const revToday=sumOf(orders.filter(o=>(o.pickup_date||'').slice(0,10)===today));
  const revMonth=sumOf(ordMonth);
  const fmtMoney=n=>{if(n>=1000000)return (n/1000000).toFixed(1).replace('.0','')+' млн';return Math.round(n).toLocaleString('ru-RU');};
  // SVG-донат курьерская/почтовая
  const R=34,C=2*Math.PI*R;const courLen=C*pctCourier/100;
  const donut=`<svg viewBox="0 0 90 90" width="78" height="78"><circle cx="45" cy="45" r="${R}" fill="none" stroke="#3d6478" stroke-width="14"/>
    <circle cx="45" cy="45" r="${R}" fill="none" stroke="#c97a3d" stroke-width="14" stroke-dasharray="${courLen} ${C}" transform="rotate(-90 45 45)" stroke-linecap="butt"/>
    <text x="45" y="49" text-anchor="middle" font-size="17" font-weight="800" font-family="'Fraunces',serif" fill="var(--ink)">${pctCourier}%</text></svg>`;

  $('main').innerHTML=`
    <div class="page-head dash-head"><div><h1>Добро пожаловать</h1><p>${esc(dateStr)}</p></div>
      <div class="dash-period-filter">
        <select id="dashMonth">${months.map((m,i)=>`<option value="${i}" ${dashPeriod.month===i?'selected':''}>${m.charAt(0).toUpperCase()+m.slice(1)}</option>`).join('')}</select>
        <select id="dashYear">${(()=>{const ny=new Date().getFullYear();let o='';for(let y=2025;y<=ny+1;y++)o+=`<option value="${y}" ${dashPeriod.year===y?'selected':''}>${y}</option>`;return o;})()}</select>
        <button class="btn ghost sm" id="dashThisMonth">Текущий</button>
      </div>
    </div>
    <div class="dash-cards">
      <div class="dash-card c-new"><div class="dc-ic">📦</div><div><div class="dc-v">${ordersMonth}</div><div class="dc-k">Общее кол-во заказов</div><div class="dc-period">${esc(periodLabel)}</div></div></div>
      <div class="dash-card c-pickup"><div class="dc-ic">📥</div><div><div class="dc-v">${pkCollectedMonth}</div><div class="dc-k">Заявки на забор</div><div class="dc-extra">собрано за месяц · сегодня ожидается ${pkTodayWaiting}</div><div class="dc-period">${esc(periodLabel)}</div></div></div>
      <div class="dash-card c-cities"><div class="dc-cities"><div class="dc-cities-h">Собрано заявок по городам</div><div class="dcity"><span class="dcity-n">Астана</span><span class="dcity-dots">${'●'.repeat(Math.min(12,Math.ceil(cityAstana/5)))||'○'}</span><span class="dcity-v">${cityAstana}</span></div><div class="dcity"><span class="dcity-n">Алматы</span><span class="dcity-dots">${'●'.repeat(Math.min(12,Math.ceil(cityAlmaty/5)))||'○'}</span><span class="dcity-v">${cityAlmaty}</span></div><div class="dc-period">${esc(periodLabel)}</div></div></div>
      <div class="dash-card c-donut"><div class="dc-donut-wrap">${donut}<div class="dc-donut-leg"><div><span class="lg-dot" style="background:#c97a3d"></span>Курьерская <b>${pctCourier}%</b></div><div><span class="lg-dot" style="background:#3d6478"></span>Почтовая <b>${pctMail}%</b></div><div class="dc-period">${esc(periodLabel)}</div></div></div></div>
      <div class="dash-card c-fin"><div class="dc-ic">₸</div><div><div class="dc-fin-row"><span>Сегодня</span><b>${fmtMoney(revToday)}</b></div><div class="dc-fin-row"><span>За месяц</span><b>${fmtMoney(revMonth)}</b></div><div class="dc-period">${esc(periodLabel)}</div></div></div>
    </div>
    <div class="dash-mini"><span><b>${orders.length}</b> Всего заказов</span><span><b>${todayCount}</b> Сегодня</span><span><b>${couriersOn}</b> Курьеров задействовано</span></div>
    <div class="panel">
      <div class="panel-head"><h2>Статистика по дням</h2><span class="count">${statRows.length}</span></div>
      <div class="table-scroll dash-stat-scroll"><table class="dash-stat"><thead>
        <tr>
          <th rowspan="2">Дата</th>
          <th colspan="3" class="grp grp-ord">Кол-во заказов</th>
          <th colspan="3" class="grp grp-pk">Заборы (собрано / всего)</th>
          ${courierList.length?`<th colspan="${courierList.length}" class="grp grp-cour">Курьеры-заборщики (заявок)</th>`:''}
          <th colspan="2" class="grp grp-del">Доставка</th>
        </tr>
        <tr>
          <th>Всего</th><th class="c-alm">Алматы</th><th class="c-ast">Астана</th>
          <th>Всего</th><th class="c-alm">Алматы</th><th class="c-ast">Астана</th>
          ${courierList.map(c=>`<th class="cour-col" title="${esc(c.fio)}">${esc((c.fio||'').split(' ')[0])}<small class="cour-city">${esc(c.city_id?cityName(c.city_id):'—')}</small></th>`).join('')}
          <th>Курьерская</th><th>Почтовая</th>
        </tr></thead>
        <tbody>${statRows.length?statRows.map(r=>`<tr>
          <td class="d-date"><b>${esc(fmtDate(r.dt))}</b></td>
          <td class="num"><b>${r.ordTotal}</b></td><td class="num c-alm">${r.ordAlmaty||'—'}</td><td class="num c-ast">${r.ordAstana||'—'}</td>
          <td class="num"><b>${r.pkCollected}</b><small style="color:var(--muted)"> / ${r.pkTotal}</small></td><td class="num c-alm">${r.pkAlmaty||'—'}</td><td class="num c-ast">${r.pkAstana||'—'}</td>
          ${r.byCourier.map(c=>`<td class="num cour-col">${c.assigned?`<b>${c.got}</b><small style="color:var(--muted)"> / ${c.assigned}</small>`:'—'}</td>`).join('')}
          <td class="num">${r.courierDel||'—'}</td><td class="num">${r.mailDel||'—'}</td>
        </tr>`).join(''):`<tr><td colspan="${8+courierList.length}" style="text-align:center;color:var(--muted);padding:30px">Пока нет данных</td></tr>`}</tbody>
        ${statRows.length?`<tfoot><tr class="dash-total">
          <td>Итого</td>
          <td class="num"><b>${statRows.reduce((s,r)=>s+r.ordTotal,0)}</b></td>
          <td class="num c-alm">${statRows.reduce((s,r)=>s+r.ordAlmaty,0)}</td>
          <td class="num c-ast">${statRows.reduce((s,r)=>s+r.ordAstana,0)}</td>
          <td class="num"><b>${statRows.reduce((s,r)=>s+r.pkCollected,0)}</b><small style="color:var(--muted)"> / ${statRows.reduce((s,r)=>s+r.pkTotal,0)}</small></td>
          <td class="num c-alm">${statRows.reduce((s,r)=>s+r.pkAlmaty,0)}</td>
          <td class="num c-ast">${statRows.reduce((s,r)=>s+r.pkAstana,0)}</td>
          ${courierList.map((c,i)=>{const got=statRows.reduce((s,r)=>s+r.byCourier[i].got,0);const asg=statRows.reduce((s,r)=>s+r.byCourier[i].assigned,0);return `<td class="num cour-col">${asg?`<b>${got}</b><small style="color:var(--muted)"> / ${asg}</small>`:'—'}</td>`;}).join('')}
          <td class="num">${statRows.reduce((s,r)=>s+r.courierDel,0)}</td>
          <td class="num">${statRows.reduce((s,r)=>s+r.mailDel,0)}</td>
        </tr></tfoot>`:''}
      </table></div>
    </div>`;
  // обработчики фильтра периода
  if($('dashMonth'))$('dashMonth').onchange=e=>{dashPeriod.month=parseInt(e.target.value,10);renderDashboard();};
  if($('dashYear'))$('dashYear').onchange=e=>{dashPeriod.year=parseInt(e.target.value,10);renderDashboard();};
  if($('dashThisMonth'))$('dashThisMonth').onclick=()=>{dashPeriod={year:new Date().getFullYear(),month:new Date().getMonth()};renderDashboard();};
}

/* ================= МОДУЛЬ: ЗАЯВКИ НА ЗАБОР ================= */
// локальная сегодняшняя дата YYYY-MM-DD (с учётом часового пояса, без сдвига в UTC)
function localToday(){const d=new Date();const off=d.getTimezoneOffset();return new Date(d.getTime()-off*60000).toISOString().slice(0,10);}
let pf={q:'',city:'',courier:'',sales:'',processor:'',status:'',dateFrom:localToday(),dateTo:localToday()};
let pickupsPage=1; // текущая страница пагинации заявок
let pickupsPerPage=50; // заявок на страницу
// мобильный режим: вместо пагинации — «Показать ещё»
const isMobileView=()=>window.matchMedia('(max-width:760px)').matches;
const MOBILE_STEP=20; // сколько подгружать за раз на мобиле
let pickupsMobileLimit=MOBILE_STEP; // сколько заявок показано на мобиле
let ordersMobileLimit=MOBILE_STEP;  // сколько заказов показано на мобиле

function visiblePickups(){
  if(isCourier()){
    const ids=myPickupCourierIds();
    const today=new Date().toISOString().slice(0,10);
    return S.pickups.filter(p=>ids.includes(p.courier_id) && (p.pickup_date||'').slice(0,10)===today);
  }
  return S.pickups;
}
function renderPickups(){
  pickupsPage=1; // при полной перерисовке начинаем с первой страницы
  const list=filteredPickups();
  const totalOrders=list.reduce((s,p)=>s+(+p.orders||0),0);
  const today=new Date().toISOString().slice(0,10);
  // «Собрано»: статус заявки содержит забран/собран/готов
  const collectedCount=list.filter(p=>isCollectedStatus(p.status_id)).length;
  const head=isCourier()?'Мои заборы':'Заявки на забор';
  $('main').innerHTML=`
    <div class="page-head"><div><h1>${head}</h1><p>Карточки забора посылок из магазинов-партнёров</p></div>
      ${can('pickups','create')?`<div class="head-actions"><button class="btn primary" id="newPickup">＋ Создать карточку забора</button></div>`:''}
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-ic">${ICONS.pickups}</div><div class="stat-body"><div class="k">Собрано заявок</div><div class="v">${collectedCount}<small> / ${list.length}</small></div></div></div>
      <div class="stat"><div class="stat-ic">${ICONS.orders}</div><div class="stat-body"><div class="k">Собрано заказов</div><div class="v">${totalOrders}</div></div></div>
      <div class="stat"><div class="stat-ic">${ICONS.today}</div><div class="stat-body"><div class="k">Сегодня</div><div class="v">${list.filter(p=>p.pickup_date===today).length}</div></div></div>
      ${isStaff()?`<div class="stat"><div class="stat-ic">${ICONS.users}</div><div class="stat-body"><div class="k">Курьеров</div><div class="v">${new Set(list.map(p=>p.courier_id).filter(Boolean)).size}</div></div></div>`:''}
    </div>
    <div class="panel">
      <div class="panel-head"><h2>Карточки забора</h2><span class="count" id="pickupsCount">${list.length}</span></div>
      <div class="filters">
        <input class="search" id="pfq" placeholder="Поиск: наименование, адрес, номер…" value="${esc(pf.q)}">
        ${isStaff()?`<select id="pfcity"><option value="">Все города</option>${S.cities.filter(c=>/алмат|астан|нур-?султан/i.test(c.name||'')).map(c=>`<option value="${c.id}" ${pf.city===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select>`:''}
        ${isStaff()?`<select id="pfcourier"><option value="">Все курьеры</option>${S.couriers.map(c=>`<option value="${c.id}" ${pf.courier===c.id?'selected':''}>${esc(c.fio)}</option>`).join('')}</select>`:''}
        <select id="pfstatus"><option value="">Все статусы</option>${S.statuses.map(s=>`<option value="${s.id}" ${pf.status===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select>
        ${isStaff()?`<label class="date-field"><span>Дата с</span><input type="date" id="pfdatefrom" value="${esc(pf.dateFrom)}"></label>
        <label class="date-field"><span>Дата по</span><input type="date" id="pfdateto" value="${esc(pf.dateTo)}"></label>
        ${(pf.dateFrom||pf.dateTo)?`<button class="btn ghost sm" id="pfdateclear" style="align-self:flex-end">Сбросить даты</button>`:''}`:''}
      </div>
      <div id="pickupTable"></div>
    </div>`;
  if($('newPickup'))$('newPickup').onclick=()=>pickupModal();
  $('pfq').oninput=e=>{pf.q=e.target.value;drawPickupsReset();};
  if($('pfcity'))$('pfcity').onchange=e=>{pf.city=e.target.value;drawPickupsReset();};
  if($('pfcourier'))$('pfcourier').onchange=e=>{pf.courier=e.target.value;drawPickupsReset();};
  $('pfstatus').onchange=e=>{pf.status=e.target.value;drawPickupsReset();};
  if($('pfdatefrom'))$('pfdatefrom').onchange=e=>{pf.dateFrom=e.target.value;renderPickups();};
  if($('pfdateto'))$('pfdateto').onchange=e=>{pf.dateTo=e.target.value;renderPickups();};
  if($('pfdateclear'))$('pfdateclear').onclick=()=>{pf.dateFrom='';pf.dateTo='';renderPickups();};
  drawPickups();
}
function filteredPickups(){
  const q=pf.q.toLowerCase().trim();
  return visiblePickups().filter(p=>{
    if(pf.city&&p.city_id!==pf.city)return false;
    if(pf.courier&&p.courier_id!==pf.courier)return false;
    if(pf.status&&p.status_id!==pf.status)return false;
    const pd=(p.pickup_date||'').slice(0,10);
    if(pf.dateFrom&&(!pd||pd<pf.dateFrom))return false;
    if(pf.dateTo&&(!pd||pd>pf.dateTo))return false;
    if(q){const hay=[p.name,phoneDisplay(p.phone),cityName(p.city_id),districtName(p.district_id),courierName(p.courier_id),p.address].join(' ').toLowerCase();if(!hay.includes(q))return false;}
    return true;
  }).sort((a,b)=>(b.pickup_date||'').localeCompare(a.pickup_date||''));
}
function drawPickups(){
  const el=$('pickupTable');const allRows=filteredPickups();
  // обновляем счётчик рядом с «Карточки забора» (отфильтрованное кол-во)
  {const cnt=$('pickupsCount');if(cnt)cnt.textContent=allRows.length;}
  removePickupsPager();
  if(!allRows.length){el.innerHTML=`<div class="empty"><div class="big">Пока нет карточек</div>${isStaff()?'Нажмите «Создать карточку забора».':'Вам пока не назначены заборы.'}</div>`;return;}
  if(isCourier()){drawCourierPickupCards(el,allRows);return;}
  const staff=isStaff();
  const mobile=isMobileView();

function removePickupsPager(){const ex=$('pickupsPager');if(ex)ex.remove();const m=$('main');if(m&&!$('ordersPager'))m.classList.remove('has-pager');}
function renderPickupsPager(total,totalPages,startIdx,shownCount){
  removePickupsPager();
  if(!total)return;
  const from=startIdx+1, to=startIdx+shownCount;
  const bar=document.createElement('div');
  bar.id='pickupsPager';bar.className='orders-pager';
  {const m=$('main');if(m)m.classList.add('has-pager');}
  bar.innerHTML=`
    <div class="op-info">Показаны <b>${from}–${to}</b> из <b>${total}</b></div>
    <div class="op-perpage">
      <span>На странице:</span>
      <div class="op-pp-wrap">
        <button class="op-btn op-pp-btn" id="ppPerPageBtn">${pickupsPerPage} ▾</button>
        <div class="op-pp-menu" id="ppPerPageMenu" style="display:none">
          ${ORDERS_PAGE_SIZES.map(s=>`<button class="op-pp-item ${s===pickupsPerPage?'active':''}" data-ppp="${s}">${s}</button>`).join('')}
        </div>
      </div>
    </div>
    <div class="op-nav">
      <button class="op-btn" data-ppage="first" ${pickupsPage<=1?'disabled':''} title="В начало">«</button>
      <button class="op-btn" data-ppage="prev" ${pickupsPage<=1?'disabled':''}>‹ Назад</button>
      <span class="op-page">Стр. ${pickupsPage} / ${totalPages}</span>
      <button class="op-btn" data-ppage="next" ${pickupsPage>=totalPages?'disabled':''}>Вперёд ›</button>
      <button class="op-btn" data-ppage="last" ${pickupsPage>=totalPages?'disabled':''} title="В конец">»</button>
    </div>`;
  document.body.appendChild(bar);
  const ppBtn=bar.querySelector('#ppPerPageBtn'), ppMenu=bar.querySelector('#ppPerPageMenu');
  if(ppBtn)ppBtn.onclick=e=>{e.stopPropagation();ppMenu.style.display=ppMenu.style.display==='none'?'flex':'none';};
  bar.querySelectorAll('[data-ppp]').forEach(b=>b.onclick=()=>{
    pickupsPerPage=parseInt(b.dataset.ppp,10)||50;pickupsPage=1;drawPickups();
    const t=$('pickupTable');if(t)t.scrollIntoView({behavior:'smooth',block:'start'});
  });
  document.addEventListener('click',function closePPP(ev){
    if(ppMenu&&!ppMenu.contains(ev.target)&&ev.target!==ppBtn){ppMenu.style.display='none';}
  },{once:true});
  bar.querySelectorAll('[data-ppage]').forEach(b=>b.onclick=()=>{
    const a=b.dataset.ppage;
    if(a==='first')pickupsPage=1;
    else if(a==='prev')pickupsPage=Math.max(1,pickupsPage-1);
    else if(a==='next')pickupsPage=Math.min(totalPages,pickupsPage+1);
    else if(a==='last')pickupsPage=totalPages;
    drawPickups();
    const t=$('pickupTable');if(t)t.scrollIntoView({behavior:'smooth',block:'start'});
  });
}

async function setPickupStatus(id,statusId){
  const p=S.pickups.find(x=>x.id===id);if(!p||p.status_id===statusId)return;
  const at=new Date().toISOString();
  const hist=Array.isArray(p.status_history)?p.status_history.slice():[];
  hist.push({statusId,at});
  const oldS=p.status_id;
  const upd=await dbUpdate('pickups',id,{status_id:statusId,status_at:at,status_history:hist});
  if(upd){Object.assign(p,upd);
    logAction('status','pickups',{entity_id:p.id,entity_label:pickupLabel(p),changes:[{field:'status_id',label:'Статус',old:logFieldValue('status_id',oldS),new:logFieldValue('status_id',statusId)}]});
    toast('Статус обновлён');drawPickups();updateCollectedStat();}
}

// увеличение фото поверх текущего окна (без новой вкладки), закрытие по клику/Esc
function zoomPhoto(url){
  const ov=document.createElement('div');ov.className='photo-zoom-ov';
  ov.innerHTML=`<button class="pz-x" aria-label="Закрыть">×</button><img src="${esc(url)}" alt="">`;
  const close=()=>{ov.remove();document.removeEventListener('keydown',onKey);};
  const onKey=e=>{if(e.key==='Escape'){e.preventDefault();close();}};
  ov.addEventListener('click',e=>{e.stopPropagation();close();});

}

// универсальный блок фото для записи rec в таблице table (по умолчанию pickups)
function bindPhotoBlock(root,rec,redraw,table){
  table=table||'pickups';
  const prefix=(table==='orders'?'order/':'')+rec.id;
  root.querySelectorAll('[data-pview-photo]').forEach(im=>im.onclick=e=>{e.stopPropagation();viewPhoto(im.dataset.pviewPhoto);});
  root.querySelectorAll('[data-paddphoto]').forEach(inp=>inp.onchange=async e=>{
    e.stopPropagation();const files=[...(inp.files||[])];if(!files.length)return;
    toast(`Загрузка фото (${files.length})…`);
    const arr=pickupPhotos(rec).slice();let ok=0,fail=0;
    for(const f of files){const r=await uploadPhoto(prefix,f);if(r){arr.push(r);ok++;}else{fail++;}}
    inp.value='';
    if(!ok){toast(fail?'Не удалось загрузить фото':'Файлы не выбраны');return;}
    const u=await dbUpdate(table,rec.id,{photos:arr});
    if(u){Object.assign(rec,u);toast(fail?`Загружено ${ok}, ошибок ${fail}`:`Добавлено фото: ${ok}`);if(redraw)redraw();}
  });
  root.querySelectorAll('[data-pdelphoto]').forEach(btn=>btn.onclick=async e=>{
    e.stopPropagation();const idx=+btn.dataset.idx;const arr=pickupPhotos(rec).slice();const item=arr[idx];if(!item)return;
    if(!confirm('Удалить это фото?'))return;
    await deletePhoto(item.path);arr.splice(idx,1);
    const u=await dbUpdate(table,rec.id,{photos:arr});
    if(u){Object.assign(rec,u);toast('Фото удалено');if(redraw)redraw();}
  });
}

function showPickupHistory(id){
  const p=S.pickups.find(x=>x.id===id);if(!p)return;
  const hist=(p.status_history||[]).slice().reverse();
  const body=hist.length?`<ul class="hist">${hist.map(h=>{const s=statusObj(h.statusId);const c=s?s.color:'var(--muted)';const n=s?esc(s.name):'Статус снят';
    return `<li><span class="dot" style="background:${c}"></span><div><div style="font-weight:600">${n}</div><div class="when">${fmtDateTime(h.at)}</div></div></li>`;}).join('')}</ul>`
    :`<div class="empty"><div class="big">История пуста</div></div>`;
  showInfo(`История статусов · ${esc(p.name)}`,body);
}
async function delPickup(id){
  const p=S.pickups.find(x=>x.id===id);
  if(!confirm(`Удалить карточку «${p?.name||''}»?`))return;
  if(await dbDelete('pickups',id)){await logAction('delete','pickups',{entity_id:id,entity_label:pickupLabel(p)});S.pickups=S.pickups.filter(x=>x.id!==id);toast('Удалено');renderPickups();}
}

    phone:phoneVal('m_phone'),district_id:val('m_district'),courier_id:val('m_courier'),
    give_packets:$('m_packets')?$('m_packets').checked:false,
    give_invoices:$('m_invoices')?$('m_invoices').checked:false,
    sales_id:val('m_sales'),processor_id:val('m_proc')};
}
function pickupModal(id,readonly){
  const p=id?S.pickups.find(x=>x.id===id):null;
  const today=new Date().toISOString().slice(0,10);
  const base=p||{pickup_date:today,city_id:'',name:'',address:'',phone:'',district_id:'',courier_id:'',orders:'',sales_id:'',processor_id:'',give_packets:false,give_invoices:false,status_id:(S.statuses[0]?S.statuses[0].id:'')};
  const ro=readonly||!can("pickups","edit");
  // если есть несохранённый черновик для этой заявки — подставляем его (только при редактировании)
  const draft=!ro?pickupDrafts[pickupDraftKey(id)]:null;
  const d=draft?Object.assign({},base,draft):base;
  const hasDraft=!!draft;
  const dOpts=cid=>S.districts.filter(x=>!cid||x.city_id===cid);
  const cOpts=cid=>S.couriers.filter(x=>!cid||x.city_id===cid);
  const dis=ro?'disabled':'';
  showModal(id?(ro?'Карточка забора':'Карточка забора'):'Новая карточка забора',`
    ${hasDraft?'<div style="background:#fdf3d6;border:1px solid #e3cf9c;color:#8a5a12;border-radius:10px;padding:9px 12px;margin-bottom:14px;font-size:13px">📝 Восстановлены несохранённые данные. Нажмите «Сохранить», чтобы записать их, или измените.</div>':''}
    <div class="grid2">
      <div class="field"><label>Дата</label><input type="date" id="m_date" value="${esc(d.pickup_date||'')}" ${dis}></div>
      <div class="field"><label>Город</label><select id="m_city" ${dis}><option value="">—</option>${S.cities.map(c=>`<option value="${c.id}" ${d.city_id===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
      <div class="field full"><label>Наименование (партнёр)</label><input id="m_name" list="plist" value="${esc(d.name)}" ${dis} autocomplete="off"><datalist id="plist">${S.partners.map(pt=>`<option value="${esc(pt.name)}">`).join('')}</datalist></div>
      <div class="field full"><label>Адрес</label><input id="m_address" value="${esc(d.address)}" ${dis}></div>
      <div class="field"><label>Номер телефона</label><input id="m_phone" inputmode="numeric" ${dis}></div>
      <div class="field"><label>Район</label><select id="m_district" ${dis}><option value="">—</option>${dOpts(d.city_id).map(x=>`<option value="${x.id}" ${d.district_id===x.id?'selected':''}>${esc(x.name)}</option>`).join('')}</select></div>
      <div class="field"><label>Курьер <span style="color:var(--rust)">*</span></label><select id="m_courier" ${dis}><option value="">— выберите курьера —</option>${cOpts(d.city_id).map(x=>`<option value="${x.id}" ${d.courier_id===x.id?'selected':''}>${esc(x.fio)}</option>`).join('')}</select></div>
      <div class="field"><label>Менеджер по продажам</label><select id="m_sales" ${dis}><option value="">—</option>${S.sales.map(s=>`<option value="${s.id}" ${d.sales_id===s.id?'selected':''}>${esc(s.fio)}</option>`).join('')}</select></div>
      <div class="field"><label>Обработчик</label><select id="m_proc" ${dis}><option value="">—</option>${S.processors.map(s=>`<option value="${s.id}" ${d.processor_id===s.id?'selected':''}>${esc(s.fio)}</option>`).join('')}</select></div>
      <div class="field full">
        <label style="margin-bottom:6px">Для партнёра</label>
        <label class="chk-line"><input type="checkbox" id="m_packets" ${d.give_packets?'checked':''} ${dis}> Пакеты для партнёра</label>
        <label class="chk-line"><input type="checkbox" id="m_invoices" ${d.give_invoices?'checked':''} ${dis}> Накладные для партнёра</label>
      </div>
    </div>`,
    ro?null:async()=>{
      const name=val('m_name').trim();if(!name){toast('Укажите наименование');return false;}
      if(!val('m_courier')){toast('Выберите курьера');const cf=$('m_courier');if(cf){cf.focus();cf.style.borderColor='var(--rust)';}return false;}
      const prevStatus=p?(p.status_id||''):'';
      // статус: у новой заявки — «Новый»; у существующей — сохраняем текущий
      const newStatus=p?(p.status_id||defaultPickupStatusId()):defaultPickupStatusId();
      const row={pickup_date:val('m_date')||null,city_id:val('m_city')||null,name,address:val('m_address').trim(),
        phone:phoneVal('m_phone'),district_id:val('m_district')||null,courier_id:val('m_courier')||null,
        orders:(p?(parseInt(p.orders||'0',10)||0):0),sales_id:val('m_sales')||null,processor_id:val('m_proc')||null,
        give_packets:$('m_packets')?$('m_packets').checked:false,
        give_invoices:$('m_invoices')?$('m_invoices').checked:false,
        status_id:newStatus||null};
      let hist=p&&Array.isArray(p.status_history)?p.status_history.slice():[];
      if(newStatus&&newStatus!==prevStatus){row.status_at=new Date().toISOString();hist.push({statusId:newStatus,at:row.status_at});}
      row.status_history=hist;
      if(id){const before=Object.assign({},p);const u=await dbUpdate('pickups',id,row);if(!u)return false;Object.assign(p,u);
        await logAction('update','pickups',{entity_id:p.id,entity_label:pickupLabel(p),changes:buildChanges(before,p)});}
      else{const u=await dbInsert('pickups',row);if(!u)return false;S.pickups.unshift(u);
        await logAction('create','pickups',{entity_id:u.id,entity_label:pickupLabel(u)});}
      delete pickupDrafts[pickupDraftKey(id)]; // сохранили — черновик больше не нужен
      toast(id?'Сохранено':'Карточка создана');renderPickups();return true;
    },{readonly:ro,clearBtn:ro?null:(ov)=>{
      // очистить все поля кроме даты
      ['m_name','m_address'].forEach(fid=>{const el=$(fid);if(el)el.value='';});
      ['m_city','m_district','m_courier','m_sales','m_proc'].forEach(fid=>{const el=$(fid);if(el)el.value='';});
      // телефон
      const ph=$('m_phone');if(ph){ph.value='';ph.dataset.phone='';}
      // сбросить подсветку обязательных полей
      const cf=$('m_courier');if(cf)cf.style.borderColor='';
      // очистить черновик
      delete pickupDrafts[pickupDraftKey(id)];
      const nameEl=$('m_name');if(nameEl)nameEl.focus();
      toast('Поля очищены');
    }});
  attachPhone('m_phone',d.phone);
  if(!ro){
    // автозапоминание: при любом изменении поля пишем черновик (не теряется при закрытии)
    const saveDraft=()=>{pickupDrafts[pickupDraftKey(id)]=readPickupForm();};
    ['m_date','m_city','m_name','m_address','m_phone','m_district','m_courier','m_sales','m_proc'].forEach(fid=>{
      const el=$(fid);if(el){el.addEventListener('input',saveDraft);el.addEventListener('change',saveDraft);}
    });
    const cs=$('m_city');cs.onchange=()=>{const cid=cs.value;
      $('m_district').innerHTML='<option value="">—</option>'+dOpts(cid).map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('');
      $('m_courier').innerHTML='<option value="">— выберите курьера —</option>'+cOpts(cid).map(x=>`<option value="${x.id}">${esc(x.fio)}</option>`).join('');saveDraft();};
    $('m_name').onchange=e=>{const pt=S.partners.find(x=>x.name===e.target.value);if(pt){
      if(pt.address)$('m_address').value=pt.address;
      if(pt.phone){const el=$('m_phone');el.dataset.phone=phoneStored(pt.phone);el.value=fmt10(phoneStored(pt.phone));}
      if(pt.city_id){cs.value=pt.city_id;cs.onchange();}
      if(pt.district_id)$('m_district').value=pt.district_id;
      if(pt.sales_id)$('m_sales').value=pt.sales_id;
      if(pt.processor_id)$('m_proc').value=pt.processor_id;}saveDraft();};
  }
}

let of={q:'',status:'',delivery:'',partner:'',sales:'',processor:'',missing:'',pickFrom:'',pickTo:'',delFrom:'',delTo:'',createFrom:'',createTo:'',pickupCity:'',destCity:'',paidBySender:''};

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jyldam Logistics — CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#14110d;--paper:#f6f2e9;--card:#fffdf7;--line:#d9d0bd;
    --rust:#b6502b;--rust-dk:#8f3d20;--moss:#4a5d3a;--gold:#c08a2d;--muted:#7c7361;
    --shadow:0 1px 0 rgba(20,17,13,.04),0 8px 24px -16px rgba(20,17,13,.35);
  }
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans:wght@400;500;600;700&display=swap');
  body{font-family:'Spline Sans',system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(circle at 12% 0%,rgba(182,80,43,.06),transparent 40%),var(--paper);
    min-height:100vh;-webkit-font-smoothing:antialiased}

  /* ВХОД */
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:20px}
  .login-card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;box-shadow:var(--shadow);padding:34px 30px}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .brand .mark{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--rust),var(--gold));
    display:grid;place-items:center;color:#fff;font-size:20px}
  .brand .name{font-family:'Fraunces',serif;font-weight:900;font-size:22px;letter-spacing:-.02em;line-height:1}
  .brand .sub{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
  .login-card h1{font-family:'Fraunces',serif;font-weight:600;font-size:20px;margin:22px 0 4px}
  .login-card p.hint{color:var(--muted);font-size:13px;margin-bottom:20px}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field.full{grid-column:1/-1}
  .field label{font-size:12px;font-weight:600;color:var(--muted)}
  .field input,.field select,.field textarea{font:inherit;font-size:14px;padding:10px 12px;
    border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid rgba(182,80,43,.3);
    border-color:var(--rust);background:var(--card)}
  .field .hint{font-size:11px;color:var(--muted)}
  .login-card .field input{font-size:15px;padding:11px 13px}

  .btn{font:inherit;font-weight:600;font-size:14px;cursor:pointer;border-radius:10px;padding:10px 16px;
    border:1px solid var(--line);background:var(--card);color:var(--ink);transition:.15s;display:inline-flex;
    align-items:center;gap:8px}
  .btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
  .btn.primary{background:var(--rust);border-color:var(--rust-dk);color:#fff}
  .btn.primary:hover{background:var(--rust-dk)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
  .btn.danger{color:var(--rust-dk);border-color:#e3c4b8}
  .btn.danger:hover{background:var(--rust);color:#fff;border-color:var(--rust)}
  .btn.block{width:100%;justify-content:center;font-size:15px;padding:12px}
  .btn:disabled{opacity:.6;cursor:default;transform:none}
  .err{color:var(--rust-dk);font-size:13px;margin-top:6px;min-height:18px}

  /* APP */
  .app-shell{display:none}
  header.topbar{border-bottom:1px solid var(--line);background:rgba(246,242,233,.85);
    backdrop-filter:blur(8px);position:sticky;top:0;z-index:50}
  .topbar-inner{max-width:1180px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .logo{font-family:'Fraunces',serif;font-weight:900;font-size:20px;display:flex;align-items:center;gap:10px}
  .logo .mark{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--rust),var(--gold));
    display:grid;place-items:center;color:#fff;font-size:16px}
  .logo small{display:block;font-family:'Spline Sans',sans-serif;font-weight:500;font-size:11px;
    color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:-2px}
  nav.tabs{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
  nav.tabs button{font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid transparent;
    background:transparent;color:var(--muted);padding:8px 14px;border-radius:9px;transition:.15s}
  nav.tabs button:hover{color:var(--ink);background:rgba(20,17,13,.04)}
  nav.tabs button.active{color:var(--rust-dk);background:var(--card);border-color:var(--line);box-shadow:var(--shadow)}
  .user-box{display:flex;align-items:center;gap:12px;padding-left:14px;border-left:1px solid var(--line)}
  .user-box .who{text-align:right;font-size:13px;line-height:1.2}
  .user-box .who b{display:block}
  .user-box .role{font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.05em}

  main.wrap{max-width:1180px;margin:0 auto;padding:24px 22px}
  .page-head{padding:8px 0 18px;display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap}
  .page-head h1{font-family:'Fraunces',serif;font-weight:900;font-size:30px;letter-spacing:-.03em;line-height:1}
  .page-head p{color:var(--muted);font-size:14px;margin-top:7px}
  .head-actions{margin-left:auto;display:flex;gap:10px}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
    overflow:hidden;margin-bottom:24px}
  .panel-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .panel-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:18px}
  .panel-head .count{font-size:12px;color:var(--muted);background:var(--paper);border:1px solid var(--line);
    padding:2px 9px;border-radius:20px;font-weight:600}

  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{text-align:left;font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--muted);padding:11px 16px;border-bottom:1px solid var(--line);white-space:nowrap;
    background:linear-gradient(var(--paper),var(--card))}
  tbody td{padding:12px 16px;border-bottom:1px solid #eee6d6;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:rgba(192,138,45,.05)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 9px;
    border-radius:20px;background:var(--paper);border:1px solid var(--line)}
  .pill.moss{color:var(--moss);background:#eef1e8;border-color:#cfd9bf}
  .pill.gold{color:var(--gold);background:#f6eed8;border-color:#e6d4a0}
  .qty{font-family:'Fraunces',serif;font-weight:900;font-size:16px;color:var(--rust-dk)}
  .qty-edit{width:64px;font:inherit;font-family:'Fraunces',serif;font-weight:900;font-size:15px;color:var(--rust-dk);
    text-align:center;padding:5px 6px;border:1.5px solid var(--line);border-radius:8px;background:var(--card)}
  .qty-edit:focus{outline:2px solid rgba(182,80,43,.3);border-color:var(--rust)}
  .row-actions{display:flex;gap:6px;justify-content:flex-end;white-space:nowrap}
  .status-pick{font:inherit;font-size:12.5px;font-weight:600;padding:5px 8px;border:1.5px solid var(--line);
    border-radius:8px;background:var(--card);color:var(--ink);cursor:pointer}
  .status-time{font-size:10.5px;color:var(--muted);margin-top:3px;white-space:nowrap}
  .empty{padding:50px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-family:'Fraunces',serif;font-size:20px;color:var(--ink);margin-bottom:6px}
  .link-btn{background:none;border:none;color:var(--rust-dk);font:inherit;font-size:11px;font-weight:600;
    cursor:pointer;padding:2px 0;text-decoration:underline}

  .filters{display:flex;gap:10px;padding:14px 20px;flex-wrap:wrap;border-bottom:1px solid var(--line);background:var(--paper)}
  .filters input,.filters select{font:inherit;font-size:13px;padding:8px 11px;border:1px solid var(--line);
    border-radius:9px;background:var(--card);color:var(--ink);min-width:140px}
  .filters .search{flex:1;min-width:200px}

  .subtabs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
  .subtabs button{font:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:9px 15px;border-radius:30px;
    border:1px solid var(--line);background:var(--card);color:var(--muted);transition:.15s}
  .subtabs button.active{background:var(--moss);color:#fff;border-color:var(--moss)}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600}
  .stat .v{font-family:'Fraunces',serif;font-weight:900;font-size:30px;letter-spacing:-.02em;margin-top:4px;line-height:1}
  .stat .v small{font-size:13px;font-family:'Spline Sans',sans-serif;color:var(--muted);font-weight:500}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(20,17,13,.45);backdrop-filter:blur(2px);display:grid;
    place-items:center;z-index:100;padding:20px}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:18px;width:100%;max-width:560px;
    box-shadow:0 30px 80px -30px rgba(20,17,13,.6);max-height:90vh;overflow:auto}
  .modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center}
  .modal-head h3{font-family:'Fraunces',serif;font-weight:600;font-size:20px}
  .modal-head .x{margin-left:auto;cursor:pointer;border:none;background:transparent;font-size:22px;
    color:var(--muted);line-height:1;padding:4px}
  .modal-body{padding:22px 24px}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--paper)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  .phone-wrap{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:10px;background:var(--paper);overflow:hidden}
  .phone-wrap:focus-within{outline:2px solid rgba(182,80,43,.3);border-color:var(--rust);background:var(--card)}
  .phone-pre{display:flex;align-items:center;padding:0 10px;font-size:14px;font-weight:600;color:var(--muted);
    background:rgba(20,17,13,.04);border-right:1px solid var(--line);user-select:none}
  .phone-wrap input{border:none!important;outline:none!important;background:transparent!important;border-radius:0!important;flex:1}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);
    padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 20px 50px -20px rgba(0,0,0,.6);z-index:200}
  .loading{padding:60px;text-align:center;color:var(--muted);font-size:15px}
  .hist{list-style:none}
  .hist li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #eee6d6;font-size:13px}
  .hist li:last-child{border-bottom:none}
  .hist .dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex:none}
  .hist .when{color:var(--muted);font-size:12px}

  @media (max-width:760px){
    .grid2{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}
    .page-head h1{font-size:24px}nav.tabs{order:3;width:100%;margin-left:0}
    .user-box{margin-left:auto;border-left:none;padding-left:0}
    /* Адаптивная таблица заявок: строки -> карточки */
    .resp-table{border:0}
    .resp-table thead{display:none}
    .resp-table,.resp-table tbody,.resp-table tr,.resp-table td{display:block;width:100%}
    .table-scroll{overflow-x:visible}
    .resp-table tr{
      background:var(--card);border:1px solid var(--line);border-radius:14px;
      box-shadow:var(--shadow);margin-bottom:14px;padding:6px 4px;overflow:hidden;
    }
    .resp-table td{
      display:flex;justify-content:space-between;align-items:center;gap:12px;
      padding:9px 14px;border-bottom:1px solid #eee6d6;text-align:right;
    }
    .resp-table tr td:last-child{border-bottom:0}
    .resp-table td::before{
      content:attr(data-label);font-size:11px;font-weight:700;text-transform:uppercase;
      letter-spacing:.04em;color:var(--muted);text-align:left;flex:0 0 42%;
    }
    .resp-table td[data-label=""]::before{display:none}
    .resp-table td.cell-actions{justify-content:flex-end}
    .resp-table td.cell-actions .row-actions{width:100%;justify-content:stretch;gap:8px}
    .resp-table td.cell-actions .btn{flex:1;justify-content:center}
    .resp-table .status-pick{max-width:60%}
    .resp-table .qty-edit{width:80px}
    .resp-table .status-time{text-align:right;width:100%}
  }
</style>
</head>
<body>

<!-- ВХОД -->
<div class="login-wrap" id="loginScreen">
  <div class="login-card">
    <div class="brand"><span class="mark">⌖</span>
      <div><div class="name">Jyldam Logistics</div><div class="sub">CRM · вход в систему</div></div></div>
    <h1>Вход</h1>
    <p class="hint">Введите номер телефона (или email админа) и пароль.</p>
    <div class="field"><label>Телефон или email</label><input type="text" id="email" autocomplete="username" placeholder="+7 (___) ___-__-__ или email"></div>
    <div class="field"><label>Пароль</label><input type="password" id="password" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="btn primary block" id="loginBtn">Войти</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div class="app-shell" id="appShell">
  <header class="topbar"><div class="topbar-inner">
    <div class="logo"><span class="mark">⌖</span><span>Jyldam Logistics<small>забор посылок · CRM</small></span></div>
    <nav class="tabs" id="navTabs"></nav>
    <div class="user-box">
      <div class="who"><b id="uName">—</b><span class="role" id="uRole">—</span></div>
      <button class="btn ghost sm" id="logoutBtn">Выйти</button>
    </div>
  </div></header>
  <main class="wrap" id="main"></main>
</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL='https://tdexhspesodslwgbxojw.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkZXhoc3Blc29kc2x3Z2J4b2p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTcxOTMsImV4cCI6MjA5Nzc5MzE5M30.QojVMQAWzINufmqdI5nEL-gX_UsIZV8Nq48-3Fn6YoE';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

const $=id=>document.getElementById(id);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uidLocal=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}

const ROLE_LABEL={admin:'Администратор',manager:'Менеджер',courier:'Курьер'};

/* состояние сессии и данных */
const S={
  me:null,           // профиль текущего пользователя {id,email,full_name,role,courier_kind}
  tab:'pickups',
  dir:'partners',
  // справочники-кэш
  cities:[],districts:[],couriers:[],order_couriers:[],sales:[],processors:[],
  partners:[],statuses:[],delivery:[],courier_cities:[],post_ips:[],profiles:[],roles:[],
  pickups:[],orders:[],
  myPerms:null, myBaseType:'staff',
};

/* ---------- DATA LAYER ---------- */
async function dbList(table,opts={}){
  let q=sb.from(table).select('*');
  if(opts.order) q=q.order(opts.order,{ascending:opts.asc!==false});
  const {data,error}=await q;
  if(error){console.error(table,error);return [];}
  return data||[];
}
async function dbInsert(table,row){
  const {data,error}=await sb.from(table).insert(row).select().single();
  if(error){console.error('insert',table,error);toast('Ошибка: '+error.message);return null;}
  return data;
}
async function dbUpdate(table,id,row){
  const {data,error}=await sb.from(table).update(row).eq('id',id).select().single();
  if(error){console.error('update',table,error);toast('Ошибка: '+error.message);return null;}
  return data;
}
async function dbDelete(table,id){
  const {error}=await sb.from(table).delete().eq('id',id);
  if(error){console.error('delete',table,error);toast('Ошибка: '+error.message);return false;}
  return true;
}
// Вызов Edge Function для создания пользователя (с проверкой админа на сервере)
async function callCreateUser(payload){
  const {data:sess}=await sb.auth.getSession();
  const token=sess&&sess.session?sess.session.access_token:'';
  try{
    const res=await fetch(`${SUPABASE_URL}/functions/v1/create-user`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,'apikey':SUPABASE_ANON},
      body:JSON.stringify(payload),
    });
    const out=await res.json().catch(()=>({}));
    if(!res.ok){return {error:out.error||('Ошибка '+res.status)};}
    return out;
  }catch(e){return {error:String(e&&e.message||e)};}
}

/* ---------- AUTH ---------- */
// дефолтные права на случай отсутствия роли — выводим из base_type
function defaultPerms(base){
  const full={view:true,create:true,edit:true,delete:true};
  const ro={view:true,create:false,edit:false,delete:false};
  const no={view:false,create:false,edit:false,delete:false};
  if(base==='admin') return {pickups:full,orders:full,directories:full,users:full};
  if(base==='courier') return {pickups:{view:true,create:false,edit:true,delete:false},orders:{view:true,create:false,edit:true,delete:false},directories:no,users:no};
  return {pickups:full,orders:full,directories:ro,users:no}; // staff/manager
}
function computeMyPerms(){
  // 1) пробуем по role_id из справочника
  let roleRow=null;
  if(S.me.role_id) roleRow=S.roles.find(r=>r.id===S.me.role_id);
  if(roleRow){
    S.myBaseType=roleRow.base_type||'staff';
    const base=defaultPerms(S.myBaseType);
    S.myPerms=Object.assign({},base,roleRow.perms||{});
    // гарантируем все модули
    ['pickups','orders','directories','users'].forEach(m=>{if(!S.myPerms[m])S.myPerms[m]=base[m];});
    return;
  }
  // 2) fallback на старое текстовое поле role
  const base=(S.me.role==='admin')?'admin':(S.me.role==='courier')?'courier':'staff';
  S.myBaseType=base;
  S.myPerms=defaultPerms(base);
}

async function loadMe(session){
  const {data}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
  S.me=data||{id:session.user.id,email:session.user.email,role:'manager',full_name:session.user.email};
  // справочник ролей нужен для вычисления прав
  S.roles=await dbList('roles',{order:'created_at',asc:true});
  computeMyPerms();
}

async function doLogin(){
  let login=$('email').value.trim();const password=$('password').value,errEl=$('loginErr');
  errEl.textContent='';
  if(!login||!password){errEl.textContent='Введите логин и пароль.';return;}
  // если введён телефон (не email) — превращаем в технический email
  let email=login;
  if(!login.includes('@')){
    const digits=login.replace(/\D/g,'').replace(/^[78](?=\d{10}$)/,'').slice(-10);
    if(digits.length===10) email=digits+'@jyldam.local';
  }
  const btn=$('loginBtn');btn.disabled=true;btn.textContent='Входим…';
  const {data,error}=await sb.auth.signInWithPassword({email,password});
  btn.disabled=false;btn.textContent='Войти';
  if(error){
    if(/invalid login/i.test(error.message))errEl.textContent='Неверный логин или пароль.';
    else if(/not confirmed/i.test(error.message))errEl.textContent='Аккаунт не подтверждён в Supabase.';
    else if(/disabled/i.test(error.message))errEl.textContent='Вход по email отключён в Supabase.';
    else errEl.textContent='Ошибка: '+error.message;
    return;
  }
  await loadMe(data.session);
  await enterApp();
}
async function doLogout(){await sb.auth.signOut();S.me=null;$('email').value='';$('password').value='';showLogin();}
function showLogin(){$('appShell').style.display='none';$('loginScreen').style.display='grid';}

$('loginBtn').onclick=doLogin;
$('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
$('email').addEventListener('keydown',e=>{if(e.key==='Enter')$('password').focus();});
$('logoutBtn').onclick=doLogout;

/* ---------- ENTER APP: load all reference data ---------- */
async function loadAll(){

    dbList('cities',{order:'name'}),dbList('districts',{order:'name'}),dbList('couriers',{order:'fio'}),

    dbList('partners',{order:'name'}),dbList('statuses',{order:'created_at',asc:true}),dbList('delivery_types',{order:'created_at',asc:true}),
    dbList('courier_cities',{order:'name'}),dbList('post_ips',{order:'name'}),
    dbList('pickups',{order:'created_at',asc:false}),dbList('orders',{order:'created_at',asc:false}),

// can(module, action): module ∈ pickups|orders|directories|users; action ∈ view|create|edit|delete
function can(mod,act){
  if(!S.myPerms)return false;
  const m=S.myPerms[mod];
  return !!(m&&m[act]);
}

/* ---------- PHONE ---------- */
function phoneStored(v){let d=(v||'').replace(/\D/g,'');if(d.length===11&&(d[0]==='7'||d[0]==='8'))d=d.slice(1);return d.slice(0,10);}
function fmt10(d){d=(d||'').slice(0,10);let o='';if(d.length>0)o+='('+d.slice(0,3);if(d.length>=3)o+=')';
  if(d.length>3)o+=' '+d.slice(3,6);if(d.length>6)o+='-'+d.slice(6,8);if(d.length>8)o+='-'+d.slice(8,10);return o;}
function phoneDisplay(v){const d=phoneStored(v);return d?'+7 '+fmt10(d):'';}
function attachPhone(id,initial){
  const el=$(id);if(!el)return;
  if(!el.parentElement.classList.contains('phone-wrap')){
    const w=document.createElement('div');w.className='phone-wrap';el.parentElement.insertBefore(w,el);
    const pre=document.createElement('span');pre.className='phone-pre';pre.textContent='+7';w.appendChild(pre);w.appendChild(el);
  }
  el.dataset.phone=phoneStored(initial);el.value=el.dataset.phone?fmt10(el.dataset.phone):'';el.setAttribute('placeholder','(___) ___-__-__');
  el.addEventListener('input',()=>{const d=el.value.replace(/\D/g,'').slice(0,10);el.dataset.phone=d;el.value=fmt10(d);
    const end=el.value.length;requestAnimationFrame(()=>{try{el.setSelectionRange(end,end);}catch(e){}});});
}
function phoneVal(id){const el=$(id);return el?(el.dataset.phone||''):'';}
function val(id){const el=$(id);return el?el.value:'';}

/* ---------- NAV по правам ---------- */
function buildNav(){
  let tabs=[];
  const courier=isCourierBase();
  if(can('pickups','view')) tabs.push(['pickups',courier?'Мои заборы':'Заявки на забор']);
  if(can('orders','view'))  tabs.push(['orders',courier?'Мои заказы':'Заказы']);
  if(can('directories','view')) tabs.push(['settings','Справочники']);
  if(can('users','view'))   tabs.push(['users','Пользователи']);
  if(!tabs.length) tabs=[['none','—']];
  if(!tabs.find(t=>t[0]===S.tab)) S.tab=tabs[0][0];
  $('navTabs').innerHTML=tabs.map(([k,l])=>`<button data-tab="${k}" class="${S.tab===k?'active':''}">${l}</button>`).join('');
  $('navTabs').querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;buildNav();render();});
}

/* ---------- MODAL ENGINE ---------- */
function showModal(title,bodyHtml,onSave,opts={}){
  const ov=document.createElement('div');ov.className='overlay';
  const foot=opts.readonly
    ? `<div class="modal-foot"><button class="btn primary" data-close>Закрыть</button></div>`
    : `<div class="modal-foot"><button class="btn ghost" data-cancel>Отмена</button><button class="btn primary" data-save>Сохранить</button></div>`;
  ov.innerHTML=`<div class="modal"><div class="modal-head"><h3>${esc(title)}</h3><button class="x">×</button></div>
    <div class="modal-body">${bodyHtml}</div>${foot}</div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector('.x').onclick=close;
  if(ov.querySelector('[data-cancel]'))ov.querySelector('[data-cancel]').onclick=close;
  if(ov.querySelector('[data-close]'))ov.querySelector('[data-close]').onclick=close;
  ov.onclick=e=>{if(e.target===ov)close();};
  const sv=ov.querySelector('[data-save]');
  if(sv)sv.onclick=async()=>{sv.disabled=true;const ok=await onSave();sv.disabled=false;if(ok!==false)close();};
  document.addEventListener('keydown',function esc2(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',esc2);}});
  const first=ov.querySelector('input,select,textarea');if(first)setTimeout(()=>first.focus(),50);
  return ov;
}
function showInfo(title,bodyHtml){showModal(title,bodyHtml,null,{readonly:true});}

}

        <select id="pfcity"><option value="">Все города</option>${S.cities.map(c=>`<option value="${c.id}" ${pf.city===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select>
        ${isStaff()?`<select id="pfcourier"><option value="">Все курьеры</option>${S.couriers.map(c=>`<option value="${c.id}" ${pf.courier===c.id?'selected':''}>${esc(c.fio)}</option>`).join('')}</select>`:''}
        <select id="pfstatus"><option value="">Все статусы</option>${S.statuses.map(s=>`<option value="${s.id}" ${pf.status===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select>

  if($('pfcourier'))$('pfcourier').onchange=e=>{pf.courier=e.target.value;drawPickups();};
  $('pfstatus').onchange=e=>{pf.status=e.target.value;drawPickups();};
  drawPickups();
}
function filteredPickups(){
  const q=pf.q.toLowerCase().trim();
  return visiblePickups().filter(p=>{
    if(pf.city&&p.city_id!==pf.city)return false;
    if(pf.courier&&p.courier_id!==pf.courier)return false;
    if(pf.status&&p.status_id!==pf.status)return false;
    if(q){const hay=[p.name,phoneDisplay(p.phone),cityName(p.city_id),districtName(p.district_id),courierName(p.courier_id),p.address].join(' ').toLowerCase();if(!hay.includes(q))return false;}
    return true;
  }).sort((a,b)=>(b.pickup_date||'').localeCompare(a.pickup_date||''));
}

  const el=$('pickupTable');const rows=filteredPickups();
  if(!rows.length){el.innerHTML=`<div class="empty"><div class="big">Пока нет карточек</div>${isStaff()?'Нажмите «Создать карточку забора».':'Вам пока не назначены заборы.'}</div>`;return;}

    <th>Дата</th><th>Город</th><th>Наименование</th><th>Адрес</th><th>Номер</th><th>Район</th>
    ${staff?'<th>Курьер</th><th>Менеджер продаж</th><th>Обработчик</th>':''}<th>Заказов</th><th>Статус</th><th></th></tr></thead>

      <td data-label="Адрес">${esc(p.address)||'—'}</td>
      <td data-label="Номер">${esc(phoneDisplay(p.phone))||'—'}</td>
      <td data-label="Район">${esc(districtName(p.district_id))}</td>
      ${staff?`<td data-label="Курьер">${p.courier_id?`<span class="pill moss">${esc(courierName(p.courier_id))}</span>`:'<span style="color:var(--muted)">не назначен</span>'}</td>
      <td data-label="Менеджер продаж">${p.sales_id?esc(salesName(p.sales_id)):'—'}</td>
      <td data-label="Обработчик">${p.processor_id?esc(processorName(p.processor_id)):'—'}</td>`:''}
      <td data-label="Заказов">${(can('pickups','edit')||isCourierBase())?`<input type="number" min="0" class="qty-edit" data-pqty="${p.id}" value="${esc(p.orders||0)}">`:`<span class="qty">${esc(p.orders||0)}</span>`}</td>
      <td data-label="Статус"><select class="status-pick" data-pstatus="${p.id}" style="border-color:${(statusObj(p.status_id)||{}).color||'var(--line)'}">
        <option value="">— нет —</option>${S.statuses.map(s=>`<option value="${s.id}" ${p.status_id===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select>
        <div class="status-time">${p.status_at?('изм.: '+fmtDateTime(p.status_at)):''} ${(p.status_history&&p.status_history.length)?`· <button class="link-btn" data-phist="${p.id}">история</button>`:''}</div></td>
      <td data-label="" class="cell-actions"><div class="row-actions">
        ${can('pickups','edit')?`<button class="btn sm ghost" data-pedit="${p.id}">Изменить</button>`:`<button class="btn sm ghost" data-pview="${p.id}">Открыть</button>`}
        ${can('pickups','delete')?`<button class="btn sm danger" data-pdel="${p.id}">Удалить</button>`:''}
      </div></td></tr>`).join('')}</tbody></table></div>`;
  el.querySelectorAll('[data-pedit]').forEach(b=>b.onclick=()=>pickupModal(b.dataset.pedit));
  el.querySelectorAll('[data-pview]').forEach(b=>b.onclick=()=>pickupModal(b.dataset.pview,true));
  el.querySelectorAll('[data-pdel]').forEach(b=>b.onclick=()=>delPickup(b.dataset.pdel));
  el.querySelectorAll('[data-phist]').forEach(b=>b.onclick=()=>showPickupHistory(b.dataset.phist));
  el.querySelectorAll('[data-pstatus]').forEach(sel=>sel.onchange=()=>setPickupStatus(sel.dataset.pstatus,sel.value));
  el.querySelectorAll('[data-pqty]').forEach(inp=>{
    const commit=async()=>{const p=S.pickups.find(x=>x.id===inp.dataset.pqty);if(!p)return;
      const v=Math.max(0,parseInt(inp.value||'0',10)||0);if(p.orders===v)return;
      await dbUpdate('pickups',p.id,{orders:v});p.orders=v;toast('Кол-во обновлено');};
    inp.onblur=commit;inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();};
  });
}
async function setPickupStatus(id,statusId){
  const p=S.pickups.find(x=>x.id===id);if(!p||p.status_id===statusId)return;
  const at=new Date().toISOString();
  const hist=Array.isArray(p.status_history)?p.status_history.slice():[];
  hist.push({statusId,at});
  const upd=await dbUpdate('pickups',id,{status_id:statusId,status_at:at,status_history:hist});
  if(upd){Object.assign(p,upd);toast('Статус обновлён');drawPickups();}
}
function showPickupHistory(id){
  const p=S.pickups.find(x=>x.id===id);if(!p)return;
  const hist=(p.status_history||[]).slice().reverse();
  const body=hist.length?`<ul class="hist">${hist.map(h=>{const s=statusObj(h.statusId);const c=s?s.color:'var(--muted)';const n=s?esc(s.name):'Статус снят';
    return `<li><span class="dot" style="background:${c}"></span><div><div style="font-weight:600">${n}</div><div class="when">${fmtDateTime(h.at)}</div></div></li>`;}).join('')}</ul>`
    :`<div class="empty"><div class="big">История пуста</div></div>`;
  showInfo(`История статусов · ${esc(p.name)}`,body);
}
async function delPickup(id){
  const p=S.pickups.find(x=>x.id===id);
  if(!confirm(`Удалить карточку «${p?.name||''}»?`))return;
  if(await dbDelete('pickups',id)){S.pickups=S.pickups.filter(x=>x.id!==id);toast('Удалено');renderPickups();}
}

function filteredOrders(){
  const q=of.q.toLowerCase().trim();

      <div class="field"><label>Должность</label><input id="n_pos" placeholder="Напр. Оператор"></div>
      <div class="field"><label>Телефон (логин)</label><input id="n_phone" inputmode="numeric"></div>
      <div class="field"><label>Пароль</label><input id="n_pass" type="text" autocomplete="off" placeholder="мин. 6 символов"></div>
      <div class="field"><label>Город</label><select id="n_city"><option value="">—</option>${S.cities.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select></div>
      <div class="field"><label>Роль</label><select id="n_role"><option value="">— не назначена —</option>${S.roles.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('')}</select></div>
      <div class="field full"><span class="hint">Сотрудник входит по номеру телефона и паролю. Пароль задаёте вы и передаёте ему.</span></div>
    </div>`,
    async()=>{
      const phone=phoneVal('n_phone'),pass=val('n_pass'),name=val('n_name').trim();
      if(phone.length!==10){toast('Телефон: ровно 10 цифр');return false;}
      if(!pass||pass.length<6){toast('Пароль минимум 6 символов');return false;}
      const roleId=val('n_role');
      const baseType=(S.roles.find(r=>r.id===roleId)||{}).base_type||'';
      const legacy=baseType==='admin'?'admin':baseType==='courier'?'courier':'manager';
      toast('Создаём сотрудника…');
      const out=await callCreateUser({phone,password:pass,full_name:name,
        city_id:val('n_city')||null,position:val('n_pos').trim(),role_id:roleId||null,role:legacy});
      if(out.error){toast('Ошибка: '+out.error);return false;}
      S.profiles=await dbList('profiles',{order:'created_at',asc:true});
      toast('Сотрудник создан');renderUsers();return true;
    });
  attachPhone('n_phone','');
}
async function delStaff(id){
  const u=S.profiles.find(x=>x.id===id);
  if(!confirm(`Удалить карточку сотрудника «${u?.full_name||u?.email||''}»?\n\nВнимание: это удалит профиль, но сам аккаунт входа в Supabase останется. Полное удаление аккаунта делается в Supabase → Authentication.`))return;
  if(await dbDelete('profiles',id)){S.profiles=S.profiles.filter(x=>x.id!==id);toast('Профиль удалён');renderUsers();}
}
function staffModal(id){
  const u=S.profiles.find(x=>x.id===id);if(!u)return;
  showModal('Карточка сотрудника',`
    <div class="grid2">
      <div class="field full"><label>Email (логин)</label><input value="${esc(u.email||'')}" readonly></div>
      <div class="field"><label>ФИО</label><input id="u_name" value="${esc(u.full_name||'')}"></div>
      <div class="field"><label>Телефон</label><input id="u_phone" inputmode="numeric"></div>
      <div class="field"><label>Город</label><select id="u_city"><option value="">—</option>${S.cities.map(c=>`<option value="${c.id}" ${u.city_id===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
      <div class="field"><label>Должность</label><input id="u_pos" value="${esc(u.position||'')}"></div>
      <div class="field full"><label>Роль</label><select id="u_role">
        <option value="">— не назначена —</option>
        ${S.roles.map(r=>`<option value="${r.id}" ${u.role_id===r.id?'selected':''}>${esc(r.name)}</option>`).join('')}</select>
        <span class="hint">Для курьеров: назначьте роль с базовым типом «Курьер», затем привяжите этот аккаунт в справочнике курьеров.</span></div>
    </div>`,
    async()=>{
      const roleId=val('u_role');
      const baseType=(S.roles.find(r=>r.id===roleId)||{}).base_type||'';
      // синхронизируем старое текстовое поле role для серверного RLS (current_role_name)
      const legacy=baseType==='admin'?'admin':baseType==='courier'?'courier':'manager';
      const row={full_name:val('u_name').trim(),phone:phoneVal('u_phone'),city_id:val('u_city')||null,
        position:val('u_pos').trim(),role_id:roleId||null,role:legacy};
      const u2=await dbUpdate('profiles',id,row);if(!u2)return false;Object.assign(u,u2);
      if(id===S.me.id){await loadMe({user:{id:S.me.id,email:S.me.email}});buildNav();}
      toast('Сохранено');renderUsers();return true;});
  attachPhone('u_phone',u.phone);
}

/* ---- РОЛИ И ПРАВА ---- */
function renderRoles(){
  const rows=[...S.roles].sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const baseLabel={admin:'Админ',staff:'Персонал',courier:'Курьер'};
  $('usersContent').innerHTML=`<div class="panel">
    <div class="panel-head"><h2>Роли</h2><span class="count">${rows.length}</span>
      ${can('users','create')?`<button class="btn primary sm" id="addRole" style="margin-left:auto">＋ Добавить роль</button>`:''}</div>
    <div class="table-scroll"><table><thead><tr><th>Роль</th><th>Базовый тип</th><th>Заявки</th><th>Заказы</th><th>Справочники</th><th>Пользователи</th><th></th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td><strong>${esc(r.name)}</strong></td>
      <td><span class="pill ${r.base_type==='admin'?'gold':r.base_type==='courier'?'':'moss'}">${baseLabel[r.base_type]||r.base_type}</span></td>
      ${MODULES.map(([m])=>`<td>${permSummary(r.perms&&r.perms[m])}</td>`).join('')}
      <td><div class="row-actions">
        ${can('users','edit')?`<button class="btn sm ghost" data-redit="${r.id}">Изменить</button>`:''}
        ${can('users','delete')?`<button class="btn sm danger" data-rdel="${r.id}">Удалить</button>`:''}
      </div></td></tr>`).join('')}</tbody></table></div></div>`;
  if($('addRole'))$('addRole').onclick=()=>roleModal();
  $('usersContent').querySelectorAll('[data-redit]').forEach(b=>b.onclick=()=>roleModal(b.dataset.redit));
  $('usersContent').querySelectorAll('[data-rdel]').forEach(b=>b.onclick=()=>delRole(b.dataset.rdel));
}
function permSummary(p){
  if(!p||!p.view)return '<span style="color:var(--muted)">нет</span>';
  const parts=[];if(p.create)parts.push('С');if(p.edit)parts.push('Р');if(p.delete)parts.push('У');
  return parts.length?`<span class="pill moss">просмотр +${parts.join('')}</span>`:'<span class="pill">просмотр</span>';
}
async function delRole(id){
  const r=S.roles.find(x=>x.id===id);
  const used=S.profiles.filter(p=>p.role_id===id).length;
  if(used){toast(`Роль используется у ${used} польз. Сначала смените им роль.`);return;}
  if(!confirm(`Удалить роль «${r?.name||''}»?`))return;
  if(await dbDelete('roles',id)){S.roles=S.roles.filter(x=>x.id!==id);toast('Роль удалена');renderUsers();}
}
function roleModal(id){
  const r=id?S.roles.find(x=>x.id===id):{name:'',base_type:'staff',perms:{}};
  const p=r.perms||{};
  const matrix=MODULES.map(([m,mlabel])=>{
    const mp=p[m]||{};
    return `<tr><td style="font-weight:600">${mlabel}</td>${ACTIONS.map(([a])=>`<td style="text-align:center"><input type="checkbox" data-perm="${m}.${a}" ${mp[a]?'checked':''}></td>`).join('')}</tr>`;
  }).join('');
  showModal(id?'Роль':'Новая роль',`
    <div class="field"><label>Название роли</label><input id="r_name" value="${esc(r.name)}" placeholder="Напр. Оператор склада"></div>
    <div class="field"><label>Базовый тип (для безопасности)</label>
      <select id="r_base">
        <option value="admin" ${r.base_type==='admin'?'selected':''}>Админ — полный доступ + управление</option>
        <option value="staff" ${r.base_type==='staff'?'selected':''}>Персонал — видит все данные в разрешённых модулях</option>
        <option value="courier" ${r.base_type==='courier'?'selected':''}>Курьер — видит только свои заявки/заказы</option>
      </select>
      <span class="hint">Базовый тип задаёт серверную защиту. «Курьер» автоматически ограничивает видимость только своими записями.</span></div>
    <div class="field"><label>Права по модулям</label>
      <table style="font-size:13px"><thead><tr><th></th>${ACTIONS.map(([,al])=>`<th style="text-align:center;font-size:11px;text-transform:uppercase;color:var(--muted)">${al}</th>`).join('')}</tr></thead>
      <tbody>${matrix}</tbody></table></div>`,
    async()=>{
      const name=val('r_name').trim();if(!name){toast('Укажите название');return false;}
      const perms={};
      MODULES.forEach(([m])=>{perms[m]={};ACTIONS.forEach(([a])=>{const el=document.querySelector(`[data-perm="${m}.${a}"]`);perms[m][a]=!!(el&&el.checked);});});
      const row={name,base_type:val('r_base'),perms};
      if(id){const u=await dbUpdate('roles',id,row);if(!u)return false;Object.assign(S.roles.find(x=>x.id===id),u);}
      else{const u=await dbInsert('roles',row);if(!u)return false;S.roles.push(u);}
      // если изменили свою роль — пересчитать права
      if(id&&S.me.role_id===id)computeMyPerms();
      toast('Сохранено');renderUsers();return true;});
}
</script>
